# FraiseQL v2 - Compiled GraphQL Execution Engine
# Workspace root configuration

[profile.bench]
lto = "thin"
opt-level = 3

[profile.dev]
debug = true
opt-level = 0

[profile.release]
codegen-units = 1
lto = "fat"
opt-level = 3
strip = true

[profile.test]
opt-level = 1

[workspace]
members = [
  "crates/fraiseql-arrow",  # Apache Arrow Flight integration (Phase 9)
  "crates/fraiseql-cli",
  "crates/fraiseql-core",
  "crates/fraiseql-error",
  "crates/fraiseql-observers",
  "crates/fraiseql-observers-macros",  # Procedural macros for automatic instrumentation (Phase 9.2.B)
  "crates/fraiseql-server",  # HTTP server with runtime, webhooks, files (Phases 1-4B)
  "crates/fraiseql-wire"  # Streaming JSON query engine for Postgres
]
resolver = "2"

[workspace.dependencies]
# Encryption
aes-gcm = "0.10"
anyhow = "1.0"
async-trait = "0.1"
# HTTP server (Axum)
axum = {version = "0.7"}
# Encoding
base64 = "0.22"
# Utilities
bytes = "1.0"
# Time
chrono = {version = "0.4", features = ["serde"]}
dashmap = "6.0"
# Connection pooling
deadpool = "0.12"
deadpool-postgres = "0.14"
# Internal crates
fraiseql-wire = {path = "crates/fraiseql-wire", version = "0.1.1"}
futures = "0.3"
# GraphQL parsing
graphql-parser = "0.4"
hex = "0.4"
hmac = "0.12"
hyper = {version = "1.0"}
itertools = "0.13"
jsonwebtoken = "9.2"
lazy_static = "1.4"
linked-hash-map = "0.5"
# Caching
lru = "0.16"
# TLS
native-tls = "0.2"
once_cell = "1.19"
# Parking lot (faster mutexes)
parking_lot = "0.12"
postgres-native-tls = "0.5"
# Python FFI (for fraiseql-python crate)
pyo3 = {version = "0.25", features = ["extension-module", "experimental-async"]}
pyo3-async-runtimes = {version = "0.25", features = ["tokio-runtime"]}
# Random
rand = "0.8"
# Kafka
rdkafka = {version = "0.36", features = ["tokio"]}
regex = "1.10"
# HTTP client
reqwest = {version = "0.12", features = ["json"]}
# SQLite
rusqlite = {version = "0.32", features = ["bundled"]}
# Serialization
serde = {version = "1.0", features = ["derive"]}
serde_json = "1.0"
# Crypto
sha2 = "0.10"
# MySQL
sqlx = {version = "0.8", features = ["mysql", "runtime-tokio", "json"]}
# Testing utilities
tempfile = "3.8"
# Error handling
thiserror = "2.0"
# Async runtime
tokio = {version = "1.0", features = ["full"]}
# Database drivers
# PostgreSQL
tokio-postgres = {version = "0.7", features = ["with-serde_json-1", "with-uuid-1", "with-chrono-0_4"]}
tokio-util = {version = "0.7"}
# Configuration
toml = "0.8"
tower = {version = "0.5"}
tower-http = {version = "0.5", features = ["cors", "compression-gzip"]}
# Logging
tracing = "0.1"
tracing-subscriber = {version = "0.3", features = ["env-filter"]}
# UUID
uuid = {version = "1.0", features = ["v4", "serde"]}

[workspace.lints.clippy]
# --- Lint groups (priority -1 so individual overrides take effect) ---
all = {level = "deny", priority = -1}
cargo = {level = "warn", priority = -1}
nursery = {level = "warn", priority = -1}
pedantic = {level = "warn", priority = -1}

# --- Cargo group overrides ---
cargo_common_metadata = "allow"
multiple_crate_versions = "allow"

# --- Casting (intentional truncation/conversion in metrics, timestamps, etc.) ---
cast_lossless = "allow"
cast_possible_truncation = "allow"
cast_possible_wrap = "allow"
cast_precision_loss = "allow"
cast_sign_loss = "allow"

# --- Documentation ---
doc_markdown = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"

# --- Style preferences ---
bool_to_int_with_if = "allow"
collapsible_if = "allow"
default_trait_access = "allow"
enum_glob_use = "allow"
explicit_iter_loop = "allow"
format_push_string = "allow"
if_not_else = "allow"
ignored_unit_patterns = "allow"
implicit_saturating_sub = "allow"
items_after_statements = "allow"
manual_let_else = "allow"
manual_map = "allow"
manual_saturating_arithmetic = "allow"
map_unwrap_or = "allow"
match_same_arms = "allow"
match_wildcard_for_single_variants = "allow"
module_name_repetitions = "allow"
option_if_let_else = "allow"
or_fun_call = "allow"
ptr_arg = "allow"
redundant_closure = "allow"
redundant_closure_for_method_calls = "allow"
semicolon_if_nothing_returned = "allow"
similar_names = "allow"
single_match_else = "allow"
suspicious_doc_comments = "allow"
uninlined_format_args = "allow"
unreadable_literal = "allow"
unnested_or_patterns = "allow"
unwrap_or_default = "allow"
use_self = "allow"

# --- Struct/type design ---
derive_partial_eq_without_eq = "allow"
missing_fields_in_debug = "allow"
must_use_candidate = "allow"
new_without_default = "allow"
return_self_not_must_use = "allow"
struct_excessive_bools = "allow"
struct_field_names = "allow"

# --- Function design ---
needless_pass_by_value = "allow"
should_implement_trait = "allow"
too_many_arguments = "allow"
too_many_lines = "allow"
trivially_copy_pass_by_ref = "allow"
unnecessary_wraps = "allow"
unused_async = "allow"
unused_self = "allow"

# --- Nursery overrides (too aggressive / false positives) ---
branches_sharing_code = "allow"
collection_is_never_read = "allow"
doc_link_with_quotes = "allow"
future_not_send = "allow"
ignore_without_reason = "allow"
implicit_hasher = "allow"
iter_on_single_items = "allow"
iter_with_drain = "allow"
missing_const_for_fn = "allow"
needless_collect = "allow"
needless_pass_by_ref_mut = "allow"
no_effect_underscore_binding = "allow"
ref_option = "allow"
significant_drop_in_scrutinee = "allow"
significant_drop_tightening = "allow"
unnecessary_debug_formatting = "allow"
useless_let_if_seq = "allow"

# --- Test/debug patterns ---
float_cmp = "allow"
should_panic_without_expect = "allow"
used_underscore_binding = "allow"
wildcard_imports = "allow"

# --- Misc ---
double_must_use = "allow"
if_same_then_else = "allow"
single_char_pattern = "allow"
unused_enumerate_index = "allow"
useless_format = "allow"

[workspace.lints.rust]
dead_code = "warn"
missing_docs = "allow"  # Crates opt-in via #![warn(missing_docs)] in lib.rs
unsafe_code = "forbid"
unused_imports = "warn"
unused_variables = "warn"

[workspace.package]
authors = ["FraiseQL Team <team@fraiseql.dev>"]
categories = ["database", "web-programming"]
documentation = "https://docs.fraiseql.dev"
edition = "2021"
homepage = "https://fraiseql.dev"
keywords = ["graphql", "database", "compiler", "sql"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/fraiseql/fraiseql"
rust-version = "1.75"  # MSRV
version = "2.0.0-alpha.3"
