# FraiseQL v2 - Compiled GraphQL Execution Engine
# Workspace root configuration

[profile.bench]
lto = "thin"
opt-level = 3

[profile.dev]
debug = true
opt-level = 0

[profile.release]
codegen-units = 1
lto = "fat"
opt-level = 3
strip = true

[profile.test]
opt-level = 1

[workspace]
members = [
  "crates/fraiseql",  # Root umbrella crate
  "crates/fraiseql-arrow",
  "crates/fraiseql-auth",
  "crates/fraiseql-cli",
  "crates/fraiseql-core",
  "crates/fraiseql-error",
  "crates/fraiseql-observers",
  "crates/fraiseql-observers-macros",
  "crates/fraiseql-secrets",
  "crates/fraiseql-server", "crates/fraiseql-test-utils",  # HTTP server with runtime, files
  "crates/fraiseql-webhooks",
  "crates/fraiseql-wire"  # Streaming JSON query engine for Postgres
]
resolver = "2"

[workspace.dependencies]
# Encryption
aes-gcm = "0.10"
anyhow = "1.0"
async-trait = "0.1"
# HTTP server (Axum)
axum = {version = "0.7"}
# Encoding
base64 = "0.22"
# Utilities
bytes = "1.0"
# Time
chrono = {version = "0.4", features = ["serde"]}
dashmap = "6.0"
# Connection pooling
deadpool = "0.12"
deadpool-postgres = "0.14"
# Internal crates
fraiseql-arrow = {path = "crates/fraiseql-arrow", version = "2.1.0-dev"}
fraiseql-auth = {path = "crates/fraiseql-auth", version = "2.1.0-dev"}
fraiseql-secrets = {path = "crates/fraiseql-secrets", version = "2.1.0-dev"}
fraiseql-webhooks = {path = "crates/fraiseql-webhooks", version = "2.1.0-dev"}
fraiseql-cli = {path = "crates/fraiseql-cli", version = "2.1.0-dev"}
fraiseql-core = {path = "crates/fraiseql-core", version = "2.1.0-dev", default-features = false}
fraiseql-error = {path = "crates/fraiseql-error", version = "2.1.0-dev"}
fraiseql-observers = {path = "crates/fraiseql-observers", version = "2.1.0-dev"}
fraiseql-observers-macros = {path = "crates/fraiseql-observers-macros", version = "2.1.0-dev"}
fraiseql-server = {path = "crates/fraiseql-server", version = "2.1.0-dev"}
fraiseql-wire = {path = "crates/fraiseql-wire", version = "2.1.0-dev"}
futures = "0.3"
indexmap = {version = "2", features = ["serde"]}
# GraphQL parsing — patched via vendor/graphql-parser to use thiserror 2.x.
# See [patch.crates-io] at the bottom of this file.
graphql-parser = "0.4"
hex = "0.4"
hmac = "0.12"
hyper = {version = "1.0"}
itertools = "0.13"
jsonwebtoken = "9.2"
linked-hash-map = "0.5"
# Caching
lru = "0.16"
# Parking lot (faster mutexes)
parking_lot = "0.12"
# Property-based testing
proptest = "1.4"
# Random
rand = "0.8"
# Kafka
rdkafka = {version = "0.39", features = ["tokio"]}
regex = "1.10"
# HTTP client — rustls only, no OpenSSL dependency
reqwest = {version = "0.12", default-features = false, features = ["json", "rustls-tls"]}
# SQLite
rusqlite = {version = "0.32", features = ["bundled"]}
# Serialization
serde = {version = "1.0", features = ["derive"]}
serde_json = "1.0"
# Crypto
sha2 = "0.10"
# SQL toolkit (MySQL feature gated behind per-crate optional flags)
sqlx = {version = "0.8", features = ["runtime-tokio", "json"]}
# Testing utilities
temp-env = {version = "0.3", features = ["async_closure"]}
tempfile = "3.25"
# Error handling
# NOTE: rustls 0.22 is pulled by tokio-rustls 0.25 via sqlx 0.8; rustls 0.23 by reqwest/tonic.
# Unification blocked on sqlx 0.9 (which will upgrade to tokio-rustls 0.26 / rustls 0.23).
thiserror = "2.0"
# Async runtime
tokio = {version = "1.0", features = ["full"]}
# Database drivers
# PostgreSQL
tokio-postgres = {version = "0.7", features = ["with-serde_json-1", "with-uuid-1", "with-chrono-0_4"]}
tokio-util = {version = "0.7"}
# Configuration
toml = "0.8"
tower = {version = "0.5"}
tower-http = {version = "0.5", features = ["cors", "compression-gzip"]}
# Logging
tracing = "0.1"
tracing-subscriber = {version = "0.3", features = ["env-filter"]}
# UUID
uuid = {version = "1.21", features = ["v4", "serde"]}

[workspace.lints.clippy]
# Deny all warnings in CI (priority -1 lets individual lints override)
all = {level = "deny", priority = -1}
cargo = {level = "warn", priority = -1}  # Changed to warn - metadata errors not blocking
cargo_common_metadata = "allow"  # Internal crates don't need all metadata
if_not_else = "allow"  # Style preference
multiple_crate_versions = "allow"  # Transitive dependencies cause this
missing_errors_doc = "warn"   # Public fallible fns should document error variants
missing_panics_doc = "warn"  # Public fns that can panic should document when
must_use_candidate = "allow"  # We'll use this selectively
nursery = {level = "warn", priority = -1}  # Nursery is experimental, keep as warn
option_if_let_else = "allow"  # Style preference
or_fun_call = "allow"  # Often clearer to keep explicit
pedantic = {level = "deny", priority = -1}
redundant_closure_for_method_calls = "allow"  # Style preference
return_self_not_must_use = "allow"  # Builder pattern compatibility
significant_drop_tightening = "allow"  # Too aggressive, false positives
similar_names = "allow"
struct_excessive_bools = "allow"  # Schema structs often have many bool flags
# Allow some pedantic lints that are too strict for practical use
too_many_lines = "allow"
# Additional allows for common pedantic/nursery lints that don't add value
uninlined_format_args = "allow"  # Style preference, too noisy
unnecessary_wraps = "allow"  # API consistency over strictness
unused_async = "allow"  # Sometimes needed for trait conformance
unused_enumerate_index = "allow"  # Sometimes index needed later
unused_self = "allow"  # Sometimes needed for API compatibility
use_self = "allow"  # Style preference
# unwrap_used is deny: production code must use .expect("reason") instead of .unwrap().
# Test/bench code suppresses this with #[allow(clippy::unwrap_used)] // Reason: test code.
unwrap_used = "deny"

[workspace.lints.rust]
dead_code = "warn"
missing_docs = "warn"
unsafe_code = "forbid"
unused_imports = "warn"
unused_variables = "warn"

[workspace.package]
authors = ["FraiseQL Team <team@fraiseql.dev>"]
categories = ["database", "web-programming"]
documentation = "https://docs.fraiseql.dev"
edition = "2021"
homepage = "https://fraiseql.dev"
keywords = ["graphql", "database", "compiler", "sql"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/fraiseql/fraiseql"
rust-version = "1.88"  # MSRV — driven by dependency requirements
version = "2.1.0-dev"

# ---------------------------------------------------------------------------
# Crate size budgets (CA-4: Remediation Campaign 2)
#
# Enforced by tools/check-crate-sizes.sh in CI.
# Limits are set at ~50% above current size for small crates, and at the
# 150K "split threshold" for fraiseql-core (which is planned to be split
# into fraiseql-db + fraiseql-executor — see .remediation_2/batches/batch-5-crate-split.md).
#
# Current sizes (2026-03-05):
#   fraiseql-core:            107,712 lines
#   fraiseql-server:           34,010 lines
#   fraiseql-observers:        27,504 lines
#   fraiseql-cli:              26,070 lines
#   fraiseql-auth:             15,761 lines
#   fraiseql-secrets:          10,785 lines
#   fraiseql-wire:             10,041 lines
#   fraiseql-arrow:             8,076 lines
#   fraiseql-webhooks:          2,139 lines
#   fraiseql-test-utils:        1,248 lines
#   fraiseql-error:               686 lines
#   fraiseql-observers-macros:    192 lines
# ---------------------------------------------------------------------------
[workspace.metadata.crate-size-budget]
fraiseql-core             = 150_000  # split threshold; CA-1/CA-2 will reduce to ~70K
fraiseql-server           = 55_000
fraiseql-observers        = 45_000
fraiseql-cli              = 40_000
fraiseql-auth             = 25_000
fraiseql-secrets          = 20_000
fraiseql-wire             = 20_000
fraiseql-arrow            = 15_000
fraiseql-webhooks         = 10_000
fraiseql-test-utils       = 5_000
fraiseql-error            = 5_000
fraiseql-observers-macros = 2_000

[patch.crates-io]
# Local patch: upgrade thiserror dependency from 1.x to 2.x to eliminate
# duplicate thiserror versions in the build. Pending upstream PR to graphql-rust/graphql-parser.
graphql-parser = { path = "vendor/graphql-parser" }
