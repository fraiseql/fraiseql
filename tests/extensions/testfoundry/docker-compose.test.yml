version: '3.8'

services:
  postgres-pgtap:
    build:
      context: .
      dockerfile: Dockerfile.pgtap
    container_name: fraiseql-pgtap-test
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    ports:
      - "5433:5432"  # Use different port to avoid conflicts
    volumes:
      - pgtap-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgtap-data:

# To use this for testing:
# 1. Start the container: docker-compose -f docker-compose.test.yml up -d
# 2. Set environment variable: export DATABASE_URL="postgresql://testuser:testpass@localhost:5433/testdb"
# 3. Run tests: pytest tests/extensions/testfoundry/test_pgtap_execution.py -v
# 4. Stop container: docker-compose -f docker-compose.test.yml down
