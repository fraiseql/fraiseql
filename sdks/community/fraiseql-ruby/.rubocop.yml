AllCops:
  NewCops: enable
  TargetRubyVersion: 3.1
  Exclude:
    - 'bin/**/*'
    - 'vendor/**/*'

# Schema management classes legitimately exceed 100 lines.
Metrics/ClassLength:
  Max: 120

# Methods that build/validate complex structures exceed 10 lines.
Metrics/MethodLength:
  Max: 20

# Data classes legitimately have 6+ parameters for initialization
Metrics/ParameterLists:
  Max: 6

# RSpec blocks legitimately exceed typical line limits
Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'

# Development dependencies are in Gemfile, not gemspec
Gemspec/DevelopmentDependencies:
  Enabled: false
