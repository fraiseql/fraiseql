[package]
name = "fraiseql-rust-macros"
version = "2.0.0-rc.3"
edition = "2021"
description = "Proc macros for the FraiseQL Rust authoring SDK"
license = "Apache-2.0"
repository = "https://github.com/fraiseql/fraiseql"
authors = ["FraiseQL Contributors"]

[lib]
proc-macro = true

[dependencies]
proc-macro2 = "1"
quote = "1"
syn = { version = "2", features = ["full", "extra-traits"] }

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = "deny"
pedantic = "deny"
