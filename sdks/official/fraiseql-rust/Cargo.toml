[workspace]
members = [".", "fraiseql-rust-macros"]
resolver = "2"

[package]
name = "fraiseql-rust"
version = "2.0.0-rc.2"
edition = "2021"
description = "Rust authoring SDK for FraiseQL — define GraphQL schemas in Rust"
license = "Apache-2.0"
repository = "https://github.com/fraiseql/fraiseql"
authors = ["FraiseQL Contributors"]
categories = ["database", "network-programming", "authentication"]
keywords = ["graphql", "schema", "authoring", "rbac", "fraiseql"]

[lib]
name = "fraiseql_rust"
path = "src/lib.rs"

[dependencies]
fraiseql-rust-macros = { path = "fraiseql-rust-macros" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
serde_json = "1"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = "deny"
pedantic = "deny"
cargo = "deny"
nursery = "warn"

[[test]]
name = "integration_test"
path = "tests/integration_test.rs"

[[test]]
name = "scope_extraction_test"
path = "tests/scope_extraction_test.rs"
