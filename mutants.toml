# cargo-mutants configuration for FraiseQL
#
# Priority files are chosen because they contain security-critical logic
# (cache key generation, query execution flow) where a mutant surviving
# would indicate a missing test that could allow data leakage or incorrect
# behavior in production.
#
# Run locally (requires cargo install cargo-mutants):
# cargo mutants --package fraiseql-core --file src/cache/key.rs --timeout 60
#
# See .github/workflows/mutation.yml for the CI configuration.

# Timeout per test (seconds) — keep low to avoid slow mutation runs.
# If tests need more time, raise this but also investigate why.
timeout_multiplier = 3.0

# Only test the packages with mutation-sensitive logic.
# Add packages here as their test suites mature.
[profile.default]
timeout_seconds = 60

# Debug::fmt impls: only formatting output, no correctness impact.
[[skip]]
name = "fmt.*std::fmt::Result.*Default::default"

# `user.roles includes 'role'` expression: the bypass path (Ok(None)) and the
# fallthrough path also return Ok(None), so mutations to the trim_matches closure
# (||→&&, ==→!=) and the condition (&&→||, ==→!=) are all equivalent.

# `expr.contains("tenant_id") && expr.contains("==")` (line 501): the &&→||
# mutation causes near-infinite matching on most test expressions, producing a
# test timeout rather than a clean failure. Covered by tenant isolation tests.

# `0 => return Ok(None)` in DefaultRLSPolicy::evaluate: this arm is dead code
# because the owner filter is unconditionally pushed (filters.len() is never 0).
[[skip]]
name = "replace \\|\\| with && in evaluate_rls_expression"

[[skip]]
name = "replace == with != in evaluate_rls_expression"

[[skip]]
name = "replace && with \\|\\| in evaluate_rls_expression"
[[skip]]
name = "replace && with \\|\\| in evaluate_rls_expression"
[[skip]]
name = "delete match arm 0 in.*DefaultRLSPolicy.*evaluate"
