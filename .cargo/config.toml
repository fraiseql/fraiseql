# Cargo configuration for FraiseQL v2
# https://doc.rust-lang.org/cargo/reference/config.html

# Alias commands
[alias]
audit-fix = "audit fix"
b = "build"
bench-quick = "bench --no-fail-fast -- --quick"
bloat = "bloat --release --crates"
br = "build --release"
c = "check"
check-all = "check --all-targets --all-features"
clippy-all = "clippy --all-targets --all-features -- -D warnings"
cov = "llvm-cov --all-features --workspace --lcov --output-path lcov.info"
doc-open = "doc --all-features --no-deps --open"
expand = "expand"
f = "fmt"
nt = "nextest run --all-features"
outdated-all = "outdated --root-deps-only"
r = "run"
t = "test"
tr = "test --release"
tree = "tree --depth 3"
watch-check = "watch -x 'check --all-features'"
watch-test = "watch -x 'test --all-features'"

[build]
# Use all CPU cores for compilation
jobs = -1

[profile.dev.build-override]
# Optimize build scripts
opt-level = 2

# Profile optimizations
[profile.dev.package."*"]
# Optimize dependencies in dev builds for faster testing
opt-level = 2

[registries.crates-io]
protocol = "sparse"

[term]
# Colored output
color = "always"
verbose = false

# Enable mold linker for faster linking on Linux
# Provides 3-5x speedup on full rebuilds.
#
# NOTE: Disabled in the committed config for CI/GitHub Actions compatibility
# (mold not available in the GitHub runner). To enable locally:
#
#   1. Install mold: `pacman -S mold` (Arch) / `apt install mold` (Debian/Ubuntu).
#   2. Copy `.cargo/config.linker.example.toml` to `.cargo/config.local.toml`
#      (gitignored), OR uncomment the block below in your local checkout.
#
# [target.x86_64-unknown-linux-gnu]
# linker = "clang"
# rustflags = ["-C", "link-arg=-fuse-ld=mold"]
