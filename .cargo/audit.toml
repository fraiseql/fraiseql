# FraiseQL Security Advisory Configuration
# See: https://docs.rs/cargo-audit/latest/cargo_audit/
#
# Kept in lockstep with deny.toml's [advisories].ignore — enforced by
# tools/check-audit-lockstep.sh (run from `make audit` and the Dagger
# ShellGates). Update both files together; see docs/dependency-risk-policy.md.

[advisories]
ignore = [
  # rsa: Marvin Attack timing sidechannel; transitive via sqlx-mysql (mysql feature only).
  # No upstream fix. Deadline 2026-10-01 (re-evaluate sqlx 0.9 release).
  "RUSTSEC-2023-0071",
  # rustls-pemfile: unmaintained; blocked on upstream bollard migration to rustls-pem.
  # Deadline 2026-07-01.
  "RUSTSEC-2025-0134",
  # rustls-webpki name-constraint bugs; transitive via aws-smithy-http-client (rustls 0.21);
  # optional aws-s3 feature only. Deadline 2026-06-15.
  "RUSTSEC-2026-0098",
  "RUSTSEC-2026-0099",
  # rustls-webpki 0.101.7 CRL parsing panic; same root cause as 0098/0099. Deadline 2026-06-15.
  "RUSTSEC-2026-0104",
  # wasmtime-wasi FilePerms bypass (hard-link/rename); transitive via fraiseql-functions'
  # opt-in runtime-wasm feature only (wasmtime pinned to 44, NOT in default build). Patched in
  # 45.0.3/46.0.1 — needs a wasmtime 44->45+ major bump tracked separately. Deadline 2026-10-01.
  "RUSTSEC-2026-0188"
]
# Surface unsound + unmaintained advisories as warnings so new soundness issues are visible
# in `cargo audit` output.
informational_warnings = ["unmaintained", "unsound"]
