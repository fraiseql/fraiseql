[dependencies]
fraiseql-arrow = {path = "../fraiseql-arrow", version = "0.2.0", optional = true}
fraiseql-cli = {path = "../fraiseql-cli", version = "2.0.0-alpha.5", optional = true}
# Core (always included)
fraiseql-core = {path = "../fraiseql-core", version = "2.0.0-alpha.5", default-features = false}
fraiseql-error = {path = "../fraiseql-error", version = "2.0.0-alpha.5"}
fraiseql-observers = {path = "../fraiseql-observers", version = "2.0.0-alpha.5", optional = true}
# Optional components
fraiseql-server = {path = "../fraiseql-server", version = "2.0.0-alpha.5", optional = true}
fraiseql-wire = {path = "../fraiseql-wire", version = "0.1.2", optional = true}

[features]
arrow = ["dep:fraiseql-arrow", "fraiseql-core/arrow", "server"]
cli = ["dep:fraiseql-cli"]
default = ["postgres"]
# Feature bundles
full = ["server", "observers", "arrow", "wire", "postgres", "mysql", "sqlite"]
minimal = []
mysql = ["fraiseql-core/mysql"]
observers = ["dep:fraiseql-observers", "fraiseql-server?/observers"]
# Database backends (pass-through to fraiseql-core)
postgres = ["fraiseql-core/postgres"]
# Optional components
server = ["dep:fraiseql-server"]
sqlite = ["fraiseql-core/sqlite"]
sqlserver = ["fraiseql-core/sqlserver"]
wire = ["dep:fraiseql-wire", "fraiseql-core/wire-backend"]

[lints]
workspace = true

[package]
description = "FraiseQL v2 - Compiled GraphQL execution engine for relational databases"
name = "fraiseql"
authors.workspace = true
categories.workspace = true
documentation.workspace = true
edition.workspace = true
homepage.workspace = true
keywords.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
version.workspace = true
