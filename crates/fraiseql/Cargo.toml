[[bin]]
name = "fraiseql"
path = "src/main.rs"
required-features = ["cli"]

[dependencies]
fraiseql-arrow = {workspace = true, optional = true}
fraiseql-cli = {workspace = true, optional = true}
# Core (always included)
fraiseql-core = {workspace = true, default-features = false}
fraiseql-error = {workspace = true}
fraiseql-observers = {workspace = true, optional = true}
# Optional components
fraiseql-server = {workspace = true, optional = true}
fraiseql-wire = {workspace = true, optional = true}
tokio = {workspace = true}

[features]
arrow = ["dep:fraiseql-arrow", "fraiseql-core/arrow", "server"]
cli = ["dep:fraiseql-cli"]
default = ["postgres"]
# Feature bundles
full = ["server", "observers", "arrow", "wire", "postgres", "mysql", "sqlite", "cli", "federation"]
federation = ["fraiseql-core/federation"]
# Platform-feature pass-throughs to the server (mirror `observers`). These let the
# umbrella `fraiseql` binary — the published release artifact — be built with the
# stable opt-in platform features that were previously reachable only via
# `-p fraiseql-server`. Each is a no-op unless `server` is also enabled.
functions-runtime = ["server", "fraiseql-server?/functions-runtime"]
functions-runtime-deno = ["server", "fraiseql-server?/functions-runtime-deno"]
# `fraiseql functions invoke` — the CLI's local V8 test harness for function authors.
# Pass-through so the published `-full` binary ships the author inner-loop instead of
# forcing a from-source build (the same adopter dead-end `-full` exists to close).
functions-invoke = ["cli", "fraiseql-cli?/functions-invoke"]
inbound = ["server", "fraiseql-server?/inbound"]
inbound-email = ["server", "fraiseql-server?/inbound-email"]
mcp = ["server", "fraiseql-server?/mcp"]
metrics = ["server", "fraiseql-server?/metrics"]
minimal = []
# `fraiseql run` — the CLI's in-process server launcher. The lean default release
# artifact is the compiler CLI and does not enable it; the `-full` variant does, so
# the published `-full` binary is a self-contained server (functions/sources/mcp all
# reachable at runtime) instead of a CLI with dead server code.
run-server = ["cli", "server", "fraiseql-cli?/run-server"]
mysql = ["fraiseql-core/mysql"]
observers = ["dep:fraiseql-observers", "fraiseql-server?/observers"]
# Database backends (pass-through to fraiseql-core)
postgres = ["fraiseql-core/postgres"]
# The published "-full" release variant (phase 01): the lean default artifact
# (cli,server,postgres) stays the default; this bundle adds every stable opt-in
# platform feature an adopter of functions/sources/observers/mcp/inbound would
# otherwise be forced to rebuild from source for. Excludes arrow/wire/extra DB
# backends deliberately — those are separate concerns, not the platform-feature
# adoption gap this variant closes.
release-full = [
    "cli",
    "run-server",
    "server",
    "postgres",
    "observers",
    "functions-runtime-deno",
    "functions-invoke",
    "sources",
    "mcp",
    "inbound",
    "inbound-email",
    "metrics",
    "federation",
]
# Optional components
server = ["dep:fraiseql-server"]
sources = ["server", "fraiseql-server?/sources"]
sqlite = ["fraiseql-core/sqlite"]
sqlserver = ["fraiseql-core/sqlserver"]
wire = ["dep:fraiseql-wire", "fraiseql-core/wire-backend"]

[lints]
workspace = true

[package]
description = "FraiseQL v2 - Compiled GraphQL execution engine for relational databases"
name = "fraiseql"
readme = "README.md"
authors.workspace = true
categories.workspace = true
documentation.workspace = true
edition.workspace = true
homepage.workspace = true
keywords.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
version.workspace = true

[package.metadata.binstall]
bin-dir = "fraiseql{ binary-ext }"
pkg-fmt = "tgz"
pkg-url = "{ repo }/releases/download/v{ version }/fraiseql-{ target }.tar.gz"

[package.metadata.binstall.overrides.x86_64-pc-windows-msvc]
pkg-fmt = "zip"
