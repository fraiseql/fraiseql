[[bench]]
harness = false
name = "micro_benchmarks"

[[bench]]
harness = false
name = "integration_benchmarks"
required-features = ["bench-with-postgres"]

[[bench]]
harness = false
name = "comparison_benchmarks"
required-features = ["bench-with-tokio-postgres"]

[[bench]]
harness = false
name = "lazy_pause_resume"
required-features = ["bench-with-postgres"]

[dependencies]
base64 = {workspace = true}  # Base64 encoding/decoding
# Bytes manipulation
bytes = {workspace = true}
futures = {workspace = true}
hmac = {workspace = true}  # HMAC-SHA256
# Metrics for observability
metrics = "0.22"  # Metrics collection framework
pbkdf2 = "0.12"  # Key derivation for SCRAM
rand = {workspace = true}  # Random nonce generation
# TLS support
rustls = {version = "0.23", features = ["ring"]}
rustls-native-certs = "0.8.3"
rustls-pemfile = "2.2"
rustls-pki-types = "1"
# Serialization
serde = {workspace = true}
serde_json = {workspace = true}
# Cryptography for SCRAM authentication
sha2 = {workspace = true}  # HMAC-SHA256 for SCRAM
socket2 = {version = "0.5", features = ["all"]}
subtle = "2"  # Constant-time comparison for SCRAM
# Error handling
thiserror = {workspace = true}
# Async runtime
tokio = {workspace = true, features = ["rt", "macros", "io-util", "net", "sync", "time"]}
tokio-rustls = "0.26"
# Tracing
tracing = {workspace = true}
tracing-subscriber = {workspace = true}
webpki-roots = "0.26"
# User info for default values
whoami = "1"
# Secure password memory management
zeroize = {version = "1.6", features = ["std", "derive"]}

[dev-dependencies]
criterion = {version = "0.5", features = ["async_tokio"]}
proptest = {workspace = true}
testcontainers = {version = "0.26"}
testcontainers-modules = {version = "0.14", features = ["postgres"]}
tokio-postgres = {workspace = true}
tokio-test = "0.4"

# Watchdog uses signal-hook which is Unix-only (SIGQUIT, signal_hook::iterator)
[target.'cfg(unix)'.dev-dependencies]
testcontainers = {version = "0.26", features = ["watchdog"]}

[[example]]
name = "basic_stream"
path = "examples/basic_stream.rs"

[features]
bench-with-postgres = []
bench-with-tokio-postgres = []

[lib]
name = "fraiseql_wire"
path = "src/lib.rs"

[lints]
workspace = true

[package]
authors = ["Lionel Hamayon <lionel@evolution-digitale.fr>"]
categories = ["database", "asynchronous"]
description = "Streaming JSON query engine for Postgres 17"
documentation = "https://docs.rs/fraiseql-wire"
edition = "2021"
homepage = "https://github.com/fraiseql/fraiseql-wire"
keywords = ["postgres", "postgresql", "json", "streaming", "async"]
license = "MIT OR Apache-2.0"
name = "fraiseql-wire"
readme = "README.md"
repository.workspace = true
rust-version.workspace = true
version.workspace = true
