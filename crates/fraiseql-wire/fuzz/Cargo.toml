[package]
name = "fraiseql-wire-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
bytes = "1"

[dependencies.fraiseql-wire]
path = ".."

[workspace]
members = ["."]

[[bin]]
name = "protocol_decode"
path = "fuzz_targets/protocol_decode.rs"
doc = false

[[bin]]
name = "scram_parse"
path = "fuzz_targets/scram_parse.rs"
doc = false
