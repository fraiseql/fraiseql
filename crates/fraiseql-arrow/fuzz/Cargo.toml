[[bin]]
doc = false
name = "flight_ticket"
path = "fuzz_targets/flight_ticket.rs"

[[bin]]
doc = false
name = "db_convert"
path = "fuzz_targets/db_convert.rs"

[dependencies]
arrow = {version = "57", features = ["csv", "json"]}
