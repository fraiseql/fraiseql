[package]
name = "fraiseql-core-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
arbitrary = { version = "1", features = ["derive"] }
serde_json = "1"

[dependencies.fraiseql-core]
path = ".."
default-features = false
features = ["rich-filters"]

[workspace]
members = ["."]

[[bin]]
name = "graphql_parser"
path = "fuzz_targets/graphql_parser.rs"
doc = false

[[bin]]
name = "schema_deser"
path = "fuzz_targets/schema_deser.rs"
doc = false

[[bin]]
name = "sql_codegen"
path = "fuzz_targets/sql_codegen.rs"
doc = false

[[bin]]
name = "schema_compile"
path = "fuzz_targets/schema_compile.rs"
doc = false

[[bin]]
name = "toml_config"
path = "fuzz_targets/toml_config.rs"
doc = false

[[bin]]
name = "query_variables"
path = "fuzz_targets/query_variables.rs"
doc = false
