[[bin]]
doc = false
name = "graphql_parser"
path = "fuzz_targets/graphql_parser.rs"

[[bin]]
doc = false
name = "schema_deser"
path = "fuzz_targets/schema_deser.rs"

[[bin]]
doc = false
name = "sql_codegen"
path = "fuzz_targets/sql_codegen.rs"

[[bin]]
doc = false
name = "schema_compile"
path = "fuzz_targets/schema_compile.rs"

[[bin]]
doc = false
name = "toml_config"
path = "fuzz_targets/toml_config.rs"

[[bin]]
doc = false
name = "query_variables"
path = "fuzz_targets/query_variables.rs"

[dependencies]
arbitrary = {version = "1", features = ["derive"]}
libfuzzer-sys = "0.4"
serde_json = "1"

[dependencies.fraiseql-core]
default-features = false
features = ["rich-filters"]
path = ".."

[package]
edition = "2021"
name = "fraiseql-core-fuzz"
publish = false
version = "0.0.0"

[package.metadata]
cargo-fuzz = true

[workspace]
members = ["."]
