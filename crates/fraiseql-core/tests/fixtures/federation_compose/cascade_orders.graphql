type Order @key(fields: "id") {
  id: ID
  total: Float
}

type UpdatedEntity @shareable {
  id: ID
  operation: CascadeOperation
  entity: CascadeNode
}

type DeletedEntity @shareable {
  id: ID
  deletedAt: DateTime
}

type CascadeMetadata @shareable {
  timestamp: DateTime
  transactionId: ID
  depth: Int
  affectedCount: Int
  truncated: Boolean
  originalCount: Int
}

type QueryInvalidation @shareable {
  queryName: String
  queryHash: String
  arguments: JSON
  queryPattern: String
  strategy: InvalidationStrategy
  scope: InvalidationScope
}

type CascadeUpdates @shareable {
  updated: [UpdatedEntity]
  deleted: [DeletedEntity]
  metadata: CascadeMetadata
  invalidations: [QueryInvalidation]
}

type CreateOrderPayload {
  entity: Order
  cascade: CascadeUpdates
  updatedFields: [String]
}

type Query {
  orders(where: JSON, orderBy: JSON, limit: Int, offset: Int): [Order!]!
}

type Mutation {
  createOrder: CreateOrderPayload!
}



directive @key(fields: String!, resolvable: Boolean = true) repeatable on OBJECT
directive @extends on OBJECT
directive @external on FIELD_DEFINITION
directive @requires(fields: String!) on FIELD_DEFINITION
directive @provides(fields: String!) on FIELD_DEFINITION
directive @shareable on FIELD_DEFINITION | OBJECT
directive @inaccessible on FIELD_DEFINITION | OBJECT | INTERFACE | UNION | ARGUMENT_DEFINITION | SCALAR | ENUM | ENUM_VALUE | INPUT_OBJECT | INPUT_FIELD_DEFINITION
directive @override(from: String!) on FIELD_DEFINITION
directive @link(url: String, as: String, for: link__Purpose, import: [link__Import]) repeatable on SCHEMA

enum link__Purpose {
  SECURITY
  EXECUTION
}

scalar link__Import

type _Service {
  sdl: String!
}

scalar _Any

union _Entity = Order

extend type Query {
  _service: _Service!
  _entities(representations: [_Any!]!): [_Entity]!
}
