[[bin]]
name = "fraiseql-cli"
path = "src/main.rs"

[dependencies]
# Error handling
anyhow = {workspace = true}
# Gateway HTTP server
axum = {workspace = true}
# CLI framework
clap = {version = "4.5", features = ["derive", "cargo", "color", "suggestions"]}
# Database connection (for introspect/validate commands)
deadpool-postgres = {workspace = true}
# Workspace dependencies
fraiseql-core = {workspace = true, features = ["postgres", "schema-lint"]}
fraiseql-server = {workspace = true, optional = true}
glob = "0.3"
# Gateway HTTP body utilities
http-body-util = {workspace = true}
prost = {workspace = true}
prost-types = {workspace = true}
# Serialization
indexmap = {workspace = true}
# File watching (for serve command)
notify = "7.0"
regex = {workspace = true}
# Gateway subgraph HTTP client
reqwest = {workspace = true}
serde = {workspace = true}
serde_json = {workspace = true}
sha2 = {workspace = true}
thiserror = {workspace = true}
# Async runtime
tokio = {workspace = true, features = ["rt-multi-thread", "macros", "net", "sync", "time"]}
tokio-postgres = {workspace = true, features = ["with-serde_json-1"]}
toml = {workspace = true}
# Gateway HTTP test utilities
tower = {workspace = true, features = ["util"]}
# Logging
tracing = {workspace = true}
tracing-subscriber = {workspace = true, features = ["fmt", "ansi"]}
# URL validation
url = "2"
# Multi-file schema loading
walkdir = "2"

[dev-dependencies]
temp-env = {workspace = true}
tempfile = {workspace = true}

[features]
default = []
run-server = ["dep:fraiseql-server"]

[lints]
workspace = true

[package]
description = "CLI tools for FraiseQL v2 - Schema compilation and development utilities"
name = "fraiseql-cli"
authors.workspace = true
categories.workspace = true
documentation.workspace = true
edition.workspace = true
homepage.workspace = true
keywords.workspace = true
license.workspace = true
readme.workspace = true
repository.workspace = true
rust-version.workspace = true
version.workspace = true

[package.metadata.binstall]
bin-dir = "fraiseql{ binary-ext }"
pkg-fmt = "tgz"
pkg-url = "{ repo }/releases/download/v{ version }/fraiseql-{ target }.tar.gz"

[package.metadata.binstall.overrides.x86_64-pc-windows-msvc]
pkg-fmt = "zip"
