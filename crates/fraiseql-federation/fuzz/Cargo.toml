[[bin]]
doc = false
name = "subgraph_response"
path = "fuzz_targets/subgraph_response.rs"

[dependencies]
arbitrary = {version = "1", features = ["derive"]}
libfuzzer-sys = "0.4"
serde_json = "1"

[dependencies.fraiseql-federation]
default-features = false
path = ".."

[dependencies.fraiseql-error]
default-features = false
path = "../../fraiseql-error"

[package]
edition = "2021"
name = "fraiseql-federation-fuzz"
publish = false
version = "0.0.0"

[package.metadata]
cargo-fuzz = true

[workspace]
members = ["."]
