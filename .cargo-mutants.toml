# Cargo-mutants workspace configuration
# https://mutants.rs/configuration.html

# Exclude infrastructure glue — no logic to mutate
exclude_globs = [
  "crates/*/src/lib.rs",
  "crates/*/src/main.rs",
  "crates/**/mod.rs",
  "crates/**/*_test*.rs",
  "crates/**/tests.rs"
]
# Parallel jobs
jobs = 4
# Default timeout per mutation (seconds)
timeout = 60
