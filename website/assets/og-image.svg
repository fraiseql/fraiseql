<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0A0A0A"/>

  <!-- Logo and Title -->
  <text x="600" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="80" font-weight="900" fill="#FFFFFF" text-anchor="middle">
    🍓 FraiseQL
  </text>

  <!-- Tagline -->
  <text x="600" y="280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="36" fill="#FF006E" text-anchor="middle">
    GraphQL to PostgreSQL. No middleman.
  </text>

  <!-- Description -->
  <text x="600" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" fill="#CCCCCC" text-anchor="middle">
    Transform GraphQL queries into optimized PostgreSQL
  </text>
  <text x="600" y="375" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" fill="#CCCCCC" text-anchor="middle">
    One query. No N+1. Pure speed.
  </text>

  <!-- Features -->
  <g transform="translate(300, 450)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" fill="#FFFFFF">
      ✓ No ORM Overhead
    </text>
  </g>

  <g transform="translate(300, 485)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" fill="#FFFFFF">
      ✓ JSONB Powered
    </text>
  </g>

  <g transform="translate(600, 450)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" fill="#FFFFFF">
      ✓ SQL Injection Safe
    </text>
  </g>

  <g transform="translate(600, 485)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" fill="#FFFFFF">
      ✓ MIT Licensed
    </text>
  </g>

  <!-- URL -->
  <text x="600" y="570" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" fill="#999999" text-anchor="middle">
    fraiseql.dev
  </text>
</svg>
