name: Setup Rust Build Environment
description: Install mold linker (Linux), Rust toolchain, and sccache

inputs:
  toolchain:
    description: Rust toolchain version
    default: stable
  components:
    description: Additional Rust components (e.g. clippy, llvm-tools-preview)
    default: ''
  extra-packages:
    description: Additional apt packages to install alongside mold (e.g. postgresql-client)
    default: ''

runs:
  using: composite
  steps:
    - name: Install mold linker
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y mold ${{ inputs.extra-packages }}

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.9
