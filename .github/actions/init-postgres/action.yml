name: Initialize Test PostgreSQL
description: Run init.sql and init-analytics.sql against the test database

inputs:
  port:
    description: PostgreSQL port
    default: '5433'

runs:
  using: composite
  steps:
    # NOTE: These are test-only credentials, not used in production.
    # Username: fraiseql_test
    # Password: fraiseql_test_password
    # Database: test_fraiseql
    - name: Initialize test database schema
      shell: bash
      run: |
        psql -h localhost -p ${{ inputs.port }} -U fraiseql_test -d test_fraiseql -f tests/sql/postgres/init.sql
        psql -h localhost -p ${{ inputs.port }} -U fraiseql_test -d test_fraiseql -f tests/sql/postgres/init-analytics.sql
      env:
        PGPASSWORD: fraiseql_test_password
