version: 2
updates:
  # Rust dependencies
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels:
      - "dependencies"
      - "rust"
    groups:
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-dependencies:
        dependency-type: "development"
    reviewers:
      - "fraiseql/core-team"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"

  # Python dependencies (fraiseql-python)
  - package-ecosystem: "pip"
    directory: "/sdks/official/fraiseql-python"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "python"

  # TypeScript dependencies
  - package-ecosystem: "npm"
    directory: "/sdks/official/fraiseql-typescript"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "typescript"
