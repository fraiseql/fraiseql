name: F# SDK

on:
  push:
    paths:
      - 'sdks/official/fraiseql-fsharp/**'
    tags:
      - 'fsharp-sdk/v*'
  pull_request:
    paths:
      - 'sdks/official/fraiseql-fsharp/**'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: sdks/official/fraiseql-fsharp
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --configuration Release --no-restore
      - name: Test
        run: dotnet test --no-build --configuration Release --collect:"XPlat Code Coverage" --verbosity normal
      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: coverage-fsharp-sdk
          path: sdks/official/fraiseql-fsharp/tests/FraiseQL.Tests/TestResults/
          retention-days: 30

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/fsharp-sdk/v')
    environment: release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: sdks/official/fraiseql-fsharp
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore dependencies
        run: dotnet restore
      - name: Pack library
        run: dotnet pack src/FraiseQL --configuration Release --no-restore -o nupkg
      - name: Pack tool
        run: dotnet pack tool/FraiseQL.Tool --configuration Release --no-restore -o nupkg
      - name: Push to NuGet
        run: dotnet nuget push nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
