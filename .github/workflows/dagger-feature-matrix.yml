name: Dagger — feature matrix

# Phase 05 feature-flag check matrix (Track 0). Ports feature-flags.yml's
# `cargo check --features …` combos (feature-matrix / database-matrix /
# storage-matrix / functions-matrix) onto one parameterized Dagger fn, with the
# combo list as typed Go data (.dagger/feature-combos.go). cargo check / clippy only
# — no test binaries, so NO backing services: it only pulls the rust:1.92 base (from
# the private ghcr.io/fraiseql mirror, see mirror-base-images.yml). Runs on the
# self-hosted runner (fraiseql-8core) at ~$0/min, reusing the box's cargo/sccache
# cache volumes (warm = fast). See parity-notes.md.
#
# ONE job, `dagger call feature-matrix`, which fans the combos across N lanes
# (featureMatrixLanes in feature-combos.go), each lane on its own target cache volume
# so cargo's per-target build lock never serializes across lanes. sccache (shared) backs
# cross-lane object reuse. This supersedes the old per-combo `strategy.matrix` (which
# could only run serially on the single runner): combos now run concurrently in one job.
# Trade-off: the 33 per-combo GH status rows collapse to one check — the job log lists
# every combo's pass/fail in declaration order, and a failure names each bad combo.
# Adding a combo is still a one-line Go struct literal in feature-combos.go.
# `dagger call feature-check --combo=X` remains for local single-combo runs.
#
# push-only (maintainer-controlled). fraiseql/fraiseql is PUBLIC, so a self-hosted
# runner must NOT execute fork `pull_request` code — NO pull_request trigger here.
on:
  push:
    branches: [dev]
  workflow_dispatch:

# packages: read lets the runner pull the private ghcr.io/fraiseql/* base-image
# mirror (.github/workflows/mirror-base-images.yml); contents: read for checkout.
permissions:
  contents: read
  packages: read

concurrency:
  group: dagger-feature-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix:
    name: feature matrix
    runs-on: [self-hosted, fraiseql-8core]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      # The Dagger engine pulls the private ghcr.io/fraiseql/* base images via the
      # host's docker credentials; authenticate with the job's GITHUB_TOKEN first.
      - name: Log in to ghcr.io (private base-image mirror)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: dagger call feature-matrix
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          dagger version
          dagger call feature-matrix --source=.
