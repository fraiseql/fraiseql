name: Go SDK

on:
  push:
    paths:
      - 'sdks/official/fraiseql-go/**'
      - '.github/workflows/go-sdk.yml'
  pull_request:
    paths:
      - 'sdks/official/fraiseql-go/**'
      - '.github/workflows/go-sdk.yml'

jobs:
  test:
    name: Go ${{ matrix.go-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: sdks/official/fraiseql-go

    strategy:
      matrix:
        go-version: ['1.23', '1.24']

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: sdks/official/fraiseql-go/go.sum

      - name: Verify dependencies
        run: go mod verify

      - name: Run vet
        run: go vet ./fraiseql/...

      - name: Run staticcheck
        if: matrix.go-version == '1.23'
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.6.0
          staticcheck ./...

      - name: Run tests
        run: go test -v -race ./fraiseql/...

      - name: Build
        run: go build ./...
