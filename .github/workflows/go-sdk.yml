name: Go SDK

on:
  push:
    paths:
      - 'sdks/official/fraiseql-go/**'
      - '.github/workflows/go-sdk.yml'
  pull_request:
    paths:
      - 'sdks/official/fraiseql-go/**'
      - '.github/workflows/go-sdk.yml'

jobs:
  test:
    name: Go ${{ matrix.go-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: sdks/official/fraiseql-go

    strategy:
      matrix:
        go-version: ['1.22', '1.23']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: sdks/official/fraiseql-go/go.sum

      - name: Verify dependencies
        run: go mod verify

      - name: Run vet
        run: go vet ./fraiseql/...

      - name: Run staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./fraiseql/...

      - name: Run tests
        run: go test -v -race ./fraiseql/...

      - name: Build
        run: go build ./...
