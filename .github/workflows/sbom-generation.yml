name: SBOM Generation

# Generate Software Bill of Materials (SBOM) for global supply chain security compliance
# (US EO 14028, EU NIS2/CRA, PCI-DSS 4.0, ISO 27001)
# Runs on releases and can be manually triggered

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to generate SBOM for (e.g., 1.5.0)'
        required: true
        type: string

permissions:
  contents: write  # Required to upload release assets
  id-token: write  # Required for Cosign keyless signing

jobs:
  generate-sbom:
    name: Generate & Sign SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

    - name: Cache cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-sbom-${{ hashFiles('**/Cargo.lock') }}

    - name: Install cargo-cyclonedx
      uses: taiki-e/install-action@b550161ef8a7bc4f2a671c0b03a18ac9ccedea1e  # v2
      with:
        tool: cargo-cyclonedx

    - name: Determine version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "release" ]; then
          VERSION="${{ github.event.release.tag_name }}"
          # Remove 'v' prefix if present
          VERSION="${VERSION#v}"
        else
          VERSION="${{ github.event.inputs.version }}"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Generating SBOM for version: $VERSION"

    - name: Check the target release exists (attach only if so)
      id: release_check
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # On a `release` event the release exists by definition; on workflow_dispatch it
        # exists when release.yml's trigger-sbom job dispatched us AFTER create-github-release.
        # Gating attach on this (rather than event name) keeps a manual dispatch with a
        # version that has no release from CREATING a spurious release — it becomes a safe
        # generate-only run instead.
        TAG="v${{ steps.version.outputs.version }}"
        if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "Release $TAG exists — the SBOM will be attached to it."
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "::notice::No release $TAG — generating and signing the SBOM only, not attaching."
        fi

    - name: Generate SBOM (CycloneDX JSON)
      run: |
        cargo cyclonedx --format json --all \
          --output-file "fraiseql-${{ steps.version.outputs.version }}-sbom"
        # cargo-cyclonedx appends .cdx.json — rename to expected path
        mv "fraiseql-${{ steps.version.outputs.version }}-sbom.cdx.json" \
           "fraiseql-${{ steps.version.outputs.version }}-sbom.json"

    - name: Validate SBOM schema
      run: |
        # Confirm file is valid JSON with required CycloneDX fields
        jq -e '.bomFormat == "CycloneDX" and .specVersion and .components' \
          "fraiseql-${{ steps.version.outputs.version }}-sbom.json" \
          > /dev/null
        echo "✅ SBOM is valid CycloneDX JSON"

    - name: Install Cosign
      # Take the installer default (cosign 3.x). The previous `cosign-release: v2.6.3`
      # pin existed only to keep the removed `--output-signature`/`--output-certificate`
      # sign-blob flags working; this workflow now emits the cosign 3.x `--bundle`
      # format, so the pin is dropped (#599). The bundle format is forward-stable.
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

    - name: Sign SBOM with Cosign (keyless)
      run: |
        # cosign 3.x sign-blob: a single self-contained `--bundle` (signature +
        # certificate + Rekor entry) replaces the v2 `--output-signature` /
        # `--output-certificate` pair. Verified with `cosign verify-blob --bundle` (#599).
        cosign sign-blob --yes \
          "fraiseql-${{ steps.version.outputs.version }}-sbom.json" \
          --bundle "fraiseql-${{ steps.version.outputs.version }}-sbom.json.bundle"

        echo "✅ SBOM signed with Cosign (keyless, bundle format)"
        echo "   Bundle: fraiseql-${{ steps.version.outputs.version }}-sbom.json.bundle"

    - name: Generate SHA256 checksums
      run: |
        sha256sum "fraiseql-${{ steps.version.outputs.version }}-sbom.json" > \
          "fraiseql-${{ steps.version.outputs.version }}-sbom.json.sha256"

        echo "✅ SHA256 checksum generated"

    - name: Create SBOM artifact bundle
      run: |
        mkdir -p sbom-artifacts
        cp fraiseql-${{ steps.version.outputs.version }}-sbom.json sbom-artifacts/
        cp fraiseql-${{ steps.version.outputs.version }}-sbom.json.bundle sbom-artifacts/
        cp fraiseql-${{ steps.version.outputs.version }}-sbom.json.sha256 sbom-artifacts/

        # Create README for verification
        cat > sbom-artifacts/README.md << 'EOF'
        # FraiseQL SBOM Verification

        ## Files Included

        - `fraiseql-${{ steps.version.outputs.version }}-sbom.json` - CycloneDX SBOM (JSON format)
        - `fraiseql-${{ steps.version.outputs.version }}-sbom.json.bundle` - Cosign signing bundle (keyless: signature + certificate + Rekor entry)
        - `fraiseql-${{ steps.version.outputs.version }}-sbom.json.sha256` - SHA256 checksum

        ## Verify SBOM Integrity

        ### 1. Verify SHA256 Checksum
        ```bash
        sha256sum -c fraiseql-${{ steps.version.outputs.version }}-sbom.json.sha256
        ```

        ### 2. Verify Cosign Signature
        ```bash
        # Requires cosign 3.x (the bundle format). The bundle carries the signature,
        # the signing certificate, and the Rekor transparency-log entry.
        cosign verify-blob \
          --bundle fraiseql-${{ steps.version.outputs.version }}-sbom.json.bundle \
          --certificate-identity-regexp "https://github.com/fraiseql/fraiseql" \
          --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
          fraiseql-${{ steps.version.outputs.version }}-sbom.json
        ```

        ### 3. Validate SBOM Schema
        ```bash
        # Using CycloneDX CLI
        cyclonedx validate --input-file fraiseql-${{ steps.version.outputs.version }}-sbom.json

        # Or using FraiseQL CLI
        pip install fraiseql
        fraiseql sbom validate --input fraiseql-${{ steps.version.outputs.version }}-sbom.json
        ```

        ## SBOM Compliance

        This SBOM complies with global supply chain security standards:
        - 🇺🇸 **US Executive Order 14028** (May 2021) - Software supply chain security
        - 🇪🇺 **EU NIS2 Directive** & **Cyber Resilience Act** - Supply chain transparency
        - 💳 **PCI-DSS 4.0** (Requirement 6.3.2) - Software component inventory
        - 🌐 **ISO 27001:2022** (Control 5.21) - ICT supply chain security
        - **CycloneDX 1.5 Specification** - OWASP SBOM standard
        - **NIST SP 800-161** - Cyber Supply Chain Risk Management

        ## For Procurement & Security Teams

        This SBOM provides:
        1. ✅ Complete dependency inventory
        2. ✅ License compliance information
        3. ✅ Cryptographic integrity verification (SHA256 + Cosign)
        4. ✅ Machine-readable format (CycloneDX JSON)
        5. ✅ Vulnerability database integration (Package URLs)

        ## Questions?

        For SBOM-related questions or procurement inquiries:
        - Email: security@fraiseql.com
        - Repository: https://github.com/fraiseql/fraiseql
        - Documentation: https://fraiseql.readthedocs.io
        EOF

    - name: Upload SBOM artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
      with:
        name: sbom-artifacts-${{ steps.version.outputs.version }}
        path: sbom-artifacts/
        retention-days: 90

    - name: Attach SBOM to Release
      # Runs for BOTH the `release` event and the workflow_dispatch path (release.yml's
      # trigger-sbom job), gated on the release actually existing so a manual generate-only
      # dispatch never creates one. `tag_name` is set explicitly because on workflow_dispatch
      # there is no `github.event.release` to infer it from.
      if: steps.release_check.outputs.exists == 'true'
      uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        files: |
          fraiseql-${{ steps.version.outputs.version }}-sbom.json
          fraiseql-${{ steps.version.outputs.version }}-sbom.json.bundle
          fraiseql-${{ steps.version.outputs.version }}-sbom.json.sha256
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Summary
      run: |
        echo "## 📋 SBOM Generation Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "✅ **Format**: CycloneDX 1.5 (JSON)" >> $GITHUB_STEP_SUMMARY
        echo "✅ **Signed**: Cosign keyless (Sigstore)" >> $GITHUB_STEP_SUMMARY
        echo "✅ **Compliance**: US EO 14028, EU NIS2/CRA, PCI-DSS 4.0, ISO 27001" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Count components
        COMPONENT_COUNT=$(jq '.components | length' "fraiseql-${{ steps.version.outputs.version }}-sbom.json")
        echo "📦 **Total Components**: $COMPONENT_COUNT" >> $GITHUB_STEP_SUMMARY

        # Check for copyleft licenses
        COPYLEFT_COUNT=$(jq '[.components[].licenses[]?.license.id | select(contains("GPL") and (contains("LGPL") | not))] | length' "fraiseql-${{ steps.version.outputs.version }}-sbom.json")
        if [ "$COPYLEFT_COUNT" -gt 0 ]; then
          echo "⚠️  **Copyleft Components**: $COPYLEFT_COUNT (review required)" >> $GITHUB_STEP_SUMMARY
        else
          echo "✅ **No Copyleft Licenses**: Federal-friendly" >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📥 Download Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "SBOM artifacts available in workflow artifacts section" >> $GITHUB_STEP_SUMMARY
