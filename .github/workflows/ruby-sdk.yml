name: Ruby SDK

on:
  push:
    paths:
      - 'sdks/community/fraiseql-ruby/**'
      - '.github/workflows/ruby-sdk.yml'
  pull_request:
    paths:
      - 'sdks/community/fraiseql-ruby/**'
      - '.github/workflows/ruby-sdk.yml'

jobs:
  test:
    name: Ruby ${{ matrix.ruby-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: sdks/community/fraiseql-ruby

    strategy:
      matrix:
        ruby-version: ['3.2', '3.3']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
          working-directory: sdks/community/fraiseql-ruby

      - name: Run RuboCop
        run: bundle exec rubocop --parallel

      - name: Run tests
        run: bundle exec rspec

  publish:
    name: Publish to RubyGems
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/ruby-sdk/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: sdks/community/fraiseql-ruby

      - name: Build gem
        working-directory: sdks/community/fraiseql-ruby
        run: gem build *.gemspec

      - name: Push gem
        working-directory: sdks/community/fraiseql-ruby
        run: gem push *.gem
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
