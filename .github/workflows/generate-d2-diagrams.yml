name: Generate D2 Diagrams

# Hosted CI disabled 2026-05-31 — Dagger CI migration (Track 0). push/PR triggers
# stripped; workflow_dispatch retained as porting spec. See .phases/dagger-adoption/.
on:
  workflow_dispatch:

jobs:
  generate-diagrams:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install D2
        run: |
          curl -fsSL https://d2lang.com/install.sh | sh -s --

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'

      - name: Generate D2 SVG Diagrams
        run: |
          if [ -f tools/embed-d2-diagrams.py ]; then
            python3 tools/embed-d2-diagrams.py docs/
          else
            echo "⚠️ tools/embed-d2-diagrams.py not found, skipping diagram generation"
          fi

      - name: Commit changes
        if: github.event_name == 'push'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          if [[ -n $(git status -s docs/) ]]; then
            git add docs/
            git commit -m "docs: auto-generate D2 diagram SVGs [skip ci]" || true
            git push
          else
            echo "✅ No diagram changes needed"
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8
        with:
          script: |
            const childProcess = require('child_process');

            childProcess.exec('git diff origin/main docs/', (error, stdout) => {
              if (stdout && stdout.includes('```d2')) {
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: '📊 **D2 Diagrams**: This PR contains D2 diagrams. They will be auto-converted to SVG when merged to main.'
                });
              }
            });
