name: Rust SDK

on:
  push:
    paths:
      - 'sdks/official/fraiseql-rust/**'
      - '.github/workflows/rust-sdk.yml'
  pull_request:
    paths:
      - 'sdks/official/fraiseql-rust/**'
      - '.github/workflows/rust-sdk.yml'

env:
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  test:
    name: Rust SDK — ${{ matrix.rust }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: sdks/official/fraiseql-rust

    strategy:
      matrix:
        rust: [stable, beta]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@89e9040de88b577a6c461e13ecb57d8a2f0108ce  # v0.0.9

      - name: Check format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --all-features

      - name: Build (release)
        run: cargo build --release

  publish:
    name: Publish to crates.io
    environment: release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/rust-sdk/v')

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        working-directory: sdks/official/fraiseql-rust
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
