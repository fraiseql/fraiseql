name: TypeScript SDK

on:
  push:
    paths:
      - 'sdks/official/fraiseql-typescript/**'
      - '.github/workflows/typescript-sdk.yml'
  pull_request:
    paths:
      - 'sdks/official/fraiseql-typescript/**'
      - '.github/workflows/typescript-sdk.yml'

jobs:
  test:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: sdks/official/fraiseql-typescript

    strategy:
      matrix:
        node-version: ['20', '22']

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: sdks/official/fraiseql-typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npm run lint --if-present

      - name: Type check
        run: npm run typecheck --if-present || npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build --if-present

  # npm publishing is handled exclusively by .github/workflows/npm-publish.yml
  # (Trusted Publishing / OIDC, no NPM_TOKEN). This workflow is CI-only.
