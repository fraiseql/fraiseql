name: TypeScript SDK

on:
  push:
    paths:
      - 'sdks/official/fraiseql-typescript/**'
      - '.github/workflows/typescript-sdk.yml'
  pull_request:
    paths:
      - 'sdks/official/fraiseql-typescript/**'
      - '.github/workflows/typescript-sdk.yml'

jobs:
  test:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: sdks/official/fraiseql-typescript

    strategy:
      matrix:
        node-version: ['20', '22']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: sdks/official/fraiseql-typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (no-any enforced)
        run: npx eslint src/ --max-warnings 0

      - name: Type check (strict, noUncheckedIndexedAccess)
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build (tsup)
        run: npm run build --if-present

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/typescript-sdk/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: sdks/official/fraiseql-typescript
        run: npm ci

      - name: Build
        working-directory: sdks/official/fraiseql-typescript
        run: npm run build

      - name: Publish
        working-directory: sdks/official/fraiseql-typescript
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
