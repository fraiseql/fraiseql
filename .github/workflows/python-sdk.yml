name: Python SDK

on:
  push:
    paths:
      - 'sdks/official/fraiseql-python/**'
      - '.github/workflows/python-sdk.yml'
  pull_request:
    paths:
      - 'sdks/official/fraiseql-python/**'
      - '.github/workflows/python-sdk.yml'

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/official/fraiseql-python

    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint with ruff
        run: uv run ruff check src tests

      - name: Format check
        run: uv run ruff format --check src tests

      - name: Type check with ty
        run: uv run ty check src || true

      - name: Run tests
        run: PYTHONPATH=src uv run pytest -q

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/python-sdk/v')
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build distribution
        working-directory: sdks/official/fraiseql-python
        run: uv build

      - name: Publish to PyPI
        working-directory: sdks/official/fraiseql-python
        run: uv publish
