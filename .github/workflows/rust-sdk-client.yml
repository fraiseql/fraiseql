name: Rust SDK Client
on:
  push:
    paths: ['sdks/official/fraiseql-rust/fraiseql-client/**']
  pull_request:
    paths: ['sdks/official/fraiseql-rust/fraiseql-client/**']

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae  # v2
        with:
          workspaces: sdks/official/fraiseql-rust/fraiseql-client
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: sdks/official/fraiseql-rust/fraiseql-client
      - name: Test
        run: cargo test --all-features
        working-directory: sdks/official/fraiseql-rust/fraiseql-client
      - name: Doc
        run: cargo doc --no-deps 2>&1 | grep -c "^warning" | xargs -I{} test {} -eq 0 || true
        working-directory: sdks/official/fraiseql-rust/fraiseql-client
