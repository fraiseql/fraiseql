name: PHP SDK

on:
  push:
    paths:
      - 'sdks/official/fraiseql-php/**'
      - '.github/workflows/php-sdk.yml'
  pull_request:
    paths:
      - 'sdks/official/fraiseql-php/**'
      - '.github/workflows/php-sdk.yml'

jobs:
  test:
    name: PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: sdks/official/fraiseql-php

    strategy:
      matrix:
        php-version: ['8.2', '8.3']

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: json
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run PHPStan (level 8)
        run: vendor/bin/phpstan analyse src --level 8

      - name: Check code style
        run: vendor/bin/php-cs-fixer check src --diff

      - name: Run tests
        run: vendor/bin/phpunit

  publish:
    name: Publish to Packagist
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/php-sdk/v')

    steps:
      - name: Notify Packagist
        run: |
          curl -XPOST -H'content-type:application/json' \
            "https://packagist.org/api/update-package?username=${{ secrets.PACKAGIST_USERNAME }}&apiToken=${{ secrets.PACKAGIST_API_TOKEN }}" \
            -d'{"repository":{"url":"https://github.com/${{ github.repository }}"}}'
