name: REST Transport

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  rest-transport:
    name: REST Transport Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: OpenAPI generator tests
        run: cargo test -p fraiseql-core --lib -- openapi
      - name: REST transport unit tests
        run: cargo test -p fraiseql-server --features rest-transport --lib -- rest
      - name: REST transport clippy
        run: cargo clippy -p fraiseql-server --features rest-transport -- -D warnings
