name: SDK Schema Parity

on:
  push:
    paths:
      - 'sdks/official/fraiseql-python/**'
      - 'sdks/official/fraiseql-typescript/**'
      - 'sdks/official/fraiseql-go/**'
      - 'sdks/official/fraiseql-java/**'
      - 'tools/compare_parity_schemas.py'
  pull_request:
    paths:
      - 'sdks/official/fraiseql-python/**'
      - 'sdks/official/fraiseql-typescript/**'
      - 'sdks/official/fraiseql-go/**'
      - 'sdks/official/fraiseql-java/**'
      - 'tools/compare_parity_schemas.py'

# Cancel in-progress runs for the same branch
concurrency:
  group: sdk-parity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-typescript-parity:
    name: Python ↔ TypeScript schema parity
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Python SDK
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install Python SDK dependencies
        working-directory: sdks/official/fraiseql-python
        run: uv sync

      - name: Generate schema via Python SDK
        working-directory: sdks/official/fraiseql-python
        run: uv run python tests/generate_parity_schema.py > /tmp/schema_python.json

      # -----------------------------------------------------------------------
      # TypeScript SDK
      # -----------------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdks/official/fraiseql-typescript/package-lock.json

      - name: Install TypeScript SDK dependencies
        working-directory: sdks/official/fraiseql-typescript
        run: npm ci

      - name: Generate schema via TypeScript SDK
        working-directory: sdks/official/fraiseql-typescript
        run: npx tsx tests/generate-parity-schema.ts > /tmp/schema_ts.json

      # -----------------------------------------------------------------------
      # Structural comparison
      # -----------------------------------------------------------------------
      - name: Compare Python and TypeScript schema outputs
        run: python3 tools/compare_parity_schemas.py /tmp/schema_python.json /tmp/schema_ts.json

      - name: Upload schema artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: parity-schemas-python-ts
          path: |
            /tmp/schema_python.json
            /tmp/schema_ts.json
          retention-days: 7

  python-go-parity:
    name: Python ↔ Go schema parity
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Python SDK
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install Python SDK dependencies
        working-directory: sdks/official/fraiseql-python
        run: uv sync

      - name: Generate schema via Python SDK
        working-directory: sdks/official/fraiseql-python
        run: uv run python tests/generate_parity_schema.py > /tmp/schema_python.json

      # -----------------------------------------------------------------------
      # Go SDK
      # -----------------------------------------------------------------------
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: sdks/official/fraiseql-go/go.sum

      - name: Generate schema via Go SDK
        working-directory: sdks/official/fraiseql-go
        env:
          SCHEMA_OUTPUT_FILE: /tmp/schema_go.json
        run: go test -run TestGenerateParitySchema -v ./fraiseql/

      # -----------------------------------------------------------------------
      # Structural comparison
      # -----------------------------------------------------------------------
      - name: Compare Python and Go schema outputs
        run: python3 tools/compare_parity_schemas.py /tmp/schema_python.json /tmp/schema_go.json

      - name: Upload schema artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: parity-schemas-python-go
          path: |
            /tmp/schema_python.json
            /tmp/schema_go.json
          retention-days: 7

  python-java-parity:
    name: Python ↔ Java schema parity
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Python SDK
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install Python SDK dependencies
        working-directory: sdks/official/fraiseql-python
        run: uv sync

      - name: Generate schema via Python SDK
        working-directory: sdks/official/fraiseql-python
        run: uv run python tests/generate_parity_schema.py > /tmp/schema_python.json

      # -----------------------------------------------------------------------
      # Java SDK
      # -----------------------------------------------------------------------
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Generate schema via Java SDK
        working-directory: sdks/official/fraiseql-java
        run: mvn -q test -Dtest=GenerateParitySchema -DschemaOutputFile=/tmp/schema_java.json

      # -----------------------------------------------------------------------
      # Structural comparison
      # -----------------------------------------------------------------------
      - name: Compare Python and Java schema outputs
        run: python3 tools/compare_parity_schemas.py /tmp/schema_python.json /tmp/schema_java.json

      - name: Upload schema artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: parity-schemas-python-java
          path: |
            /tmp/schema_python.json
            /tmp/schema_java.json
          retention-days: 7
