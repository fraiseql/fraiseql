          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Generate schema via Java SDK
        working-directory: sdks/official/fraiseql-java
        run: mvn -q test -Dtest=GenerateParitySchema -DschemaOutputFile=/tmp/schema_java.json

      # -----------------------------------------------------------------------
      # Structural comparison
      # -----------------------------------------------------------------------
      - name: Compare Python and Java schema outputs
        run: python3 tools/compare_parity_schemas.py /tmp/schema_python.json /tmp/schema_java.json

      - name: Upload schema artifacts on failure
