name: C# SDK

on:
  push:
    branches: [dev, main]
    paths:
      - 'sdks/official/fraiseql-csharp/**'
      - '.github/workflows/csharp-sdk.yml'
  pull_request:
    paths:
      - 'sdks/official/fraiseql-csharp/**'
      - '.github/workflows/csharp-sdk.yml'
  release:
    types: [published]

jobs:
  test:
    name: .NET ${{ matrix.dotnet-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: sdks/official/fraiseql-csharp

    strategy:
      matrix:
        dotnet-version: ['8.0.x', '9.0.x']

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
      - name: Restore
        run: dotnet restore
      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore
      - name: Test
        run: dotnet test --no-build --configuration Release --logger trx

  publish:
    needs: test
    environment: release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/csharp-sdk/v')
    defaults:
      run:
        working-directory: sdks/official/fraiseql-csharp
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore
      - name: Pack library
        run: dotnet pack src/FraiseQL/FraiseQL.csproj --configuration Release --output nupkg
      - name: Pack tool
        run: dotnet pack src/FraiseQL.Tool/FraiseQL.Tool.csproj --configuration Release --output nupkg
      - name: Push to NuGet
        run: dotnet nuget push nupkg/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }}
