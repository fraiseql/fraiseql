name: Load Tests

# Hosted CI disabled 2026-05-31 — Dagger CI migration (Track 0). schedule trigger
# stripped; workflow_dispatch (with inputs) retained as porting spec. See .phases/dagger-adoption/.
on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "K6 scenario to run"
        default: "mixed-workload"
        type: choice
        options:
          - mixed-workload
          - graphql-queries
          - graphql-mutations
          - auth-flow
          - apq-cache

jobs:
  load-test:
    name: K6 load test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: fraiseql_test_password
          POSTGRES_USER: fraiseql_test
          POSTGRES_DB: test_fraiseql
        options: >-
          --health-cmd "pg_isready -U fraiseql_test -d test_fraiseql"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae  # v2

      - name: Install mold linker
        run: |
          sudo apt-get update
          sudo apt-get install -y mold

      - name: Build release binary
        run: cargo build --release -p fraiseql-server

      - name: Verify schema file exists
        run: |
          if [ ! -f docker/e2e/schema.compiled.json ]; then
            echo "::error::Schema file docker/e2e/schema.compiled.json not found"
            exit 1
          fi

      - name: Initialize test database
        run: |
          psql -h localhost -p 5433 -U fraiseql_test -d test_fraiseql -f tests/sql/postgres/init.sql
          psql -h localhost -p 5433 -U fraiseql_test -d test_fraiseql -f tests/sql/postgres/init-analytics.sql
        env:
          PGPASSWORD: fraiseql_test_password

      - name: Start FraiseQL server
        run: |
          ./target/release/fraiseql-server &
          # Wait for health endpoint
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Server is healthy"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Server failed to start within 60s"
              exit 1
            fi
            sleep 2
          done
        env:
          DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          FRAISEQL_SCHEMA_PATH: docker/e2e/schema.compiled.json
          FRAISEQL_ENV: development

      - name: Install k6
        uses: grafana/setup-k6-action@c00053c996b4061198c9c24a00474b748abdf8b7  # v1

      - name: Run load test
        run: |
          SCENARIO="${{ github.event.inputs.scenario || 'mixed-workload' }}"
          k6 run "load-tests/k6/scenarios/${SCENARIO}.js" \
            --out json=k6-results.json \
            --summary-export=k6-summary.json
        env:
          ENDPOINT: http://localhost:8000/graphql

      - name: Upload results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: k6-results-${{ github.run_id }}
          path: |
            k6-results.json
            k6-summary.json
          retention-days: 30
