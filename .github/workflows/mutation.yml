name: Mutation Testing

# Hosted CI disabled 2026-05-31 — Dagger CI migration (Track 0). schedule/PR triggers
# stripped; workflow_dispatch retained as porting spec. See .phases/dagger-adoption/.
on:
  workflow_dispatch:

# Cancel in-progress runs for the same PR
concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

env:
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  # Core engine mutation tests (original scope)
  mutants-core:
    name: cargo-mutants (fraiseql-core)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad  # v0.0.9
      - name: Install cargo-mutants and cargo-nextest
        run: cargo install cargo-mutants --locked && cargo install cargo-nextest --locked
      - name: Pre-build baseline
        run: cargo build --tests -p fraiseql-core
      - name: Run mutation tests
        run: |
          cargo mutants --package fraiseql-core \
            --test-tool nextest \
            --build-timeout 600 \
            --jobs 1 \
            --file src/cache/key.rs \
            --file src/security/query_validator.rs \
            --timeout 60 \
            --output mutants-report-core/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: mutants-report-core
          path: mutants-report-core/
          retention-days: 30

  # Security-critical: auth (PKCE + JWKS)
  mutants-auth:
    name: cargo-mutants (fraiseql-auth)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad  # v0.0.9
      - name: Install cargo-mutants and cargo-nextest
        run: cargo install cargo-mutants --locked && cargo install cargo-nextest --locked
      - name: Pre-build baseline
        run: cargo build --tests -p fraiseql-auth
      - name: Run mutation tests
        run: |
          cargo mutants --package fraiseql-auth \
            --test-tool nextest \
            --build-timeout 600 \
            --jobs 1 \
            --file src/pkce.rs \
            --file src/jwks.rs \
            --timeout 60 \
            --output mutants-report-auth/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: mutants-report-auth
          path: mutants-report-auth/
          retention-days: 30

  # Security-critical: SQL generation (injection prevention)
  mutants-db:
    name: cargo-mutants (fraiseql-db)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad  # v0.0.9
      - name: Install cargo-mutants and cargo-nextest
        run: cargo install cargo-mutants --locked && cargo install cargo-nextest --locked
      - name: Pre-build baseline
        run: cargo build --tests -p fraiseql-db
      - name: Run mutation tests
        run: |
          cargo mutants --package fraiseql-db \
            --test-tool nextest \
            --build-timeout 600 \
            --jobs 1 \
            --file src/where_sql_generator.rs \
            --timeout 60 \
            --output mutants-report-db/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: mutants-report-db
          path: mutants-report-db/
          retention-days: 30

  # Security-critical: federation SSRF protection
  mutants-federation:
    name: cargo-mutants (fraiseql-federation)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad  # v0.0.9
      - name: Install cargo-mutants and cargo-nextest
        run: cargo install cargo-mutants --locked && cargo install cargo-nextest --locked
      - name: Pre-build baseline
        run: cargo build --tests -p fraiseql-federation
      - name: Run mutation tests
        run: |
          cargo mutants --package fraiseql-federation \
            --test-tool nextest \
            --build-timeout 600 \
            --jobs 1 \
            --file src/http_resolver.rs \
            --timeout 60 \
            --output mutants-report-federation/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: mutants-report-federation
          path: mutants-report-federation/
          retention-days: 30
