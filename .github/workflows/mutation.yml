name: Mutation Testing

on:
  schedule:
    - cron: '0 2 * * 1'  # Weekly, Monday 02:00 UTC
  workflow_dispatch:

jobs:
  mutants:
    name: cargo-mutants (fraiseql-core priority files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked
      - name: Run mutation tests
        run: |
          cargo mutants \
            --package fraiseql-core \
            --file crates/fraiseql-core/src/cache/key.rs \
            --file crates/fraiseql-core/src/runtime/executor/query.rs \
            --file crates/fraiseql-core/src/compiler/aggregation.rs \
            --file crates/fraiseql-core/src/cache/adapter/query.rs \
            --file crates/fraiseql-core/src/cache/adapter/mutation.rs \
            --file crates/fraiseql-core/src/runtime/executor/mutation.rs \
            --file crates/fraiseql-error/src/core_error.rs \
            --file crates/fraiseql-error/src/http.rs \
            --timeout 90 \
            --output mutants-report \
            -C --lib \
            -C --test=mutant_targeted_cache_key \
            -C --test=mutant_targeted_cache_adapter \
            -C --test=mutant_targeted_aggregation
      - name: Check mutation survival rate
        run: |
          python3 tools/check-mutation-rate.py mutants-report --max-rate 0.30
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutants-report
          path: mutants-report/
