name: Benchmark Regression Detection

# Hosted CI disabled 2026-05-31 — Dagger CI migration (Track 0). push/PR triggers
# stripped; workflow_dispatch retained as porting spec. See .phases/dagger-adoption/.
on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  criterion-benchmarks:
    name: Criterion Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad  # v0.0.9

      # On dev pushes: save baseline for future PR comparisons
      - name: Run benchmarks (save baseline)
        if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
        run: |
          cargo bench --workspace -- --save-baseline dev 2>&1 | tee /tmp/bench-output.txt
          # Criterion stores baselines in target/criterion/*/dev/

      - name: Upload baseline artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: criterion-baseline-dev
          path: target/criterion/
          retention-days: 14

      # On PRs: compare against dev baseline
      - name: Download dev baseline
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6
        with:
          name: criterion-baseline-dev
          path: target/criterion/
        continue-on-error: true  # First PR run has no baseline yet

      - name: Run benchmarks (compare against baseline)
        if: github.event_name == 'pull_request'
        run: |
          cargo bench --workspace -- --baseline dev 2>&1 | tee /tmp/bench-output.txt || true

      - name: Check for regressions
        if: github.event_name == 'pull_request'
        run: |
          # Parse Criterion output for regressions (lines containing "regressed")
          if grep -qi "regressed" /tmp/bench-output.txt; then
            echo "::warning::Performance regressions detected in Criterion benchmarks"
            grep -i "regressed" /tmp/bench-output.txt
            # Non-blocking for now — enable exit 1 once baseline is stable
          else
            echo "No regressions detected"
          fi
