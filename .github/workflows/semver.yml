name: semver-checks

# Detects accidental breaking API changes against the latest published baseline.
#
# Triggered on `workflow_dispatch` only — the workspace-wide
# `cargo semver-checks check-release --workspace` takes >60 min on the default
# 2-vCPU runner and consistently cancels on the per-PR path, so it ran for cost
# with no actionable signal. The focused `API Semver Compatibility` job in
# `ci.yml` (5 named crates, --baseline-rev v<latest>) still runs on every PR and
# is the gate that matters. Run this workflow manually before a release tag, or
# weekly via the GitHub Actions UI.

on:
  workflow_dispatch:

jobs:
  semver:
    name: API semver compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # Skip release-prep branches — they intentionally bump version numbers.
    if: "!contains(github.head_ref, 'release-prep')"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae  # v2

      - name: Install mold linker
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y mold

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked

      # Compare the PR branch against the latest published crates.io baseline.
      # --workspace covers all public crates in the monorepo.
      # Features omitted intentionally: semver-checks inspects public API
      # signatures which are feature-gated; the default feature set is sufficient
      # for detecting breaking changes in the core API surface.
      - name: Check semver compatibility
        run: |
          cargo semver-checks check-release \
            --workspace \
            --exclude fraiseql-test-utils \
            --baseline-rev HEAD~1
