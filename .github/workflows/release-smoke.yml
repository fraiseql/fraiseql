name: Release Smoke

# Purpose: catch any startup-only panic before crates.io publish.
# This is the explicit safety net for router-constructor sites that aren't
# unit-tested individually (see `crates/fraiseql-server/src/server/routing/`
# auth/admin/graphql sub-routers). Issue #316 — an axum 0.7 `:param` capture
# missed by the 0.7 → 0.8 migration — only surfaced because a user ran the
# published binary; the bug class is "code compiles, server panics on boot."
#
# Boots `fraiseql-server` against the existing e2e fixture (docker/e2e/),
# asserts the default health endpoint responds within ~30s, and then runs one
# real GraphQL query through the full parse → SQL → execute → serialize pipeline
# (coverage gap §5: smoke more than /health). Mirrors the `integration-http-e2e`
# job in ci.yml but is wired to release-track events so a failure blocks release.

on:
  push:
    branches:
      - 'release/*'
    tags:
      - 'v*'
  pull_request:
    branches:
      - 'release/*'
  workflow_dispatch:

concurrency:
  group: release-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Server boot smoke
    runs-on: ubuntu-latest
    # 30 min: the default-features build + boot, then a second build with the
    # native runtime mounted (functions-runtime-deno pulls a prebuilt V8 + swc).
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: fraiseql_test_password
          POSTGRES_USER: fraiseql_test
          POSTGRES_DB: test_fraiseql
        options: >-
          --health-cmd "pg_isready -U fraiseql_test -d test_fraiseql"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Apply E2E database schema
        run: |
          PGPASSWORD=fraiseql_test_password psql \
            -h localhost -p 5433 -U fraiseql_test -d test_fraiseql \
            -f docker/e2e/init-postgres.sql

      - name: Build fraiseql-server (release profile)
        run: cargo build --release -p fraiseql-server

      - name: Start fraiseql-server
        run: |
          ./target/release/fraiseql-server &
          echo $! > /tmp/fraiseql-server.pid
        env:
          DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          FRAISEQL_SCHEMA_PATH: docker/e2e/schema.compiled.json
          FRAISEQL_BIND_ADDR: 127.0.0.1:8815
          FRAISEQL_INTROSPECTION_ENABLED: "true"
          FRAISEQL_INTROSPECTION_REQUIRE_AUTH: "false"
          FRAISEQL_ENV: development
          RUST_LOG: info

      - name: Wait for /health to respond
        run: |
          set -eu
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8815/health; then
              echo
              echo "Server is up after ~$((i * 1)) attempt(s)."
              exit 0
            fi
            # If the process already died, surface that instead of waiting 30s.
            if ! kill -0 "$(cat /tmp/fraiseql-server.pid)" 2>/dev/null; then
              echo "::error::fraiseql-server process exited before /health responded — likely a startup panic." >&2
              exit 1
            fi
            sleep 1
          done
          echo "::error::Timed out waiting for /health after 30s." >&2
          exit 1

      - name: Smoke a GraphQL query (parse → SQL → execute → serialize)
        run: |
          set -eu
          # The e2e fixture exposes a `users` list query over v_users (init-postgres.sql
          # seeds one row). A 200 with a `data.users` payload and no `errors` exercises
          # the full query pipeline — strictly more than /health, which only proves the
          # router mounted.
          status=$(curl -s -o /tmp/gql.json -w '%{http_code}' \
            -X POST http://127.0.0.1:8815/graphql \
            -H 'Content-Type: application/json' \
            -d '{"query":"{ users { id name } }"}')
          echo "HTTP $status"; cat /tmp/gql.json; echo
          test "$status" = "200" || { echo "::error::/graphql returned HTTP $status (expected 200)" >&2; exit 1; }
          grep -q '"data"'  /tmp/gql.json || { echo "::error::/graphql response missing data" >&2; exit 1; }
          grep -q '"users"' /tmp/gql.json || { echo "::error::/graphql response missing users field" >&2; exit 1; }
          if grep -q '"errors"' /tmp/gql.json; then
            echo "::error::/graphql response contained errors" >&2; exit 1
          fi
          echo "GraphQL query smoke OK."

      - name: Smoke the root __typename health probe (#450)
        run: |
          set -eu
          # `{ __typename }` is the canonical zero-cost "is this a reachable GraphQL
          # endpoint" probe used by many clients/test harnesses. It must resolve to
          # the root operation type name ("Query") — #450 regressed this to a
          # "Query '__typename' not found in schema" validation error.
          status=$(curl -s -o /tmp/typename.json -w '%{http_code}' \
            -X POST http://127.0.0.1:8815/graphql \
            -H 'Content-Type: application/json' \
            -d '{"query":"{ __typename }"}')
          echo "HTTP $status"; cat /tmp/typename.json; echo
          test "$status" = "200" || { echo "::error::/graphql __typename returned HTTP $status (expected 200)" >&2; exit 1; }
          grep -q '"__typename"[[:space:]]*:[[:space:]]*"Query"' /tmp/typename.json \
            || { echo "::error::/graphql { __typename } did not resolve to \"Query\"" >&2; exit 1; }
          if grep -q '"errors"' /tmp/typename.json; then
            echo "::error::/graphql { __typename } response contained errors" >&2; exit 1
          fi
          echo "Root __typename probe smoke OK."

      # #487: the default boot above runs with sql_source validation OFF (the
      # production default). Boot a second time with it ON to prove the opt-in
      # fail-fast check does not wedge boot on a fully-backed schema — the e2e
      # fixture declares one source (`v_users`), created by init-postgres.sql.
      - name: Stop server (flag-off run)
        run: kill "$(cat /tmp/fraiseql-server.pid 2>/dev/null)" 2>/dev/null || true

      - name: Boot with sql_source validation ON (#487)
        run: |
          ./target/release/fraiseql-server &
          echo $! > /tmp/fraiseql-server.pid
        env:
          DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          FRAISEQL_SCHEMA_PATH: docker/e2e/schema.compiled.json
          FRAISEQL_BIND_ADDR: 127.0.0.1:8816
          FRAISEQL_VALIDATE_SQL_SOURCES: "true"
          FRAISEQL_INTROSPECTION_ENABLED: "true"
          FRAISEQL_INTROSPECTION_REQUIRE_AUTH: "false"
          FRAISEQL_ENV: development
          RUST_LOG: info

      - name: Wait for /health with sql_source validation ON
        run: |
          set -eu
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8816/health; then
              echo
              echo "Server booted healthy with FRAISEQL_VALIDATE_SQL_SOURCES=true after ~$((i * 1))s."
              exit 0
            fi
            if ! kill -0 "$(cat /tmp/fraiseql-server.pid)" 2>/dev/null; then
              echo "::error::server exited before /health with sql_source validation ON — the boot check rejected a backed fixture or wedged boot." >&2
              exit 1
            fi
            sleep 1
          done
          echo "::error::Timed out waiting for /health (sql_source validation ON) after 30s." >&2
          exit 1

      # The native functions runtime (functions-runtime-deno + inbound-email) is a
      # promoted-to-stable feature whose startup path — registering the V8/Deno and
      # WASM runtimes, mounting the after:mutation dispatch hooks, wiring the inbound
      # source — only runs when the feature is compiled in. A default-features boot
      # never exercises it, so a panic in that feature-gated startup code (the exact
      # "compiles but panics on boot" class this workflow guards) would ship
      # unnoticed. Rebuild with the runtime mounted and prove it still boots healthy.
      - name: Stop server (sql_source-ON run)
        run: kill "$(cat /tmp/fraiseql-server.pid 2>/dev/null)" 2>/dev/null || true

      - name: Build fraiseql-server with the full platform feature surface mounted
        # The shipped `-full` release variant (phase 01) compiles the whole stable
        # platform surface: functions-runtime-deno + sources + inbound-email +
        # observers + mcp + metrics. Boot the server binary with the SAME surface so
        # a panic in any feature-gated startup path (V8/Deno + WASM registration,
        # after:mutation dispatch mounts, inbound source wiring, the /mcp nest, the
        # /metrics recorder) is caught here — the "compiles but panics on boot" guard,
        # now covering everything the `-full` artifact ships. The /mcp route itself
        # only nests when the compiled schema declares mcp config, so this fixture
        # (no mcp block) proves the feature compiles + does not panic at boot; the
        # functional /mcp + Deno-fires + source-ticks checks live in the Dagger suites.
        run: cargo build --release -p fraiseql-server --features functions-runtime-deno,inbound-email,sources,mcp,metrics,observers

      # Boot against a schema that declares a scheduled source (#573). With the
      # `sources` feature compiled in, this reaches the feature-gated source-scheduler
      # startup block a sources-less schema never touches (reading the compiled
      # `sources` and — when the functions subsystem is present — initializing the
      # cursor table and building the pollers). It is the "compiles but panics on
      # boot" guard for that startup code; the full poller wiring is covered
      # functionally by the Dagger source suite.
      - name: Boot with the native runtime mounted (+ a scheduled source)
        run: |
          ./target/release/fraiseql-server &
          echo $! > /tmp/fraiseql-server.pid
        env:
          DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          FRAISEQL_SCHEMA_PATH: docker/e2e/schema.with-source.compiled.json
          FRAISEQL_BIND_ADDR: 127.0.0.1:8817
          FRAISEQL_INTROSPECTION_ENABLED: "true"
          FRAISEQL_INTROSPECTION_REQUIRE_AUTH: "false"
          FRAISEQL_ENV: development
          RUST_LOG: info

      - name: Wait for /health (native runtime mounted + source scheduler)
        run: |
          set -eu
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8817/health; then
              echo
              echo "Server booted healthy with the full platform surface (functions-runtime-deno + inbound-email + sources + mcp + metrics) after ~$((i * 1))s."
              exit 0
            fi
            if ! kill -0 "$(cat /tmp/fraiseql-server.pid)" 2>/dev/null; then
              echo "::error::server exited before /health with the full platform surface mounted — a panic in the runtime/inbound/source/mcp/metrics startup path." >&2
              exit 1
            fi
            sleep 1
          done
          echo "::error::Timed out waiting for /health (full platform surface) after 30s." >&2
          exit 1

      - name: Stop server
        if: always()
        run: kill "$(cat /tmp/fraiseql-server.pid 2>/dev/null)" 2>/dev/null || true

  # ── Assert against the ACTUAL published -full artifact ──────────────────────
  # A local `cargo build --features release-full` proves nothing about what got
  # published: the previous "link check" step rebuilt the umbrella from source and
  # let the #643 defect ship (the -full tarball shipped only the umbrella binary,
  # whose `fraiseql run` silently drops server.toml platform sections; the real
  # `--config` server was never in the tarball). release.yml's build-binaries job is
  # itself the "does the -full artifact link" gate; THIS job is the "does the
  # published artifact actually work" gate — it downloads the real asset and boots it.
  verify-published-full:
    name: Verify published -full artifact
    # Tag-only: the published -full asset exists only on a v* release tag. On
    # release/* branches and workflow_dispatch there is nothing published to
    # download, so this job is skipped there.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Generous: this job POLLS for the -full asset, which release.yml's build-binaries
    # job produces in parallel (V8 + two binaries — tens of minutes), then downloads
    # and boots it. It exits as soon as the asset appears (typically well under the cap).
    timeout-minutes: 90
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: fraiseql_test_password
          POSTGRES_USER: fraiseql_test
          POSTGRES_DB: test_fraiseql
        options: >-
          --health-cmd "pg_isready -U fraiseql_test -d test_fraiseql"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
    env:
      GH_TOKEN: ${{ github.token }}
      ASSET: fraiseql-full-x86_64-unknown-linux-gnu.tar.gz
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Apply E2E database schema
        run: |
          PGPASSWORD=fraiseql_test_password psql \
            -h localhost -p 5433 -U fraiseql_test -d test_fraiseql \
            -f docker/e2e/init-postgres.sql

      - name: Wait for the published -full linux asset, then download it
        run: |
          set -eu
          TAG="${GITHUB_REF_NAME}"
          echo "Waiting for $ASSET on release $TAG (release.yml builds it in parallel)..."
          for i in $(seq 1 120); do
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets \
                 --jq '.assets[].name' 2>/dev/null | grep -qx "$ASSET"; then
              echo "Asset present after ~$((i * 40))s."
              gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
                --pattern "$ASSET" --dir /tmp/full --clobber
              exit 0
            fi
            sleep 40
          done
          echo "::error::$ASSET never appeared on release $TAG within ~80min — the -full build failed or did not upload." >&2
          exit 1

      - name: Extract and assert BOTH binaries are present (#643)
        run: |
          set -eu
          mkdir -p /tmp/full/extract
          tar xzf "/tmp/full/$ASSET" -C /tmp/full/extract
          ls -la /tmp/full/extract
          test -x /tmp/full/extract/fraiseql \
            || { echo "::error::published -full tarball is missing the 'fraiseql' binary" >&2; exit 1; }
          test -x /tmp/full/extract/fraiseql-server \
            || { echo "::error::published -full tarball is missing the 'fraiseql-server' binary — #643 regression: the -full artifact must ship the --config production server" >&2; exit 1; }
          /tmp/full/extract/fraiseql --version
          /tmp/full/extract/fraiseql-server --version
          echo "Both binaries present in the published -full tarball."

      - name: Boot the published fraiseql-server via --config (metrics platform section)
        run: |
          set -eu
          # A full server.toml driven entirely through --config: schema/db/bind AND a
          # platform feature (metrics) that is OFF by default. This is exactly what
          # `fraiseql run` could NOT do (#643); the shipped fraiseql-server must.
          cat > /tmp/full/server.toml <<'TOML'
          schema_path = "docker/e2e/schema.compiled.json"
          database_url = "postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql"
          bind_addr = "127.0.0.1:8818"
          introspection_enabled = true
          introspection_require_auth = false
          metrics_enabled = true
          TOML
          /tmp/full/extract/fraiseql-server --config /tmp/full/server.toml &
          echo $! > /tmp/fraiseql-published.pid
        env:
          FRAISEQL_ENV: development
          RUST_LOG: info

      - name: Assert /health AND /metrics respond (--config drove a platform section)
        run: |
          set -eu
          up=0
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8818/health; then
              echo; echo "Published fraiseql-server booted via --config after ~${i}s."
              up=1; break
            fi
            if ! kill -0 "$(cat /tmp/fraiseql-published.pid)" 2>/dev/null; then
              echo "::error::published fraiseql-server exited before /health — the shipped --config server does not boot." >&2
              exit 1
            fi
            sleep 1
          done
          test "$up" = "1" || { echo "::error::timed out waiting for published fraiseql-server /health" >&2; exit 1; }
          # metrics_enabled=true came ONLY from --config; /metrics responding proves the
          # shipped server honored a platform section from server.toml — unlike
          # `fraiseql run`, which silently drops them (#643).
          code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8818/metrics)
          test "$code" = "200" \
            || { echo "::error::/metrics returned HTTP $code — metrics_enabled from --config was not honored" >&2; exit 1; }
          echo "Published fraiseql-server honored [metrics] from --config (/metrics HTTP 200)."

      - name: Stop published server
        if: always()
        run: kill "$(cat /tmp/fraiseql-published.pid 2>/dev/null)" 2>/dev/null || true

      - name: Assert `fraiseql run` warns (never silently drops) on ignored sections (#643)
        run: |
          set -eu
          cat > /tmp/full/run.toml <<'TOML'
          [server]
          port = 8899

          [database]
          url = "postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql"

          [observers]
          TOML
          # `fraiseql run` reads only [server]/[database]; the [observers] section must
          # produce a loud warning pointing at fraiseql-server, not a silent drop. The
          # warning fires during config load (before serve), so a short timeout is
          # enough; the subsequent serve/compile outcome is irrelevant to this assertion.
          timeout 25 /tmp/full/extract/fraiseql run /tmp/full/run.toml > /tmp/run.out 2>&1 || true
          cat /tmp/run.out
          grep -q "are ignored" /tmp/run.out \
            || { echo "::error::published 'fraiseql run' did not warn about the ignored [observers] section (#643 regression)" >&2; exit 1; }
          grep -q "fraiseql-server" /tmp/run.out \
            || { echo "::error::published 'fraiseql run' warning did not point at fraiseql-server" >&2; exit 1; }
          echo "'fraiseql run' loudly warns about ignored config sections and points at fraiseql-server."
