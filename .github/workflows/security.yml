name: Security Audit (PR Gate)

# Lightweight PR gate — full audit/deny runs in security-compliance.yml
# Hosted CI disabled 2026-05-31 — Dagger CI migration (Track 0). pull_request trigger
# stripped; workflow_dispatch added so the YAML stays runnable as porting spec.
# See .phases/dagger-adoption/.
on:
  workflow_dispatch:

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4
        with:
          fail-on-severity: high
