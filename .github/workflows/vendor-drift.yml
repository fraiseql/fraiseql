name: Vendor drift check

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  schedule:
    # Run weekly on Monday at 08:00 UTC
    - cron: "0 8 * * 1"

jobs:
  graphql-parser-drift:
    name: Check graphql-parser vendor drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Check graphql-parser vendor drift
        run: |
          PATCHED=$(grep '^version' vendor/graphql-parser/Cargo.toml.orig 2>/dev/null \
            | grep -oP '\d+\.\d+\.\d+' | head -1)
          if [ -z "$PATCHED" ]; then
            PATCHED=$(grep '^version' vendor/graphql-parser/Cargo.toml \
              | grep -oP '\d+\.\d+\.\d+' | head -1)
          fi

          LATEST=$(cargo search graphql-parser --limit 1 2>/dev/null \
            | grep -oP '\d+\.\d+\.\d+' | head -1)

          echo "Vendored version : ${PATCHED}"
          echo "Upstream (crates.io): ${LATEST}"

          if [ -n "$LATEST" ] && [ "$LATEST" != "$PATCHED" ]; then
            echo "::warning file=vendor/graphql-parser/PATCH.md::graphql-parser upstream \
(${LATEST}) differs from vendored (${PATCHED}). \
Check vendor/graphql-parser/PATCH.md for unblock conditions."
          else
            echo "No drift detected."
          fi
