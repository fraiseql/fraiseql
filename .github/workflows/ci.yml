name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:
    inputs:
      run_ignored_tests:
        description: 'Run ignored tests (requires manual trigger)'
        required: false
        default: false
        type: boolean

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  # Check code formatting
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly (for rustfmt)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

  # Enforce test utility adoption (no bare DATABASE_URL in test files)
  check-test-imports:
    name: Check Test Imports
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Check test imports
        run: bash tools/check-test-imports.sh

  # Lint with Clippy
  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    # Full workspace compilation + linting
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          components: clippy

      - name: Run Clippy
        # --all-features is avoided because test-postgres/test-mysql/test-sqlserver
        # compile database integration test code that requires infrastructure not
        # available on CI lint runners.
        # SYNC:CORE_FEATURES — keep in sync with other SYNC:CORE_FEATURES locations
        run: cargo clippy --all-targets --features "arrow,grpc,kafka,mysql,postgres,redis-apq,rich-filters,schema-lint,sqlite,sqlserver,test-utils,wire-backend" -- -D warnings

      - name: Check unwrap allow drift
        run: make lint-unwrap UNWRAP_ALLOW_LIMIT=3

      - name: Check empty expect() calls
        run: make lint-expect

      - name: Check async_trait usage count
        run: make lint-async-trait
        # Prevents new dyn-dispatch traits from being added without the RFC 3425 tracking comment.
        # Baseline: 128 usages (annotation complete). Only remove when RTN + Send is stable.

      - name: Check fraiseql-db cast lint scope
        run: make lint-gate-db
        # Ensures HIGH-risk cast lints (cast_possible_truncation, cast_precision_loss,
        # cast_sign_loss) are never re-added at crate level in fraiseql-db.
        # These must be at function or module level with a Reason: comment.

      - name: Check fraiseql-core cast lint scope
        run: make lint-gate-core
        # Ensures narrow cast allows in fraiseql-core do not exceed 20 per-site annotations.
        # All casts must have a Reason: comment explaining why truncation/precision loss is safe.

  # Check semver compatibility of public API changes
  semver-checks:
    name: API Semver Compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [fmt]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked

      - name: Check semver compatibility
        run: |
          # Semver checks are skipped until crates are published to crates.io.
          # The --baseline-rev approach compiles every crate twice and exceeds
          # the CI timeout. Re-enable once v2.1.0 is on crates.io.
          echo "::notice::Semver checks skipped — no crates published to crates.io yet"

  # Build and test on multiple platforms
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        os: [ubuntu-latest]
        rust: [stable, "1.92"]  # MSRV
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          toolchain: ${{ matrix.rust }}

      - name: Build
        shell: bash
        run: |
          # rdkafka requires a POSIX configure script and does not build on Windows
          # fraiseql-wire is Unix-only (uses tokio::net::UnixStream)
          if [ "$RUNNER_OS" == "Windows" ]; then
            # SYNC:WINDOWS_FEATURES — keep in sync with other SYNC:WINDOWS_FEATURES locations
            cargo build --workspace --exclude fraiseql-wire --features "postgres,mysql,sqlite,sqlserver,rich-filters" --verbose
          else
            cargo build --all-features --verbose
          fi

      - name: Run tests
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            # SYNC:WINDOWS_FEATURES — keep in sync with other SYNC:WINDOWS_FEATURES locations
            cargo test --workspace --exclude fraiseql-wire --features "postgres,mysql,sqlite,sqlserver,rich-filters" --verbose
          else
            # Test all crates except those needing external services.
            # fraiseql-core/fraiseql-db: test-postgres/test-mysql/test-sqlserver features
            # fraiseql-arrow: Arrow Flight e2e tests
            # fraiseql-observers: dedup/caching tests need Redis
            # fraiseql-server: observer_repository tests need PostgreSQL via testcontainers
            cargo test --workspace \
              --exclude fraiseql-core \
              --exclude fraiseql-db \
              --exclude fraiseql-arrow \
              --exclude fraiseql-observers \
              --exclude fraiseql-server \
              --all-features --verbose
            # Test crates with explicit feature lists (no test-* infra features)
            # SYNC:CORE_FEATURES — keep in sync with other SYNC:CORE_FEATURES locations
            cargo test -p fraiseql-core --features "arrow,grpc,kafka,mysql,postgres,redis-apq,rich-filters,schema-lint,sqlite,sqlserver,test-utils,wire-backend" --verbose
            # SYNC:DB_FEATURES — keep in sync with other SYNC:DB_FEATURES locations
            cargo test -p fraiseql-db --features "grpc,mysql,postgres,rich-filters,sqlite,sqlserver,wire-backend" --verbose
            # Server lib tests only (integration tests need PostgreSQL)
            # --all-features is avoided because observers-nats, redis-rate-limiting,
            # redis-pkce, redis-idempotency, and observers-enterprise require NATS/Redis
            # infrastructure not available in the Test Suite runner.
            # SYNC:SERVER_FEATURES — keep in sync with other SYNC:SERVER_FEATURES locations
            cargo test -p fraiseql-server --lib --features "arrow,auth,aws-s3,cors,database,federation,grpc,mcp,metrics,observers,redis-apq,rest,secrets,testing,tracing-opentelemetry,webhooks,wire-backend" --verbose
          fi

      - name: Run doc tests
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            # SYNC:WINDOWS_FEATURES — keep in sync with other SYNC:WINDOWS_FEATURES locations
            cargo test --doc --workspace --exclude fraiseql-wire --features "postgres,mysql,sqlite,sqlserver,rich-filters" --verbose
          else
            cargo test --doc --all-features --verbose
          fi

      - name: Check documentation warnings
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            # SYNC:WINDOWS_FEATURES — keep in sync with other SYNC:WINDOWS_FEATURES locations
            RUSTDOCFLAGS="-D warnings" cargo doc --workspace --exclude fraiseql-wire --features "postgres,mysql,sqlite,sqlserver,rich-filters" --no-deps
          else
            RUSTDOCFLAGS="-D warnings" cargo doc --workspace --all-features --no-deps
          fi

  # Integration tests with PostgreSQL
  integration-postgres:
    name: Integration Tests (PostgreSQL)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: fraiseql_test_password
          POSTGRES_USER: fraiseql_test
          POSTGRES_DB: test_fraiseql
        options: >-
          --health-cmd "pg_isready -U fraiseql_test -d test_fraiseql"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Initialize test database schema
        uses: ./.github/actions/init-postgres

      - name: Run integration tests (PostgreSQL only)
        # CARGO_BUILD_JOBS=2 caps parallel linker invocations; linking large test binaries
        # concurrently is the primary cause of OOM (collect2 Bus error) on 7GB CI runners.
        # RUSTFLAGS uses mold linker for lower memory usage during linking.
        # Uses test-postgres feature to compile only PostgreSQL-dependent tests.
        # MySQL and SQL Server tests run in their own integration jobs.
        run: |
          # SYNC:CORE_TEST_FEATURES — keep in sync with other SYNC:CORE_TEST_FEATURES locations
          cargo test -p fraiseql-core --features "test-postgres,arrow,grpc,kafka,mysql,postgres,redis-apq,rich-filters,schema-lint,sqlite,sqlserver,test-utils,wire-backend" --test '*' -- --test-threads=1
          # SYNC:DB_TEST_FEATURES — keep in sync with other SYNC:DB_TEST_FEATURES locations
          cargo test -p fraiseql-db --features "test-postgres,grpc,mysql,postgres,rich-filters,sqlite,sqlserver,wire-backend" --test '*' -- --test-threads=1
          # fraiseql-arrow flight tests have a pre-existing compilation issue (tokio rt-multi-thread)
          # and require Arrow Flight infrastructure — skip in this job.
          # cargo test -p fraiseql-arrow --features "test-postgres,clickhouse,testing,wire-backend" --test '*' -- --test-threads=1
        env:
          DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          RUST_LOG: debug
          CARGO_BUILD_JOBS: 2
          RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"

      - name: Run database adapter and introspector tests (ignored)
        # Scoped to fraiseql-db and fraiseql-core — these are the only crates with
        # #[ignore]d lib tests that need DATABASE_URL. Running workspace-wide would
        # pick up ignored tests in other crates that may need NATS_URL, REDIS_URL, etc.
        run: cargo test -p fraiseql-db -p fraiseql-core --lib -- --ignored --test-threads=1
        env:
          DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          TEST_DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          RUST_LOG: debug
          CARGO_BUILD_JOBS: 2
          RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"

      - name: Run fraiseql-core integration tests (fact_table, aggregation)
        run: |
          cargo test -p fraiseql-core --features "test-postgres" --test fact_table_integration -- --ignored --test-threads=1
          cargo test -p fraiseql-core --features "test-postgres" --test aggregation_integration -- --ignored --test-threads=1
        env:
          DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          RUST_LOG: debug
          CARGO_BUILD_JOBS: 2
          RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"

  # Integration tests with MySQL
  integration-mysql:
    name: Integration Tests (MySQL)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      mysql:
        image: mysql:8.3
        env:
          MYSQL_ROOT_PASSWORD: fraiseql_test_root
          MYSQL_DATABASE: test_fraiseql
          MYSQL_USER: fraiseql_test
          MYSQL_PASSWORD: fraiseql_test_password
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u fraiseql_test -pfraiseql_test_password"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3307:3306

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Initialize MySQL test database schema
        run: |
          mysql -h 127.0.0.1 -P 3307 -u fraiseql_test -pfraiseql_test_password test_fraiseql < tests/sql/mysql/init.sql

      - name: Run MySQL integration tests
        run: cargo test -p fraiseql-core --features "test-mysql" --test multi_database_integration -- --test-threads=1
        env:
          MYSQL_URL: mysql://fraiseql_test:fraiseql_test_password@localhost:3307/test_fraiseql
          RUST_LOG: debug

  # Integration tests with SQLite (no external service needed)
  integration-sqlite:
    name: Integration Tests (SQLite)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Run SQLite integration tests
        run: cargo test -p fraiseql-core --features "sqlite" --test multi_database_integration sqlite
        env:
          RUST_LOG: debug

  # Integration tests with SQL Server
  integration-sqlserver:
    name: Integration Tests (SQL Server)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "FraiseQL_Test1234"
          MSSQL_PID: "Developer"
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'FraiseQL_Test1234' -C -Q 'SELECT 1' -b || exit 1"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s
        ports:
          - 1434:1433

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install mssql-tools18
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
          curl -sSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev

      - name: Initialize SQL Server test databases
        run: /opt/mssql-tools18/bin/sqlcmd -S localhost,1434 -U sa -P 'FraiseQL_Test1234' -C -i tests/sql/sqlserver/init.sql

      - name: Run SQL Server integration tests
        run: cargo test -p fraiseql-core --features "test-sqlserver" --test multi_database_integration -- --test-threads=1
        env:
          SQLSERVER_URL: "server=localhost,1434;database=master;user=sa;password=FraiseQL_Test1234;TrustServerCertificate=true"
          RUST_LOG: debug

  # Code coverage
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    # Instrumented build + 3 test runs + report generation on 7GB CI runners.
    timeout-minutes: 90

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: fraiseql_test_password
          POSTGRES_USER: fraiseql_test
          POSTGRES_DB: test_fraiseql
        options: >-
          --health-cmd "pg_isready -U fraiseql_test -d test_fraiseql"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Initialize test database schema
        uses: ./.github/actions/init-postgres

      # Phase 1: Run tests with --no-report (collect profdata).
      # --no-report implies --no-clean, so profdata accumulates across runs.
      # Split into targeted runs to avoid compiling the full workspace at once.
      # fraiseql-core and fraiseql-db need explicit features (no test-mysql/test-sqlserver).
      # fraiseql-server uses --lib only (integration tests need testcontainers).
      # CARGO_BUILD_JOBS=2 prevents OOM on 7GB runners during instrumented linking.
      - name: Clean previous coverage data
        run: cargo llvm-cov clean --workspace

      - name: "Collect coverage: fraiseql-core"
        run: |
          # SYNC:CORE_TEST_FEATURES — keep in sync with other SYNC:CORE_TEST_FEATURES locations
          cargo llvm-cov --no-report \
            --features "test-postgres,arrow,grpc,kafka,mysql,postgres,redis-apq,rich-filters,schema-lint,sqlite,sqlserver,test-utils,wire-backend" \
            -p fraiseql-core \
            -- --test-threads=1
        env:
          DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          CARGO_BUILD_JOBS: 2

      - name: "Collect coverage: fraiseql-db"
        run: |
          # SYNC:DB_TEST_FEATURES — keep in sync with other SYNC:DB_TEST_FEATURES locations
          cargo llvm-cov --no-report \
            --features "test-postgres,grpc,mysql,postgres,rich-filters,sqlite,sqlserver,wire-backend" \
            -p fraiseql-db \
            -- --test-threads=1
        env:
          DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          CARGO_BUILD_JOBS: 2

      - name: "Collect coverage: fraiseql-server (lib only)"
        run: |
          # SYNC:SERVER_FEATURES — keep in sync with other SYNC:SERVER_FEATURES locations
          cargo llvm-cov --no-report \
            --features "arrow,auth,aws-s3,cors,database,federation,grpc,mcp,metrics,observers,redis-apq,rest,secrets,testing,tracing-opentelemetry,webhooks,wire-backend" \
            -p fraiseql-server --lib \
            -- --test-threads=1
        env:
          DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          CARGO_BUILD_JOBS: 2

      - name: "Collect coverage: remaining crates"
        run: |
          cargo llvm-cov --no-report \
            --all-features \
            -p fraiseql-error \
            -p fraiseql-auth \
            -p fraiseql-secrets \
            -p fraiseql-wire \
            -p fraiseql-cli \
            -p fraiseql-federation \
            -p fraiseql-arrow \
            -p fraiseql-observers \
            -p fraiseql-webhooks \
            -- --test-threads=1
        env:
          DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          CARGO_BUILD_JOBS: 2

      # Phase 2: Generate reports from collected profdata (no recompilation)
      - name: Generate lcov report
        run: |
          cargo llvm-cov report \
            --lcov --output-path lcov.info

      - name: Generate JSON report for trend tracking
        run: |
          cargo llvm-cov report \
            --json --output-path coverage.json

      - name: "Check threshold: security-critical crates (≥80%)"
        run: |
          cargo llvm-cov report \
            -p fraiseql-auth -p fraiseql-secrets \
            --fail-under-lines 80

      - name: "Check threshold: fraiseql-core (≥70%)"
        run: cargo llvm-cov report -p fraiseql-core --fail-under-lines 70

      - name: "Check threshold: fraiseql-db (≥65%)"
        run: cargo llvm-cov report -p fraiseql-db --fail-under-lines 65

      - name: "Check threshold: fraiseql-server (≥60%)"
        run: cargo llvm-cov report -p fraiseql-server --fail-under-lines 60

      - name: "Check threshold: fraiseql-federation (≥60%)"
        run: cargo llvm-cov report -p fraiseql-federation --fail-under-lines 60

      - name: "Check threshold: remaining crates (≥50%)"
        run: |
          for crate in fraiseql-error fraiseql-wire fraiseql-cli fraiseql-arrow fraiseql-observers; do
            echo "Checking $crate..."
            cargo llvm-cov report -p "$crate" --fail-under-lines 50 || exit 1
          done

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: true

      - name: Archive coverage data
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-${{ github.sha }}
          path: |
            lcov.info
            coverage.json
          retention-days: 30

  # Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Run security audit
        run: cargo deny check advisories

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Audit vendored graphql-parser
        run: |
          rm -rf ~/.cargo/advisory-db
          cargo audit --file vendor/graphql-parser/Cargo.lock

  # Dependency duplication audit
  # Detects if an actionable duplicate dependency re-appears after being unified.
  dependency-audit:
    name: Dependency Duplication Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Check for actionable duplicate dependencies
        run: |
          set -e
          DUPS=$(cargo tree --duplicates -e normal 2>/dev/null)

          # graphql-parser 0.4 depends on thiserror 1.0 — blocked on upstream.
          # Fail only if thiserror 1.0 appears from a source OTHER than graphql-parser.
          THISERROR1_SOURCES=$(echo "$DUPS" | awk '/^thiserror v1\./,/^[^ ]/' | grep -v '^thiserror v1\.' | grep -v 'graphql-parser' | grep -v '^$' | head -5)
          if [ -n "$THISERROR1_SOURCES" ]; then
            echo "ERROR: thiserror 1.x pulled by unexpected source (not graphql-parser):"
            echo "$THISERROR1_SOURCES"
            exit 1
          fi
          echo "✅ thiserror 1.x only present via graphql-parser (known blocker)"

          # rustls 0.22 is pulled by sqlx 0.8 / tokio-rustls 0.25 — blocked on sqlx 0.9.
          RUSTLS22_SOURCES=$(echo "$DUPS" | awk '/^rustls v0\.22/,/^[^ ]/' | grep -v '^rustls v0\.22' | grep -v 'tokio-rustls\|sqlx' | grep -v '^$' | head -5)
          if [ -n "$RUSTLS22_SOURCES" ]; then
            echo "ERROR: rustls 0.22 pulled by unexpected source (not sqlx/tokio-rustls):"
            echo "$RUSTLS22_SOURCES"
            exit 1
          fi
          echo "✅ rustls 0.22 only present via sqlx 0.8 chain (known blocker)"

  # Check documentation
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Build documentation
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

      - name: Check for broken links
        run: cargo doc --all-features --no-deps 2>&1 | grep -i "warning" && exit 1 || exit 0

  # Cross-database parity tests (PostgreSQL + MySQL)
  integration-cross-db:
    name: Integration Tests (Cross-DB Parity)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: ""
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run cross-database parity tests
        run: |
          cargo nextest run \
            --test cross_database_test \
            --run-ignored all \
            --features test-mysql,test-postgres \
            -p fraiseql-core
        env:
          RUST_LOG: warn

  # Integration tests for Redis (APQ storage, observer queue and lease)
  integration-redis:
    name: Integration Tests (Redis)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: fraiseql_test_password
          POSTGRES_USER: fraiseql_test
          POSTGRES_DB: test_fraiseql
        options: >-
          --health-cmd "pg_isready -U fraiseql_test -d test_fraiseql"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Run Redis APQ storage tests (fraiseql-core)
        run: cargo test -p fraiseql-core --features "redis-apq" --lib redis -- --ignored --test-threads=1
        env:
          REDIS_URL: redis://localhost:6379
          RUST_LOG: debug

      - name: Run Redis observer queue and lease tests (fraiseql-observers)
        run: cargo test -p fraiseql-observers --features "caching,queue,redis-lease" --lib -- --ignored --test-threads=1
        env:
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          TEST_DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          RUST_LOG: debug

  # Integration tests for NATS JetStream (observer transport)
  integration-nats:
    name: Integration Tests (NATS)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Start NATS with JetStream
        run: docker run -d --name nats-test -p 4222:4222 -p 8222:8222 nats:2.10-alpine -js -m 8222

      - name: Wait for NATS to be ready
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8222/healthz > /dev/null 2>&1; then
              echo "NATS is ready"
              break
            fi
            echo "  waiting for NATS (attempt $i/20)..."
            sleep 2
            if [ "$i" -eq 20 ]; then
              echo "NATS never became ready"
              exit 1
            fi
          done

      - name: Run NATS transport integration tests
        run: cargo test -p fraiseql-observers --features "nats" --test nats_integration -- --ignored --test-threads=1
        env:
          RUST_LOG: debug
          FRAISEQL_ALLOW_LOCALHOST: "1"

      - name: Show NATS logs on failure
        if: failure()
        run: docker logs nats-test

  # Integration tests for observer runtime (PostgreSQL + NATS)
  integration-observers:
    name: Integration Tests (Observers)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: fraiseql_test_password
          POSTGRES_USER: fraiseql_test
          POSTGRES_DB: test_fraiseql
        options: >-
          --health-cmd "pg_isready -U fraiseql_test -d test_fraiseql"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Start NATS with JetStream
        run: docker run -d --name nats-test -p 4222:4222 -p 8222:8222 nats:2.10-alpine -js -m 8222

      - name: Wait for NATS to be ready
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8222/healthz > /dev/null 2>&1; then
              echo "NATS is ready"
              break
            fi
            sleep 2
            if [ "$i" -eq 20 ]; then echo "NATS never became ready"; exit 1; fi
          done

      - name: Initialize test database schema
        uses: ./.github/actions/init-postgres

      - name: Run PostgreSQL NOTIFY transport tests
        run: cargo test -p fraiseql-observers --features "postgres" --lib postgres_notify -- --ignored --test-threads=1
        env:
          DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          TEST_DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          RUST_LOG: debug

      - name: Run observer storage and lease tests
        run: cargo test -p fraiseql-observers --features "postgres,caching,redis-lease" --lib -- --ignored --test-threads=1
        env:
          DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          TEST_DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          RUST_LOG: debug

      - name: Run bridge integration tests (PostgreSQL + NATS)
        run: cargo test -p fraiseql-observers --features "postgres,nats" --test bridge_integration -- --ignored --test-threads=1
        env:
          DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          RUST_LOG: debug

      - name: Run fraiseql-server observer runtime tests
        run: cargo test -p fraiseql-server --features "observers-nats" --test observer_runtime_integration_test -- --ignored --test-threads=1
        env:
          DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          RUST_LOG: debug
          FRAISEQL_ALLOW_PRIVATE_WEBHOOKS: "true"
          FRAISEQL_ALLOW_LOCALHOST: "true"

  # Integration tests for TLS wire protocol (PostgreSQL with TLS)
  integration-tls:
    name: Integration Tests (TLS Wire Protocol)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          extra-packages: postgresql-client

      - name: Start PostgreSQL with TLS enabled
        # postgres:16 includes openssl; the init script generates self-signed certs
        # in $PGDATA and exposes the CA cert at /var/run/postgresql/ca.crt
        run: |
          docker run -d --name postgres-tls \
            -p 5434:5432 \
            -e POSTGRES_USER=fraiseql_test \
            -e POSTGRES_PASSWORD=fraiseql_test_password \
            -e POSTGRES_DB=test_fraiseql \
            -v "$PWD/docker/init/postgres-tls-setup.sh:/docker-entrypoint-initdb.d/00-tls.sh:ro" \
            postgres:16

      - name: Wait for PostgreSQL TLS and extract CA certificate
        run: |
          for i in $(seq 1 40); do
            if docker exec postgres-tls pg_isready -U fraiseql_test -d test_fraiseql > /dev/null 2>&1; then
              echo "PostgreSQL TLS is ready"
              break
            fi
            echo "  waiting for postgres-tls (attempt $i/40)..."
            sleep 3
            if [ "$i" -eq 40 ]; then
              echo "PostgreSQL TLS never became ready"
              docker logs postgres-tls
              exit 1
            fi
          done
          # Extract the generated CA cert so tests can verify the server cert
          docker cp postgres-tls:/var/run/postgresql/ca.crt /tmp/tls-ca.crt
          echo "CA cert extracted to /tmp/tls-ca.crt"
          openssl x509 -in /tmp/tls-ca.crt -text -noout | head -20

      - name: Run TLS wire integration tests
        run: cargo test -p fraiseql-wire --test tls_integration -- --ignored --test-threads=1
        env:
          TLS_TEST_DB_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5434/test_fraiseql
          TLS_TEST_CA_CERT: /tmp/tls-ca.crt
          RUST_LOG: debug

      - name: Run TLS lib tests (custom CA builder)
        run: cargo test -p fraiseql-wire --lib -- --ignored --test-threads=1
        env:
          TLS_TEST_CA_CERT: /tmp/tls-ca.crt

      - name: Show PostgreSQL TLS logs on failure
        if: failure()
        run: docker logs postgres-tls

  # Integration tests for Vault secrets manager
  integration-vault:
    name: Integration Tests (Vault Secrets Manager)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Start Vault in dev mode
        run: |
          docker run -d --name vault-test \
            -p 8200:8200 \
            --cap-add=IPC_LOCK \
            -e VAULT_DEV_ROOT_TOKEN_ID=fraiseql-test-token \
            -e VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200 \
            -e VAULT_LOG_LEVEL=warn \
            hashicorp/vault:1.17

      - name: Wait for Vault to be ready
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8200/v1/sys/health > /dev/null 2>&1; then
              echo "Vault is ready"
              break
            fi
            echo "  waiting for Vault (attempt $i/20)..."
            sleep 2
            if [ "$i" -eq 20 ]; then echo "Vault never became ready"; exit 1; fi
          done

      - name: Run Vault secrets manager tests
        run: cargo test -p fraiseql-server --test secrets_manager_integration_test -- --ignored --test-threads=1
        env:
          VAULT_ADDR: http://localhost:8200
          VAULT_TOKEN: fraiseql-test-token
          RUST_LOG: debug

      - name: Show Vault logs on failure
        if: failure()
        run: docker logs vault-test

  # Integration tests for fraiseql-server database queries
  integration-server:
    name: Integration Tests (Server Database)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: fraiseql_test_password
          POSTGRES_USER: fraiseql_test
          POSTGRES_DB: test_fraiseql
        options: >-
          --health-cmd "pg_isready -U fraiseql_test -d test_fraiseql"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Initialize test database schema
        uses: ./.github/actions/init-postgres

      - name: Run server database query tests
        run: cargo test -p fraiseql-server --test database_query_test -- --ignored --test-threads=1
        env:
          DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          RUST_LOG: debug

  # Integration tests for HTTP E2E server (start binary, run against it)
  integration-http-e2e:
    name: Integration Tests (HTTP E2E Server)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: fraiseql_test_password
          POSTGRES_USER: fraiseql_test
          POSTGRES_DB: test_fraiseql
        options: >-
          --health-cmd "pg_isready -U fraiseql_test -d test_fraiseql"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Apply E2E database schema
        run: |
          PGPASSWORD=fraiseql_test_password psql \
            -h localhost -p 5433 -U fraiseql_test -d test_fraiseql \
            -f docker/e2e/init-postgres.sql

      - name: Build fraiseql-server binary
        run: cargo build -p fraiseql-server

      - name: Start fraiseql-server
        run: |
          ./target/debug/fraiseql-server &
          echo $! > /tmp/fraiseql-server.pid
        env:
          DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          FRAISEQL_SCHEMA_PATH: docker/e2e/schema.compiled.json
          FRAISEQL_BIND_ADDR: 127.0.0.1:8815
          FRAISEQL_METRICS_ENABLED: "true"
          FRAISEQL_METRICS_TOKEN: "e2e-test-metrics-token-32chars!"
          FRAISEQL_INTROSPECTION_ENABLED: "true"
          FRAISEQL_INTROSPECTION_REQUIRE_AUTH: "false"
          FRAISEQL_ENV: development
          RUST_LOG: info

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8815/health && break || sleep 2
          done

      - name: Run HTTP E2E tests
        run: >
          cargo test -p fraiseql-server --test http_server_e2e_test
          -- --ignored --test-threads=4
        env:
          FRAISEQL_TEST_URL: http://localhost:8815
          FRAISEQL_METRICS_TOKEN: "e2e-test-metrics-token-32chars!"
          RUST_LOG: debug

      - name: Run concurrent load test
        run: >
          cargo test -p fraiseql-server --test concurrent_load_test
          -- --ignored --test-threads=1
        env:
          FRAISEQL_TEST_URL: http://localhost:8815
          RUST_LOG: debug

      - name: Stop server
        if: always()
        run: kill $(cat /tmp/fraiseql-server.pid 2>/dev/null) 2>/dev/null || true

  # Optional: Run all ignored tests (triggered manually)
  ignored-tests:
    name: Ignored Tests (Manual)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: fraiseql_test_password
          POSTGRES_USER: fraiseql_test
          POSTGRES_DB: test_fraiseql
        options: >-
          --health-cmd "pg_isready -U fraiseql_test -d test_fraiseql"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Start NATS with JetStream
        run: docker run -d --name nats-test -p 4222:4222 -p 8222:8222 nats:2.10-alpine -js -m 8222

      - name: Start Vault in dev mode
        run: |
          docker run -d --name vault-test -p 8200:8200 \
            --cap-add=IPC_LOCK \
            -e VAULT_DEV_ROOT_TOKEN_ID=fraiseql-test-token \
            -e VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200 \
            hashicorp/vault:1.17

      - name: Start PostgreSQL with TLS
        run: |
          docker run -d --name postgres-tls -p 5434:5432 \
            -e POSTGRES_USER=fraiseql_test \
            -e POSTGRES_PASSWORD=fraiseql_test_password \
            -e POSTGRES_DB=test_fraiseql \
            -v "$PWD/docker/init/postgres-tls-setup.sh:/docker-entrypoint-initdb.d/00-tls.sh:ro" \
            postgres:16 -c ssl=on

      - name: Wait for all services
        run: |
          echo "Waiting for NATS..."
          for i in $(seq 1 20); do
            curl -sf http://localhost:8222/healthz && break || sleep 2
          done
          echo "Waiting for Vault..."
          for i in $(seq 1 20); do
            curl -sf http://localhost:8200/v1/sys/health && break || sleep 2
          done
          echo "Waiting for PostgreSQL TLS..."
          for i in $(seq 1 40); do
            docker exec postgres-tls pg_isready -U fraiseql_test -d test_fraiseql 2>/dev/null && break || sleep 3
          done
          docker cp postgres-tls:/var/run/postgresql/ca.crt /tmp/tls-ca.crt 2>/dev/null || true

      - name: Initialize test database schema
        run: |
          psql -h localhost -p 5433 -U fraiseql_test -d test_fraiseql -f tests/sql/postgres/init.sql || true
          psql -h localhost -p 5433 -U fraiseql_test -d test_fraiseql -f tests/sql/postgres/init-analytics.sql || true
        env:
          PGPASSWORD: fraiseql_test_password

      - name: Run all ignored tests
        run: cargo test -- --ignored --test-threads=1
        env:
          DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          TEST_DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          SAGA_STORE_TEST_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql
          REDIS_URL: redis://localhost:6379
          VAULT_ADDR: http://localhost:8200
          VAULT_TOKEN: fraiseql-test-token
          TLS_TEST_DB_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5434/test_fraiseql
          TLS_TEST_CA_CERT: /tmp/tls-ca.crt
          RUST_LOG: info

  # Benchmark performance (only on v2-development)
  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.ref == 'refs/heads/dev'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: fraiseql_test_password
          POSTGRES_USER: fraiseql_test
          POSTGRES_DB: test_fraiseql
        options: >-
          --health-cmd "pg_isready -U fraiseql_test -d test_fraiseql"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Initialize benchmark database
        uses: ./.github/actions/init-postgres

      - name: Run benchmarks
        run: cargo bench --no-fail-fast
        env:
          DATABASE_URL: postgresql://fraiseql_test:fraiseql_test_password@localhost:5433/test_fraiseql

      - name: Store benchmark results
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-results
          path: target/criterion


  # Feature flag compilation coverage for fraiseql-server
  feature-flags:
    name: Feature Flag Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Test fraiseql-server no-default-features
        run: cargo check -p fraiseql-server --no-default-features

      - name: Test fraiseql-server feature arrow
        run: cargo check -p fraiseql-server --no-default-features --features arrow

      - name: Test fraiseql-server feature observers-nats
        run: cargo check -p fraiseql-server --no-default-features --features observers-nats

      - name: Test fraiseql-server feature redis-rate-limiting
        run: cargo check -p fraiseql-server --no-default-features --features redis-rate-limiting

      - name: Test fraiseql-server all features
        run: cargo check -p fraiseql-server --all-features

  # Cross-SDK schema parity
  sdk-parity:
    name: Cross-SDK Schema Parity
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "sdks/official/fraiseql-python/uv.lock"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('sdks/official/fraiseql-typescript/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Install PHP
        run: sudo apt-get install -y php-cli php-mbstring php-xml php-curl

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: sdks/official/fraiseql-php/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('sdks/official/fraiseql-php/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer
        run: |
          curl -sS https://getcomposer.org/installer | php
          sudo mv composer.phar /usr/local/bin/composer

      - name: Install Python SDK deps
        run: cd sdks/official/fraiseql-python && uv sync

      - name: Install TypeScript SDK deps
        run: cd sdks/official/fraiseql-typescript && bun install

      - name: Install PHP SDK deps
        run: cd sdks/official/fraiseql-php && composer install --no-interaction --prefer-dist

      - name: Run parity tests
        run: make test-parity

  # Track compiled binary sizes to catch bloat regressions
  binary-size:
    name: Binary size check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Build release binaries
        run: cargo build --release -p fraiseql-cli -p fraiseql-server

      - name: Report binary sizes
        run: |
          echo "## Binary Sizes" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh target/release/fraiseql target/release/fraiseql-server 2>/dev/null \
            | awk '{print $5, $9}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Hard ceiling: warn if CLI binary exceeds 100 MB
          CLI_SIZE=$(stat -c%s target/release/fraiseql 2>/dev/null || echo 0)
          if [ "$CLI_SIZE" -gt 104857600 ]; then
            echo "::warning::fraiseql CLI binary exceeds 100 MB ($CLI_SIZE bytes)"
          fi

  # All checks passed
  ci-success:
    name: CI Success
    needs:
      - fmt
      - clippy
      - test
      - integration-postgres
      - integration-mysql
      - integration-sqlite
      - integration-sqlserver
      - integration-redis
      - integration-nats
      - integration-observers
      - integration-tls
      - integration-vault
      - integration-server
      - integration-http-e2e
      - coverage
      - security
      - dependency-audit
      - integration-cross-db
      - docs
      - feature-flags
      - sdk-parity
      - binary-size
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Mark CI as successful
        run: echo "All CI checks passed!"
