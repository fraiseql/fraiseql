name: CI/CD

on:
  push:
    branches: [ main, develop ]
    tags: ['v*']
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: '**/pyproject.toml'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run Ruff linter
      run: |
        ruff check src/ --output-format=github

    - name: Check code formatting with Ruff
      run: |
        ruff format --check src/

    - name: Run Pyright type checker
      run: |
        pyright src/ || echo "Type checking failed but continuing CI/CD"

  test:
    name: Test Python 3.12 / PostgreSQL 16
    needs: quality
    runs-on: ubuntu-latest

    # 🚀 PostgreSQL Service: 10-20x faster than testcontainers!
    # This provides a real PostgreSQL instance for database tests
    # while being much faster than spinning up containers per test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fraiseql
          POSTGRES_PASSWORD: fraiseql
          POSTGRES_DB: fraiseql_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: '**/pyproject.toml'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,tracing]"

    - name: Run tests with coverage
      env:
        DATABASE_URL: postgresql://fraiseql:fraiseql@localhost:5432/fraiseql_test
        TEST_DATABASE_URL: postgresql://fraiseql:fraiseql@localhost:5432/fraiseql_test
      run: |
        pytest --cov=src/fraiseql --cov-report=xml --cov-report=term-missing -v

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: Python-${{ matrix.python-version }}-PG${{ matrix.postgres-version }}
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  test-unit-only:
    name: Unit Tests Only (No Database)
    needs: quality
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: '**/pyproject.toml'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run unit tests only (no database)
      run: |
        pytest -m "not database" -v

  test-native-auth:
    name: Test Native Authentication
    needs: quality
    runs-on: ubuntu-latest
    # PostgreSQL service specifically for native auth tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fraiseql
          POSTGRES_PASSWORD: fraiseql
          POSTGRES_DB: fraiseql_native_auth_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: '**/pyproject.toml'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run native auth unit tests (no database)
      run: |
        pytest tests/auth/native/ -m "not database" -v

    - name: Run native auth database integration tests
      env:
        DATABASE_URL: postgresql://fraiseql:fraiseql@localhost:5432/fraiseql_native_auth_test
        TEST_DATABASE_URL: postgresql://fraiseql:fraiseql@localhost:5432/fraiseql_native_auth_test
      run: |
        pytest tests/auth/native/ -m "database" -v --tb=short

    - name: Test native auth example application
      env:
        DATABASE_URL: postgresql://fraiseql:fraiseql@localhost:5432/fraiseql_native_auth_test
        JWT_SECRET_KEY: ci-test-secret-key-not-for-production
      run: |
        # Test that the example app can be imported and compiled
        cd examples
        python -m py_compile native_auth_app.py
        # Test that auth components can be imported
        python -c "from fraiseql.auth.native import NativeAuthProvider, create_native_auth_provider; print('✅ Native auth imports successful')"

  test-examples:
    name: Test Examples
    needs: quality
    runs-on: ubuntu-latest
    # PostgreSQL service for examples that need database connectivity
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fraiseql
          POSTGRES_PASSWORD: fraiseql
          POSTGRES_DB: fraiseql_examples
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: '**/pyproject.toml'

    - name: Install FraiseQL
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Test Blog API Example
      env:
        DATABASE_URL: postgresql://fraiseql:fraiseql@localhost:5432/fraiseql_examples
      run: |
        cd examples/blog_api
        python -m py_compile app.py models.py mutations.py queries.py

    - name: Test E-commerce API Example
      run: |
        cd examples/ecommerce_api
        pip install -r requirements.txt 2>/dev/null || pip install psycopg[pool]
        python -m py_compile app.py models.py mutations.py

  all-checks-pass:
    name: All Checks Pass
    runs-on: ubuntu-latest
    needs: [quality, test, test-unit-only, test-native-auth, test-examples]
    if: always()
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}