name: Dagger — preflight

# Phase 02 fast-gate umbrella (Track 0). Runs the cheap-but-frequent lint/format/doc
# gates on the self-hosted runner (fraiseql-8core) at ~$0/min, replacing ci.yml's
# fmt / clippy / documentation / check-test-imports / axum-route-syntax jobs.
# `dagger call preflight` runs shell-gates → fmt → rustdoc → clippy fail-fast; the
# clippy compile reuses the box's cargo/target/sccache cache volumes (shared with
# local `dagger call` runs), so warm runs are fast. See .phases/dagger-adoption/.
#
# push-only (maintainer-controlled). fraiseql/fraiseql is PUBLIC, so a self-hosted
# runner must NOT execute fork `pull_request` code — NO pull_request trigger here.
# Pre-merge remote verification uses workflow_dispatch against the working branch.
on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: dagger-preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: preflight (fmt · clippy · rustdoc · shell gates)
    runs-on: [self-hosted, fraiseql-8core]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: dagger call preflight
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          dagger version
          dagger call preflight --source=.
