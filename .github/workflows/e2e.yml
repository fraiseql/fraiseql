name: E2E Pipeline

# Hosted CI disabled 2026-05-31 — Dagger CI migration (Track 0). push/PR triggers
# stripped; workflow_dispatch retained as porting spec. See .phases/dagger-adoption/.
on:
  workflow_dispatch:

jobs:
  e2e:
    name: E2E Pipeline Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fraiseql_e2e
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae  # v2

      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9  # v7

      - name: Install mold linker
        run: |
          sudo apt-get update
          sudo apt-get install -y mold

      - name: Install Python SDK dependencies
        run: uv sync
        working-directory: sdks/official/fraiseql-python

      - name: Build CLI
        run: cargo build -p fraiseql-cli --release

      - name: Generate schema.json from Python authoring layer
        run: |
          cd sdks/official/fraiseql-python
          uv run python ../../../tests/e2e/schema/types.py \
            > ../../../tests/e2e/schema.json || \
            echo "Note: schema generation skipped (fraiseql.generate_schema not yet implemented)"
        continue-on-error: true

      - name: Compile schema (fraiseql-cli)
        run: |
          if [ -f tests/e2e/schema.json ]; then
            ./target/release/fraiseql-cli compile tests/e2e/schema.json \
              --output tests/e2e/schema.compiled.json
          else
            echo "Skipping compile: schema.json not present"
          fi
        continue-on-error: true

      - name: Confirm pipeline artifacts
        run: |
          echo "=== E2E Pipeline Status ==="
          echo "schema.json:          $(test -f tests/e2e/schema.json && echo present || echo missing)"
          echo "schema.compiled.json: $(test -f tests/e2e/schema.compiled.json && echo present || echo missing)"
          echo ""
          echo "Full query tests require a running server."
          echo "Run locally with: make e2e && FRAISEQL_TEST_URL=http://localhost:17843 pytest tests/e2e/"
