name: Dart SDK

on:
  push:
    paths:
      - 'sdks/official/fraiseql-dart/**'
      - '.github/workflows/dart-sdk.yml'
  pull_request:
    paths:
      - 'sdks/official/fraiseql-dart/**'
      - '.github/workflows/dart-sdk.yml'

jobs:
  test:
    name: Dart SDK
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: sdks/official/fraiseql-dart

    steps:
      - uses: actions/checkout@v4

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Run tests
        run: dart test

  publish:
    name: Publish to pub.dev
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/dart-sdk/v')
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        working-directory: sdks/official/fraiseql-dart
        run: dart pub get

      - name: Publish (dry-run on non-tag)
        working-directory: sdks/official/fraiseql-dart
        run: dart pub publish --force
