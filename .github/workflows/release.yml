name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: "sccache"

permissions:
  contents: write
  packages: write

jobs:
  # Validate release prerequisites
  validate-release:
    name: Validate Release Prerequisites
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUSTC_WRAPPER: ""
    steps:
      - name: Validate required secrets
        run: |
          echo "## 🔐 Secrets Validation" >> $GITHUB_STEP_SUMMARY

          if [ -z "${{ secrets.CARGO_TOKEN }}" ]; then
            echo "❌ CARGO_TOKEN missing" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ All required secrets configured" >> $GITHUB_STEP_SUMMARY

      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Dry-run publish to crates.io
        run: |
          echo "Testing crates.io token validity with dry-run..."
          cargo publish --dry-run --token ${{ secrets.CARGO_TOKEN }} -p fraiseql-error 2>&1 | head -20 || exit 1
          echo "✅ crates.io token is valid"

  # Create GitHub release using gh CLI
  create-github-release:
    name: Create GitHub Release
    needs: validate-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          TAG="v${VERSION}"
          PRERELEASE="false"
          [[ "$VERSION" =~ alpha|beta|rc ]] && PRERELEASE="true"

          # Check if release already exists (use tag name, not full ref)
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, updating..."
            gh release edit "$TAG" \
              --title "Release $TAG" \
              --prerelease=$PRERELEASE
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" \
              --title "Release $TAG" \
              --notes "FraiseQL $VERSION — see [CHANGELOG.md](CHANGELOG.md) for details." \
              --draft=false \
              --prerelease=$PRERELEASE
          fi

  # Build binaries for multiple platforms
  build-binaries:
    name: Build Binary (${{ matrix.target }})
    needs: create-github-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: fraiseql
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: fraiseql
            archive_ext: tar.gz
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: fraiseql
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: fraiseql
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: fraiseql.exe
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Add Rust target (explicit, for cross-compilation)
        if: '!matrix.use_cross'
        run: rustup target add ${{ matrix.target }}

      - name: Install cross for cross-compiled targets
        if: matrix.use_cross
        run: cargo install cross

      - name: Install system dependencies (Linux AMD64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build binary (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} --package fraiseql --features cli,server,postgres

      - name: Build binary (cargo)
        if: '!matrix.use_cross'
        run: cargo build --release --target ${{ matrix.target }} --package fraiseql --features cli,server,postgres

      - name: Strip binary (Linux/macOS native)
        if: matrix.os != 'windows-latest' && !matrix.use_cross
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Create archive (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} fraiseql
          tar czf fraiseql-${{ matrix.target }}.tar.gz fraiseql

      - name: Create archive (zip)
        if: matrix.archive_ext == 'zip'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} fraiseql.exe
          7z a fraiseql-${{ matrix.target }}.zip fraiseql.exe

      - name: Upload archive to release
        uses: softprops/action-gh-release@v2
        with:
          files: fraiseql-${{ matrix.target }}.${{ matrix.archive_ext }}
          fail_on_unmatched_files: true

  # SBOM generation handled by sbom-generation.yml (Cosign-signed, validated)

  # Publish to crates.io
  publish-crates:
    name: Publish to crates.io
    needs: create-github-release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Verify all crates can be built
        run: |
          echo "Verifying Rust build compatibility..."
          cargo check --all-features
          cargo test --lib --all-features --no-run
          echo "✅ All crates build successfully"

      # Publish in strict topological dependency order
      # Tier 1: No fraiseql dependencies
      - name: Publish fraiseql-error
        id: publish-error
        run: cargo publish --package fraiseql-error --token ${{ secrets.CARGO_TOKEN }}
        continue-on-error: true

      - name: Publish fraiseql-auth
        id: publish-auth
        run: cargo publish --package fraiseql-auth --token ${{ secrets.CARGO_TOKEN }}
        continue-on-error: true

      - name: Publish fraiseql-webhooks
        id: publish-webhooks
        run: cargo publish --package fraiseql-webhooks --token ${{ secrets.CARGO_TOKEN }}
        continue-on-error: true

      - name: Publish fraiseql-wire
        id: publish-wire
        run: cargo publish --package fraiseql-wire --token ${{ secrets.CARGO_TOKEN }}
        continue-on-error: true

      - name: Wait for crates.io indexing (Tier 1)
        run: sleep 60

      # Tier 2: Depends on Tier 1 (fraiseql-error, fraiseql-wire)
      - name: Publish fraiseql-db
        id: publish-db
        run: cargo publish --package fraiseql-db --token ${{ secrets.CARGO_TOKEN }}
        continue-on-error: true

      - name: Wait for crates.io indexing (Tier 2)
        run: sleep 60

      # Tier 3: Depends on fraiseql-db, fraiseql-error
      - name: Publish fraiseql-federation
        id: publish-federation
        run: cargo publish --package fraiseql-federation --token ${{ secrets.CARGO_TOKEN }}
        continue-on-error: true

      - name: Wait for crates.io indexing (Tier 3)
        run: sleep 60

      # Tier 4: Depends on fraiseql-db, fraiseql-error, fraiseql-federation, fraiseql-wire
      - name: Publish fraiseql-core
        id: publish-core
        run: cargo publish --package fraiseql-core --token ${{ secrets.CARGO_TOKEN }}
        continue-on-error: true

      - name: Wait for crates.io indexing (Tier 4)
        run: sleep 60

      # Tier 5: Depends on fraiseql-core
      - name: Publish fraiseql-arrow
        id: publish-arrow
        run: cargo publish --package fraiseql-arrow --token ${{ secrets.CARGO_TOKEN }}
        continue-on-error: true

      - name: Publish fraiseql-secrets
        id: publish-secrets
        run: cargo publish --package fraiseql-secrets --token ${{ secrets.CARGO_TOKEN }}
        continue-on-error: true

      - name: Wait for crates.io indexing (Tier 5)
        run: sleep 60

      # Tier 6: Depends on fraiseql-arrow
      - name: Publish fraiseql-observers
        id: publish-observers
        run: cargo publish --package fraiseql-observers --token ${{ secrets.CARGO_TOKEN }}
        continue-on-error: true

      - name: Wait for crates.io indexing (Tier 6)
        run: sleep 60

      # Tier 7: Depends on fraiseql-arrow, fraiseql-auth, fraiseql-core, fraiseql-error, fraiseql-observers, fraiseql-secrets, fraiseql-webhooks
      - name: Publish fraiseql-server
        id: publish-server
        run: cargo publish --package fraiseql-server --token ${{ secrets.CARGO_TOKEN }}
        continue-on-error: true

      - name: Wait for crates.io indexing (Tier 7)
        run: sleep 60

      # Tier 8: Depends on fraiseql-core, fraiseql-db, fraiseql-error, fraiseql-federation, fraiseql-server
      - name: Publish fraiseql-cli
        id: publish-cli
        run: cargo publish --package fraiseql-cli --token ${{ secrets.CARGO_TOKEN }}
        continue-on-error: true

      - name: Wait for crates.io indexing (Tier 8)
        run: sleep 60

      # Tier 9: Root umbrella crate — depends on all others
      - name: Publish fraiseql (root crate)
        id: publish-root
        run: cargo publish --package fraiseql --token ${{ secrets.CARGO_TOKEN }}
        continue-on-error: true

      - name: Report crates.io publishing results
        if: always()
        run: |
          echo "## 📦 Crates.io Publishing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          [ "${{ steps.publish-error.outcome }}" = "success" ] && echo "- ✅ fraiseql-error" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-error" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-auth.outcome }}" = "success" ] && echo "- ✅ fraiseql-auth" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-auth" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-webhooks.outcome }}" = "success" ] && echo "- ✅ fraiseql-webhooks" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-webhooks" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-wire.outcome }}" = "success" ] && echo "- ✅ fraiseql-wire" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-wire" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-db.outcome }}" = "success" ] && echo "- ✅ fraiseql-db" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-db" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-federation.outcome }}" = "success" ] && echo "- ✅ fraiseql-federation" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-federation" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-core.outcome }}" = "success" ] && echo "- ✅ fraiseql-core" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-core" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-arrow.outcome }}" = "success" ] && echo "- ✅ fraiseql-arrow" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-arrow" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-secrets.outcome }}" = "success" ] && echo "- ✅ fraiseql-secrets" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-secrets" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-observers.outcome }}" = "success" ] && echo "- ✅ fraiseql-observers" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-observers" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-server.outcome }}" = "success" ] && echo "- ✅ fraiseql-server" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-server" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-cli.outcome }}" = "success" ] && echo "- ✅ fraiseql-cli" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-cli" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-root.outcome }}" = "success" ] && echo "- ✅ fraiseql (root)" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql (root)" >> $GITHUB_STEP_SUMMARY

  # Build and publish Python package
  publish-python:
    name: Publish Python Package to PyPI
    needs: create-github-release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distributions
        id: build-python
        working-directory: sdks/official/fraiseql-python
        run: python -m build

      - name: Publish to PyPI
        id: publish-pypi
        working-directory: sdks/official/fraiseql-python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/* --skip-existing
        continue-on-error: true

      - name: Validate PyPI package
        id: validate-pypi
        run: |
          echo "Waiting for PyPI to index..."
          sleep 10
          echo "Testing PyPI package installation..."
          VERSION=$(grep '^version = ' sdks/official/fraiseql-python/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          python -m pip install --upgrade "fraiseql==${VERSION}"
          python -c "import fraiseql; print(f'✅ fraiseql {fraiseql.__version__} successfully published to PyPI')"
        continue-on-error: true

      - name: Report Python publishing results
        if: always()
        run: |
          echo "## 🐍 Python Package Publishing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          [ "${{ steps.build-python.outcome }}" = "success" ] && echo "- ✅ Build: SUCCESS" >> $GITHUB_STEP_SUMMARY || echo "- ❌ Build: FAILED" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-pypi.outcome }}" = "success" ] && echo "- ✅ PyPI upload: SUCCESS" >> $GITHUB_STEP_SUMMARY || echo "- ❌ PyPI upload: FAILED" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.validate-pypi.outcome }}" = "success" ] && echo "- ✅ Validation: SUCCESS" >> $GITHUB_STEP_SUMMARY || echo "- ⚠️ Validation: SKIPPED" >> $GITHUB_STEP_SUMMARY

  # Build and publish TypeScript package
  publish-typescript:
    name: Publish TypeScript Package to npm
    needs: create-github-release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies and build
        id: build-typescript
        working-directory: sdks/official/fraiseql-typescript
        run: |
          npm ci
          npm run build

      - name: Publish to npm
        id: publish-npm
        working-directory: sdks/official/fraiseql-typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
        continue-on-error: true

      - name: Validate npm package
        id: validate-npm
        run: |
          echo "Waiting for npm to index..."
          sleep 10
          echo "Testing npm package installation..."
          VERSION=$(node -p "require('./sdks/official/fraiseql-typescript/package.json').version")
          npm install "fraiseql@${VERSION}" --prefix /tmp/npm-validate
          echo "fraiseql ${VERSION} successfully published to npm"
        continue-on-error: true

      - name: Report TypeScript publishing results
        if: always()
        run: |
          echo "## TypeScript Package Publishing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          [ "${{ steps.build-typescript.outcome }}" = "success" ] && echo "- ✅ Build: SUCCESS" >> $GITHUB_STEP_SUMMARY || echo "- ❌ Build: FAILED" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-npm.outcome }}" = "success" ] && echo "- ✅ npm upload: SUCCESS" >> $GITHUB_STEP_SUMMARY || echo "- ❌ npm upload: FAILED" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.validate-npm.outcome }}" = "success" ] && echo "- ✅ Validation: SUCCESS" >> $GITHUB_STEP_SUMMARY || echo "- ⚠️ Validation: SKIPPED" >> $GITHUB_STEP_SUMMARY

  # Verify all packages published correctly
  verify-release:
    name: Verify Published Packages
    needs: [create-github-release, publish-crates, build-binaries, publish-python, publish-typescript]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Check crates.io packages
        id: verify-crates
        run: |
          echo "## 📦 Package Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          VERSION="${{ steps.get_version.outputs.version }}"

          # Check fraiseql crate
          if curl -s "https://crates.io/api/v1/crates/fraiseql" | jq -e ".crate.newest_version == \"$VERSION\"" >/dev/null 2>&1; then
            echo "✅ fraiseql v$VERSION on crates.io" >> $GITHUB_STEP_SUMMARY
          else
            echo "⏳ fraiseql v$VERSION (crates.io indexing in progress)" >> $GITHUB_STEP_SUMMARY
          fi
        continue-on-error: true

      - name: Check GitHub release assets
        id: verify-binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="${{ github.ref_name }}"

          # Wait a moment for release to be fully created
          sleep 5

          ASSET_COUNT=$(gh release view "$RELEASE_TAG" --json assets --jq '.assets | length' 2>/dev/null || echo "0")

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📎 Release Assets" >> $GITHUB_STEP_SUMMARY
          echo "Total binaries uploaded: $ASSET_COUNT" >> $GITHUB_STEP_SUMMARY

          if [ "$ASSET_COUNT" -ge 5 ]; then
            echo "✅ All expected binaries present" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Missing some binaries (expected 5, got $ASSET_COUNT)" >> $GITHUB_STEP_SUMMARY
          fi

          # List all assets
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Uploaded Files:" >> $GITHUB_STEP_SUMMARY
          gh release view "$RELEASE_TAG" --json assets --jq '.assets[] | "- \(.name)"' >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "- (assets not yet available)" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 **Release v${{ steps.get_version.outputs.version }} complete!**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Installation:** https://fraiseql.dev/install" >> $GITHUB_STEP_SUMMARY
