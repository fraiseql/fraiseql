name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  packages: write

jobs:
  # Create GitHub release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE=""
          if echo "$GITHUB_REF" | grep -qE '(alpha|beta|rc)'; then
            PRERELEASE="--prerelease"
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "Release $GITHUB_REF_NAME" \
            --generate-notes \
            $PRERELEASE

  # Build binaries for multiple platforms
  build-binaries:
    name: Build Binary (${{ matrix.asset_name }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: fraiseql-cli
            asset_name: fraiseql-cli-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: fraiseql-cli
            asset_name: fraiseql-cli-linux-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: fraiseql-cli.exe
            asset_name: fraiseql-cli-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }} --package fraiseql-cli

      - name: Strip binary (Linux)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Upload binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}#${{ matrix.asset_name }}"

  # Publish to crates.io
  publish-crates:
    name: Publish to crates.io
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Publish in dependency order
      # Tier 1: No dependencies
      - name: Publish fraiseql-core
        run: cargo publish --package fraiseql-core --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

      - name: Wait for crates.io indexing
        run: sleep 30

      - name: Publish fraiseql-error
        run: cargo publish --package fraiseql-error --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

      - name: Wait for crates.io indexing
        run: sleep 30

      - name: Publish fraiseql-observers-macros
        run: cargo publish --package fraiseql-observers-macros --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

      - name: Wait for crates.io indexing
        run: sleep 30

      # Tier 2: Depends on Tier 1
      - name: Publish fraiseql-arrow
        run: cargo publish --package fraiseql-arrow --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

      - name: Wait for crates.io indexing
        run: sleep 30

      - name: Publish fraiseql-wire
        run: cargo publish --package fraiseql-wire --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

      - name: Wait for crates.io indexing
        run: sleep 30

      # Tier 3: Depends on Tier 1 and Tier 2
      - name: Publish fraiseql-observers
        run: cargo publish --package fraiseql-observers --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

      - name: Wait for crates.io indexing
        run: sleep 30

      - name: Publish fraiseql-server
        run: cargo publish --package fraiseql-server --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

      - name: Wait for crates.io indexing
        run: sleep 30

      # Tier 4: Depends on Tier 1
      - name: Publish fraiseql-cli
        run: cargo publish --package fraiseql-cli --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

  # Build and publish Python package
  publish-python:
    name: Publish Python Package to PyPI
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maturin twine patchelf

      - name: Build distributions with maturin
        run: |
          rm -rf dist/
          mkdir -p dist/
          maturin build --release
          cp fraiseql_rs/target/wheels/*.whl dist/ 2>/dev/null || true
          maturin sdist
          cp fraiseql_rs/target/wheels/*.tar.gz dist/ 2>/dev/null || true
          ls -lh dist/

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/* --skip-existing
