name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: "sccache"

permissions:
  contents: write
  packages: write

jobs:
  # Validate release prerequisites
  validate-release:
    name: Validate Release Prerequisites
    environment: release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUSTC_WRAPPER: ""
    steps:
      - name: Validate required secrets
        run: |
          echo "## Secrets Validation" >> $GITHUB_STEP_SUMMARY
          MISSING=0

          if [ -z "${{ secrets.CARGO_TOKEN }}" ]; then
            echo "CARGO_TOKEN missing" >> $GITHUB_STEP_SUMMARY; MISSING=1
          else
            echo "CARGO_TOKEN present" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -z "${{ secrets.PYPI_TOKEN }}" ]; then
            echo "PYPI_TOKEN missing" >> $GITHUB_STEP_SUMMARY; MISSING=1
          else
            echo "PYPI_TOKEN present" >> $GITHUB_STEP_SUMMARY
          fi

          # npm uses Trusted Publishing (OIDC) in npm-publish.yml — no NPM_TOKEN.

          if [ "$MISSING" -eq 1 ]; then
            echo "::error::Required secrets missing — cannot proceed with release"
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      # Upstream gate that catches packaging-rules regressions (e.g.
      # gitignored files or build.rs side effects swept into the .crate
      # tarball) before they reach the actual publish step. Added after
      # v2.3.0 / v2.3.1 shipped tags but failed to publish fraiseql-server
      # (the previous version of this step only dry-ran fraiseql-error).
      - name: Dry-run publish for every publishable crate
        shell: bash
        run: |
          set -uo pipefail
          # GitHub runs `shell: bash` with `-e`, which would abort this loop at the
          # first crate whose dry-run exits non-zero — before the per-crate status
          # capture and first-publish-sibling tolerance below ever run, defeating
          # the collect-all design. Disable errexit; the loop tracks FAILED itself.
          set +e
          # Plain (uncoloured) cargo output so the log greps below match reliably.
          export CARGO_TERM_COLOR=never
          CRATES="fraiseql-error fraiseql-auth fraiseql-webhooks fraiseql-wire \
                  fraiseql-db fraiseql-storage fraiseql-federation fraiseql-core \
                  fraiseql-codegen fraiseql-arrow fraiseql-secrets fraiseql-observers \
                  fraiseql-functions fraiseql-server fraiseql-cli fraiseql"
          FAILED=0
          for c in $CRATES; do
            echo "::group::dry-run publish: $c"
            log="/tmp/dryrun-$c.log"
            cargo publish --dry-run --token "${{ secrets.CARGO_TOKEN }}" -p "$c" > "$log" 2>&1
            status=$?
            tail -30 "$log"
            if [ "$status" -eq 0 ]; then
              echo "OK: $c dry-run passed"
            else
              # A dry-run can fail purely because a sibling crate this one depends
              # on is not on crates.io at the required version yet — the first
              # release of a new crate (fraiseql-codegen) or a synchronized version
              # bump where the new sibling versions are published later in $CRATES
              # order. cargo phrases this two ways:
              #   "no matching package named \`X\` found"                  (X never published)
              #   "failed to select a version for the requirement \`X = …\`" (X published, not at the required version)
              # Tolerate either when every unresolved package is one of our own
              # publishable crates AND the failure is a packaging-prep failure —
              # NOT a compile error in the verify build. Gitignored files / build.rs
              # side effects / a genuinely missing external dep / a real compile
              # error all still hard-fail.
              tolerable=0
              if grep -q "failed to prepare local package for uploading" "$log" \
                 && ! grep -qE "could not compile|error\[E[0-9]|aborting due to" "$log"; then
                missing=$( {
                  grep -oE "no matching package named \`[a-zA-Z0-9_-]+\`" "$log" \
                    | sed -E "s/.*\`([^\`]+)\`.*/\1/"
                  grep -oE "failed to select a version for the requirement \`[a-zA-Z0-9_-]+" "$log" \
                    | sed -E "s/.*\`([a-zA-Z0-9_-]+).*/\1/"
                } | sort -u)
                if [ -n "$missing" ]; then
                  tolerable=1
                  for m in $missing; do
                    case " $CRATES " in
                      *" $m "*) ;;        # one of our publishable crates → first-publish ordering, ok
                      *) tolerable=0 ;;   # an external dependency is genuinely unresolved → fail
                    esac
                  done
                fi
              fi
              if [ "$tolerable" -eq 1 ]; then
                echo "WARN: $c dry-run failed only on not-yet-published sibling crate(s): $missing"
                echo "      tolerated — the ordered publish ships those first (see step comment)"
              else
                echo "FAIL: $c dry-run exited $status"
                FAILED=1
              fi
            fi
            echo "::endgroup::"
          done
          if [ "$FAILED" -ne 0 ]; then
            echo "::error::One or more crates failed dry-run publish — see expanded groups above"
            exit 1
          fi
          echo "All crates passed dry-run publish"

  # Create GitHub release using gh CLI
  create-github-release:
    name: Create GitHub Release
    needs: validate-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          TAG="v${VERSION}"
          PRERELEASE="false"
          [[ "$VERSION" =~ alpha|beta|rc ]] && PRERELEASE="true"

          # Check if release already exists (use tag name, not full ref)
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, updating..."
            gh release edit "$TAG" \
              --title "Release $TAG" \
              --prerelease=$PRERELEASE
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" \
              --title "Release $TAG" \
              --notes "FraiseQL $VERSION — see [CHANGELOG.md](CHANGELOG.md) for details." \
              --draft=false \
              --prerelease=$PRERELEASE
          fi

  # Build binaries for multiple platforms
  build-binaries:
    name: Build Binary (${{ matrix.target }})
    needs: create-github-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: fraiseql
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: fraiseql
            archive_ext: tar.gz
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: fraiseql
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: fraiseql
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: fraiseql.exe
            archive_ext: zip

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad  # v0.0.9

      - name: Add Rust target (explicit, for cross-compilation)
        if: '!matrix.use_cross'
        run: rustup target add ${{ matrix.target }}

      - name: Install cross for cross-compiled targets
        if: matrix.use_cross
        run: cargo install cross

      - name: Install system dependencies (Linux AMD64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build binary (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} --package fraiseql --features cli,server,postgres

      - name: Build binary (cargo)
        if: '!matrix.use_cross'
        run: cargo build --release --target ${{ matrix.target }} --package fraiseql --features cli,server,postgres

      - name: Strip binary (Linux/macOS native)
        if: matrix.os != 'windows-latest' && !matrix.use_cross
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Create archive (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} fraiseql
          tar czf fraiseql-${{ matrix.target }}.tar.gz fraiseql

      - name: Create archive (zip)
        if: matrix.archive_ext == 'zip'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} fraiseql.exe
          7z a fraiseql-${{ matrix.target }}.zip fraiseql.exe

      - name: Upload archive to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: fraiseql-${{ matrix.target }}.${{ matrix.archive_ext }}
          fail_on_unmatched_files: true

  # SBOM generation handled by sbom-generation.yml (Cosign-signed, validated)

  # Publish to crates.io
  publish-crates:
    name: Publish to crates.io
    environment: release
    needs: create-github-release
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad  # v0.0.9

      - name: Verify all crates can be built
        run: |
          echo "Verifying Rust build compatibility..."
          cargo check --features "arrow,kafka,mysql,postgres,redis-apq,schema-lint,sqlite,sqlserver,test-utils,wire-backend"
          echo "✅ All crates build successfully"

      # Publish in strict topological dependency order
      # Tier 1: No fraiseql dependencies
      - name: Publish fraiseql-error
        id: publish-error
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$(curl -s -o /dev/null -w '%{http_code}' -H 'User-Agent: fraiseql-ci' "https://crates.io/api/v1/crates/fraiseql-error/$VERSION")" = "200" ]; then
            echo "fraiseql-error $VERSION already published, skipping"
          else
            cargo publish --package fraiseql-error --token ${{ secrets.CARGO_TOKEN }}
          fi

      - name: Publish fraiseql-auth
        id: publish-auth
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$(curl -s -o /dev/null -w '%{http_code}' -H 'User-Agent: fraiseql-ci' "https://crates.io/api/v1/crates/fraiseql-auth/$VERSION")" = "200" ]; then
            echo "fraiseql-auth $VERSION already published, skipping"
          else
            cargo publish --package fraiseql-auth --token ${{ secrets.CARGO_TOKEN }}
          fi

      - name: Publish fraiseql-webhooks
        id: publish-webhooks
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$(curl -s -o /dev/null -w '%{http_code}' -H 'User-Agent: fraiseql-ci' "https://crates.io/api/v1/crates/fraiseql-webhooks/$VERSION")" = "200" ]; then
            echo "fraiseql-webhooks $VERSION already published, skipping"
          else
            cargo publish --package fraiseql-webhooks --token ${{ secrets.CARGO_TOKEN }}
          fi

      - name: Publish fraiseql-wire
        id: publish-wire
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$(curl -s -o /dev/null -w '%{http_code}' -H 'User-Agent: fraiseql-ci' "https://crates.io/api/v1/crates/fraiseql-wire/$VERSION")" = "200" ]; then
            echo "fraiseql-wire $VERSION already published, skipping"
          else
            cargo publish --package fraiseql-wire --token ${{ secrets.CARGO_TOKEN }}
          fi

      - name: Wait for crates.io indexing (Tier 1)
        run: bash tools/wait-for-crates-index.sh "${GITHUB_REF#refs/tags/v}" fraiseql-error fraiseql-auth fraiseql-webhooks fraiseql-wire

      # Tier 2: Depends on Tier 1 (fraiseql-error, fraiseql-wire)
      - name: Publish fraiseql-db
        id: publish-db
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$(curl -s -o /dev/null -w '%{http_code}' -H 'User-Agent: fraiseql-ci' "https://crates.io/api/v1/crates/fraiseql-db/$VERSION")" = "200" ]; then
            echo "fraiseql-db $VERSION already published, skipping"
          else
            cargo publish --package fraiseql-db --token ${{ secrets.CARGO_TOKEN }}
          fi

      - name: Publish fraiseql-storage
        id: publish-storage
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$(curl -s -o /dev/null -w '%{http_code}' -H 'User-Agent: fraiseql-ci' "https://crates.io/api/v1/crates/fraiseql-storage/$VERSION")" = "200" ]; then
            echo "fraiseql-storage $VERSION already published, skipping"
          else
            cargo publish --package fraiseql-storage --token ${{ secrets.CARGO_TOKEN }}
          fi

      - name: Wait for crates.io indexing (Tier 2)
        run: bash tools/wait-for-crates-index.sh "${GITHUB_REF#refs/tags/v}" fraiseql-db fraiseql-storage

      # Tier 3: Depends on fraiseql-db, fraiseql-error
      - name: Publish fraiseql-federation
        id: publish-federation
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$(curl -s -o /dev/null -w '%{http_code}' -H 'User-Agent: fraiseql-ci' "https://crates.io/api/v1/crates/fraiseql-federation/$VERSION")" = "200" ]; then
            echo "fraiseql-federation $VERSION already published, skipping"
          else
            cargo publish --package fraiseql-federation --token ${{ secrets.CARGO_TOKEN }}
          fi

      - name: Wait for crates.io indexing (Tier 3)
        run: bash tools/wait-for-crates-index.sh "${GITHUB_REF#refs/tags/v}" fraiseql-federation

      # Tier 4: Depends on fraiseql-db, fraiseql-error, fraiseql-federation, fraiseql-wire
      - name: Publish fraiseql-core
        id: publish-core
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$(curl -s -o /dev/null -w '%{http_code}' -H 'User-Agent: fraiseql-ci' "https://crates.io/api/v1/crates/fraiseql-core/$VERSION")" = "200" ]; then
            echo "fraiseql-core $VERSION already published, skipping"
          else
            cargo publish --package fraiseql-core --token ${{ secrets.CARGO_TOKEN }}
          fi

      - name: Wait for crates.io indexing (Tier 4)
        run: bash tools/wait-for-crates-index.sh "${GITHUB_REF#refs/tags/v}" fraiseql-core

      # Tier 4.5: Depends on fraiseql-core, fraiseql-error
      - name: Publish fraiseql-codegen
        id: publish-codegen
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$(curl -s -o /dev/null -w '%{http_code}' -H 'User-Agent: fraiseql-ci' "https://crates.io/api/v1/crates/fraiseql-codegen/$VERSION")" = "200" ]; then
            echo "fraiseql-codegen $VERSION already published, skipping"
          else
            cargo publish --package fraiseql-codegen --token ${{ secrets.CARGO_TOKEN }}
          fi

      - name: Wait for crates.io indexing (Tier 4.5)
        run: bash tools/wait-for-crates-index.sh "${GITHUB_REF#refs/tags/v}" fraiseql-codegen

      # Tier 5: Depends on fraiseql-core
      - name: Publish fraiseql-arrow
        id: publish-arrow
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$(curl -s -o /dev/null -w '%{http_code}' -H 'User-Agent: fraiseql-ci' "https://crates.io/api/v1/crates/fraiseql-arrow/$VERSION")" = "200" ]; then
            echo "fraiseql-arrow $VERSION already published, skipping"
          else
            cargo publish --package fraiseql-arrow --token ${{ secrets.CARGO_TOKEN }}
          fi

      - name: Publish fraiseql-secrets
        id: publish-secrets
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$(curl -s -o /dev/null -w '%{http_code}' -H 'User-Agent: fraiseql-ci' "https://crates.io/api/v1/crates/fraiseql-secrets/$VERSION")" = "200" ]; then
            echo "fraiseql-secrets $VERSION already published, skipping"
          else
            cargo publish --package fraiseql-secrets --token ${{ secrets.CARGO_TOKEN }}
          fi

      - name: Wait for crates.io indexing (Tier 5)
        run: bash tools/wait-for-crates-index.sh "${GITHUB_REF#refs/tags/v}" fraiseql-arrow fraiseql-secrets

      # Tier 6: Depends on fraiseql-arrow
      - name: Publish fraiseql-observers
        id: publish-observers
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$(curl -s -o /dev/null -w '%{http_code}' -H 'User-Agent: fraiseql-ci' "https://crates.io/api/v1/crates/fraiseql-observers/$VERSION")" = "200" ]; then
            echo "fraiseql-observers $VERSION already published, skipping"
          else
            cargo publish --package fraiseql-observers --token ${{ secrets.CARGO_TOKEN }}
          fi

      - name: Wait for crates.io indexing (Tier 6)
        run: bash tools/wait-for-crates-index.sh "${GITHUB_REF#refs/tags/v}" fraiseql-observers

      # Tier 6.5: Depends on fraiseql-error, fraiseql-observers (+ optional core/db/storage)
      - name: Publish fraiseql-functions
        id: publish-functions
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$(curl -s -o /dev/null -w '%{http_code}' -H 'User-Agent: fraiseql-ci' "https://crates.io/api/v1/crates/fraiseql-functions/$VERSION")" = "200" ]; then
            echo "fraiseql-functions $VERSION already published, skipping"
          else
            cargo publish --package fraiseql-functions --token ${{ secrets.CARGO_TOKEN }}
          fi

      - name: Wait for crates.io indexing (Tier 6.5)
        run: bash tools/wait-for-crates-index.sh "${GITHUB_REF#refs/tags/v}" fraiseql-functions

      # Tier 7: Depends on fraiseql-arrow, fraiseql-auth, fraiseql-core, fraiseql-error, fraiseql-functions, fraiseql-observers, fraiseql-secrets, fraiseql-storage, fraiseql-webhooks
      - name: Publish fraiseql-server
        id: publish-server
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$(curl -s -o /dev/null -w '%{http_code}' -H 'User-Agent: fraiseql-ci' "https://crates.io/api/v1/crates/fraiseql-server/$VERSION")" = "200" ]; then
            echo "fraiseql-server $VERSION already published, skipping"
          else
            cargo publish --package fraiseql-server --token ${{ secrets.CARGO_TOKEN }}
          fi

      - name: Wait for crates.io indexing (Tier 7)
        run: bash tools/wait-for-crates-index.sh "${GITHUB_REF#refs/tags/v}" fraiseql-server

      # Tier 8: Depends on fraiseql-core, fraiseql-db, fraiseql-error, fraiseql-federation, fraiseql-server
      - name: Publish fraiseql-cli
        id: publish-cli
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$(curl -s -o /dev/null -w '%{http_code}' -H 'User-Agent: fraiseql-ci' "https://crates.io/api/v1/crates/fraiseql-cli/$VERSION")" = "200" ]; then
            echo "fraiseql-cli $VERSION already published, skipping"
          else
            cargo publish --package fraiseql-cli --token ${{ secrets.CARGO_TOKEN }}
          fi

      - name: Wait for crates.io indexing (Tier 8)
        run: bash tools/wait-for-crates-index.sh "${GITHUB_REF#refs/tags/v}" fraiseql-cli

      # Tier 9: Root umbrella crate — depends on all others
      - name: Publish fraiseql (root crate)
        id: publish-root
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$(curl -s -o /dev/null -w '%{http_code}' -H 'User-Agent: fraiseql-ci' "https://crates.io/api/v1/crates/fraiseql/$VERSION")" = "200" ]; then
            echo "fraiseql $VERSION already published, skipping"
          else
            cargo publish --package fraiseql --token ${{ secrets.CARGO_TOKEN }}
          fi

      - name: Verify all crates published
        if: always()
        run: |
          FAILED=0
          for step_outcome in \
            "${{ steps.publish-error.outcome }}" \
            "${{ steps.publish-auth.outcome }}" \
            "${{ steps.publish-webhooks.outcome }}" \
            "${{ steps.publish-wire.outcome }}" \
            "${{ steps.publish-db.outcome }}" \
            "${{ steps.publish-storage.outcome }}" \
            "${{ steps.publish-federation.outcome }}" \
            "${{ steps.publish-core.outcome }}" \
            "${{ steps.publish-codegen.outcome }}" \
            "${{ steps.publish-arrow.outcome }}" \
            "${{ steps.publish-secrets.outcome }}" \
            "${{ steps.publish-observers.outcome }}" \
            "${{ steps.publish-functions.outcome }}" \
            "${{ steps.publish-server.outcome }}" \
            "${{ steps.publish-cli.outcome }}" \
            "${{ steps.publish-root.outcome }}"; do
            if [ "$step_outcome" != "success" ]; then
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "::error::One or more crates failed to publish"
            exit 1
          fi
          echo "All crates published successfully"

      - name: Report crates.io publishing results
        if: always()
        run: |
          echo "## 📦 Crates.io Publishing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          [ "${{ steps.publish-error.outcome }}" = "success" ] && echo "- ✅ fraiseql-error" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-error" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-auth.outcome }}" = "success" ] && echo "- ✅ fraiseql-auth" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-auth" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-webhooks.outcome }}" = "success" ] && echo "- ✅ fraiseql-webhooks" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-webhooks" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-wire.outcome }}" = "success" ] && echo "- ✅ fraiseql-wire" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-wire" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-db.outcome }}" = "success" ] && echo "- ✅ fraiseql-db" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-db" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-storage.outcome }}" = "success" ] && echo "- ✅ fraiseql-storage" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-storage" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-federation.outcome }}" = "success" ] && echo "- ✅ fraiseql-federation" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-federation" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-core.outcome }}" = "success" ] && echo "- ✅ fraiseql-core" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-core" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-codegen.outcome }}" = "success" ] && echo "- ✅ fraiseql-codegen" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-codegen" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-arrow.outcome }}" = "success" ] && echo "- ✅ fraiseql-arrow" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-arrow" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-secrets.outcome }}" = "success" ] && echo "- ✅ fraiseql-secrets" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-secrets" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-observers.outcome }}" = "success" ] && echo "- ✅ fraiseql-observers" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-observers" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-functions.outcome }}" = "success" ] && echo "- ✅ fraiseql-functions" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-functions" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-server.outcome }}" = "success" ] && echo "- ✅ fraiseql-server" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-server" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-cli.outcome }}" = "success" ] && echo "- ✅ fraiseql-cli" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-cli" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-root.outcome }}" = "success" ] && echo "- ✅ fraiseql (root)" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql (root)" >> $GITHUB_STEP_SUMMARY

  # Build and publish Python package
  publish-python:
    name: Publish Python Package to PyPI
    environment: release
    needs: create-github-release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      # Honesty gate (audit H30): refuse to publish when the manifest version
      # does not match the release tag. The Python manifest was frozen at 2.1.6
      # while v2.3.0–v2.6.0 tags were cut, so `twine upload --skip-existing` (and
      # the validation step that installed the stale version) reported success
      # while shipping nothing. With release.sh now bumping the manifest, a
      # mismatch here means the bump was skipped — fail loudly instead.
      - name: Assert Python SDK version matches the release tag
        run: |
          source tools/lib/release_helpers.sh
          RELEASE_VERSION="${GITHUB_REF#refs/tags/v}"
          MANIFEST_VERSION=$(grep '^version = ' sdks/official/fraiseql-python/pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          assert_sdk_version_matches "$MANIFEST_VERSION" "$RELEASE_VERSION" "Python SDK"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distributions
        id: build-python
        working-directory: sdks/official/fraiseql-python
        run: python -m build

      - name: Publish to PyPI
        id: publish-pypi
        working-directory: sdks/official/fraiseql-python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/* --skip-existing

      - name: Validate PyPI package
        id: validate-pypi
        run: |
          echo "Waiting for PyPI to index..."
          sleep 10
          echo "Testing PyPI package installation..."
          # Assert the NEW release version specifically — not whatever the manifest
          # happens to carry — so a no-op publish can never validate green (H30).
          VERSION="${GITHUB_REF#refs/tags/v}"
          python -m pip install --upgrade "fraiseql==${VERSION}"
          python -c "import fraiseql, sys; assert fraiseql.__version__ == '${VERSION}', f'installed {fraiseql.__version__}, expected ${VERSION}'; print(f'✅ fraiseql {fraiseql.__version__} successfully published to PyPI')"
        continue-on-error: true

      - name: Report Python publishing results
        if: always()
        run: |
          echo "## 🐍 Python Package Publishing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          [ "${{ steps.build-python.outcome }}" = "success" ] && echo "- ✅ Build: SUCCESS" >> $GITHUB_STEP_SUMMARY || echo "- ❌ Build: FAILED" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-pypi.outcome }}" = "success" ] && echo "- ✅ PyPI upload: SUCCESS" >> $GITHUB_STEP_SUMMARY || echo "- ❌ PyPI upload: FAILED" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.validate-pypi.outcome }}" = "success" ] && echo "- ✅ Validation: SUCCESS" >> $GITHUB_STEP_SUMMARY || echo "- ⚠️ Validation: SKIPPED" >> $GITHUB_STEP_SUMMARY

  # npm publishing moved to .github/workflows/npm-publish.yml (Trusted Publishing
  # / OIDC, no NPM_TOKEN). It triggers on the same `v*` tag, so npm ships in
  # lockstep with this pipeline.

  # Verify all packages published correctly
  verify-release:
    name: Verify Published Packages
    needs: [create-github-release, publish-crates, build-binaries, publish-python]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always()
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Check crates.io packages
        id: verify-crates
        run: |
          echo "## 📦 Package Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          VERSION="${{ steps.get_version.outputs.version }}"

          # Check fraiseql crate
          if [ "$(curl -s -o /dev/null -w '%{http_code}' -H 'User-Agent: fraiseql-ci' "https://crates.io/api/v1/crates/fraiseql/$VERSION")" = "200" ]; then
            echo "✅ fraiseql v$VERSION on crates.io" >> $GITHUB_STEP_SUMMARY
          else
            echo "⏳ fraiseql v$VERSION (crates.io indexing in progress)" >> $GITHUB_STEP_SUMMARY
          fi
        continue-on-error: true

      - name: Check GitHub release assets
        id: verify-binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="${{ github.ref_name }}"

          # Wait a moment for release to be fully created
          sleep 5

          ASSET_COUNT=$(gh release view "$RELEASE_TAG" --json assets --jq '.assets | length' 2>/dev/null || echo "0")

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📎 Release Assets" >> $GITHUB_STEP_SUMMARY
          echo "Total binaries uploaded: $ASSET_COUNT" >> $GITHUB_STEP_SUMMARY

          if [ "$ASSET_COUNT" -ge 5 ]; then
            echo "✅ All expected binaries present" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Missing some binaries (expected 5, got $ASSET_COUNT)" >> $GITHUB_STEP_SUMMARY
          fi

          # List all assets
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Uploaded Files:" >> $GITHUB_STEP_SUMMARY
          gh release view "$RELEASE_TAG" --json assets --jq '.assets[] | "- \(.name)"' >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "- (assets not yet available)" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 **Release v${{ steps.get_version.outputs.version }} complete!**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Installation:** https://fraiseql.dev/install" >> $GITHUB_STEP_SUMMARY
