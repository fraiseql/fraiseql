name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  packages: write

jobs:
  # Validate release prerequisites
  validate-release:
    name: Validate Release Prerequisites
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          echo "## 🔐 Secrets Validation" >> $GITHUB_STEP_SUMMARY

          if [ -z "${{ secrets.CARGO_TOKEN }}" ]; then
            echo "❌ CARGO_TOKEN missing" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ All required secrets configured" >> $GITHUB_STEP_SUMMARY

      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Dry-run publish to crates.io
        run: |
          echo "Testing crates.io token validity with dry-run..."
          cargo publish --dry-run --token ${{ secrets.CARGO_TOKEN }} -p fraiseql-error 2>&1 | head -20 || exit 1
          echo "✅ crates.io token is valid"

  # Create GitHub release using gh CLI
  create-github-release:
    name: Create GitHub Release
    needs: validate-release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          TAG="v${VERSION}"
          PRERELEASE="false"
          [[ "$VERSION" =~ alpha|beta|rc ]] && PRERELEASE="true"

          # Check if release already exists (use tag name, not full ref)
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, updating..."
            gh release edit "$TAG" \
              --title "Release $TAG" \
              --prerelease=$PRERELEASE
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" \
              --title "Release $TAG" \
              --notes "FraiseQL $VERSION — see [CHANGELOG.md](CHANGELOG.md) for details." \
              --draft=false \
              --prerelease=$PRERELEASE
          fi

  # Build binaries for multiple platforms
  build-binaries:
    name: Build Binary (${{ matrix.os }})
    needs: create-github-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: fraiseql-cli
            asset_name: fraiseql-cli-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: fraiseql-cli
            asset_name: fraiseql-cli-linux-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: fraiseql-cli.exe
            asset_name: fraiseql-cli-windows-amd64.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: fraiseql-cli
            asset_name: fraiseql-cli-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross for ARM64 builds
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross

      - name: Install cross-compilation tools (Linux AMD64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build binary (using cross for ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }} --package fraiseql-cli

      - name: Build binary (using cargo for native/MSVC targets)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }} --package fraiseql-cli

      - name: Strip binary (Linux/macOS, native targets only)
        if: matrix.os != 'windows-latest' && matrix.target != 'aarch64-unknown-linux-gnu'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          fail_on_unmatched_files: true

  # Publish to crates.io
  publish-crates:
    name: Publish to crates.io
    needs: create-github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify all crates can be built
        run: |
          echo "Verifying Rust build compatibility..."
          cargo check --all-features
          cargo test --lib --all-features --no-run
          echo "✅ All crates build successfully"

      # Publish in dependency order
      # Tier 1: No dependencies
      - name: Publish fraiseql-core
        id: publish-core
        run: cargo publish --package fraiseql-core --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

      - name: Wait for crates.io indexing
        run: sleep 30

      - name: Publish fraiseql-error
        id: publish-error
        run: cargo publish --package fraiseql-error --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

      - name: Wait for crates.io indexing
        run: sleep 30

      - name: Publish fraiseql-observers-macros
        id: publish-observers-macros
        run: cargo publish --package fraiseql-observers-macros --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

      - name: Wait for crates.io indexing
        run: sleep 30

      # Tier 2: Depends on Tier 1
      - name: Publish fraiseql-arrow
        id: publish-arrow
        run: cargo publish --package fraiseql-arrow --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

      - name: Wait for crates.io indexing
        run: sleep 30

      - name: Publish fraiseql-wire
        id: publish-wire
        run: cargo publish --package fraiseql-wire --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

      - name: Wait for crates.io indexing
        run: sleep 30

      # Tier 3: Depends on Tier 1 and Tier 2
      - name: Publish fraiseql-observers
        id: publish-observers
        run: cargo publish --package fraiseql-observers --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

      - name: Wait for crates.io indexing
        run: sleep 30

      - name: Publish fraiseql-server
        id: publish-server
        run: cargo publish --package fraiseql-server --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

      - name: Wait for crates.io indexing
        run: sleep 30

      # Tier 4: Depends on Tier 1
      - name: Publish fraiseql-cli
        id: publish-cli
        run: cargo publish --package fraiseql-cli --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

      - name: Wait for crates.io indexing
        run: sleep 30

      # Tier 5: Root crate - depends on all others
      - name: Publish fraiseql (root crate)
        id: publish-root
        run: cargo publish --package fraiseql --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

      - name: Report crates.io publishing results
        if: always()
        run: |
          echo "## 📦 Crates.io Publishing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          [ "${{ steps.publish-core.outcome }}" = "success" ] && echo "- ✅ fraiseql-core" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-core" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-error.outcome }}" = "success" ] && echo "- ✅ fraiseql-error" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-error" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-observers-macros.outcome }}" = "success" ] && echo "- ✅ fraiseql-observers-macros" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-observers-macros" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-arrow.outcome }}" = "success" ] && echo "- ✅ fraiseql-arrow" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-arrow" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-wire.outcome }}" = "success" ] && echo "- ✅ fraiseql-wire" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-wire" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-observers.outcome }}" = "success" ] && echo "- ✅ fraiseql-observers" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-observers" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-server.outcome }}" = "success" ] && echo "- ✅ fraiseql-server" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-server" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-cli.outcome }}" = "success" ] && echo "- ✅ fraiseql-cli" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql-cli" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-root.outcome }}" = "success" ] && echo "- ✅ fraiseql (root)" >> $GITHUB_STEP_SUMMARY || echo "- ❌ fraiseql (root)" >> $GITHUB_STEP_SUMMARY

  # Build and publish Python package
  publish-python:
    name: Publish Python Package to PyPI
    needs: create-github-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distributions
        id: build-python
        working-directory: fraiseql-python
        run: python -m build

      - name: Publish to PyPI
        id: publish-pypi
        working-directory: fraiseql-python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/* --skip-existing
        continue-on-error: true

      - name: Validate PyPI package
        id: validate-pypi
        run: |
          echo "Waiting for PyPI to index..."
          sleep 10
          echo "Testing PyPI package installation..."
          python -m pip install --upgrade fraiseql==$(python -c "import toml; print(toml.load('fraiseql-python/pyproject.toml')['project']['version'])")
          python -c "import fraiseql; print(f'✅ fraiseql {fraiseql.__version__} successfully published to PyPI')"
        continue-on-error: true

      - name: Report Python publishing results
        if: always()
        run: |
          echo "## 🐍 Python Package Publishing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          [ "${{ steps.build-python.outcome }}" = "success" ] && echo "- ✅ Build: SUCCESS" >> $GITHUB_STEP_SUMMARY || echo "- ❌ Build: FAILED" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.publish-pypi.outcome }}" = "success" ] && echo "- ✅ PyPI upload: SUCCESS" >> $GITHUB_STEP_SUMMARY || echo "- ❌ PyPI upload: FAILED" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.validate-pypi.outcome }}" = "success" ] && echo "- ✅ Validation: SUCCESS" >> $GITHUB_STEP_SUMMARY || echo "- ⚠️ Validation: SKIPPED" >> $GITHUB_STEP_SUMMARY

  # Verify all packages published correctly
  verify-release:
    name: Verify Published Packages
    needs: [create-github-release, publish-crates, build-binaries]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Check crates.io packages
        id: verify-crates
        run: |
          echo "## 📦 Package Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          VERSION="${{ steps.get_version.outputs.version }}"

          # Check fraiseql crate
          if curl -s "https://crates.io/api/v1/crates/fraiseql" | jq -e ".crate.newest_version == \"$VERSION\"" >/dev/null 2>&1; then
            echo "✅ fraiseql v$VERSION on crates.io" >> $GITHUB_STEP_SUMMARY
          else
            echo "⏳ fraiseql v$VERSION (crates.io indexing in progress)" >> $GITHUB_STEP_SUMMARY
          fi
        continue-on-error: true

      - name: Check GitHub release assets
        id: verify-binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="${{ github.ref_name }}"

          # Wait a moment for release to be fully created
          sleep 5

          ASSET_COUNT=$(gh release view "$RELEASE_TAG" --json assets --jq '.assets | length' 2>/dev/null || echo "0")

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📎 Release Assets" >> $GITHUB_STEP_SUMMARY
          echo "Total binaries uploaded: $ASSET_COUNT" >> $GITHUB_STEP_SUMMARY

          if [ "$ASSET_COUNT" -ge 4 ]; then
            echo "✅ All expected binaries present" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Missing some binaries (expected 4, got $ASSET_COUNT)" >> $GITHUB_STEP_SUMMARY
          fi

          # List all assets
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Uploaded Files:" >> $GITHUB_STEP_SUMMARY
          gh release view "$RELEASE_TAG" --json assets --jq '.assets[] | "- \(.name)"' >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "- (assets not yet available)" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 **Release v${{ steps.get_version.outputs.version }} complete!**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Installation:** https://fraiseql.dev/install" >> $GITHUB_STEP_SUMMARY
