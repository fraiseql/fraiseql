name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  packages: write

jobs:
  # Validate release prerequisites
  validate-release:
    name: Validate Release Prerequisites
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.CARGO_TOKEN }}" ]; then
            echo "❌ ERROR: CARGO_TOKEN secret is missing"
            exit 1
          fi
          if [ -z "${{ secrets.PYPI_TOKEN }}" ]; then
            echo "❌ ERROR: PYPI_TOKEN secret is missing"
            exit 1
          fi
          echo "✅ All required secrets are configured"

      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Dry-run publish to crates.io
        run: |
          echo "Testing crates.io token validity with dry-run..."
          cargo publish --dry-run --token ${{ secrets.CARGO_TOKEN }} -p fraiseql-error 2>&1 | head -20 || exit 1
          echo "✅ crates.io token is valid"

      - name: Validate Python package
        run: |
          cd fraiseql-python
          python -m pip install --upgrade pip build
          python -m build --sdist --wheel -q
          echo "✅ Python package builds successfully"

  # Create GitHub release using gh CLI
  create-github-release:
    name: Create GitHub Release
    needs: validate-release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          PRERELEASE="false"
          [[ "$VERSION" =~ alpha|beta|rc ]] && PRERELEASE="true"

          gh release create "$GITHUB_REF" \
            --title "Release v$VERSION" \
            --notes "FraiseQL $VERSION

          See [CHANGELOG.md](CHANGELOG.md) for complete list of changes.

          ## Installation

          ### Rust Crates
          \`\`\`bash
          cargo add fraiseql@$VERSION
          \`\`\`

          ### Python Package
          \`\`\`bash
          pip install fraiseql==$VERSION
          \`\`\`

          ### CLI Binaries
          Download from the Assets section below.

          ---
          *Automated release created by [Release Workflow](.github/workflows/release.yml)*" \
            --draft=false \
            --prerelease=$PRERELEASE

  # Build binaries for multiple platforms
  build-binaries:
    name: Build Binary (${{ matrix.os }})
    needs: create-github-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: fraiseql-cli
            asset_name: fraiseql-cli-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: fraiseql-cli
            asset_name: fraiseql-cli-linux-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: fraiseql-cli.exe
            asset_name: fraiseql-cli-windows-amd64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: fraiseql-cli
            asset_name: fraiseql-cli-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: fraiseql-cli
            asset_name: fraiseql-cli-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }} --package fraiseql-cli

      - name: Strip binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Upload binary to release
        run: |
          gh release upload "$GITHUB_REF" \
            "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" \
            --clobber

  # Publish to crates.io
  publish-crates:
    name: Publish to crates.io
    needs: create-github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify all crates can be built
        run: |
          echo "Verifying Rust build compatibility..."
          cargo check --all-features
          cargo test --lib --all-features --no-run
          echo "✅ All crates build successfully"

      # Publish in dependency order
      # Tier 1: No dependencies
      - name: Publish fraiseql-core
        run: cargo publish --package fraiseql-core --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

      - name: Wait for crates.io indexing
        run: sleep 30

      - name: Publish fraiseql-error
        run: cargo publish --package fraiseql-error --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

      - name: Wait for crates.io indexing
        run: sleep 30

      - name: Publish fraiseql-observers-macros
        run: cargo publish --package fraiseql-observers-macros --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

      - name: Wait for crates.io indexing
        run: sleep 30

      # Tier 2: Depends on Tier 1
      - name: Publish fraiseql-arrow
        run: cargo publish --package fraiseql-arrow --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

      - name: Wait for crates.io indexing
        run: sleep 30

      - name: Publish fraiseql-wire
        run: cargo publish --package fraiseql-wire --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

      - name: Wait for crates.io indexing
        run: sleep 30

      # Tier 3: Depends on Tier 1 and Tier 2
      - name: Publish fraiseql-observers
        run: cargo publish --package fraiseql-observers --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

      - name: Wait for crates.io indexing
        run: sleep 30

      - name: Publish fraiseql-server
        run: cargo publish --package fraiseql-server --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

      - name: Wait for crates.io indexing
        run: sleep 30

      # Tier 4: Depends on Tier 1
      - name: Publish fraiseql-cli
        run: cargo publish --package fraiseql-cli --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

      - name: Wait for crates.io indexing
        run: sleep 30

      # Tier 5: Root crate - depends on all others
      - name: Publish fraiseql (root crate)
        run: cargo publish --package fraiseql --token ${{ secrets.CARGO_TOKEN }} || echo "Already published or publish failed"
        continue-on-error: true

  # Build and publish Python package
  publish-python:
    name: Publish Python Package to PyPI
    needs: create-github-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distributions
        working-directory: fraiseql-python
        run: python -m build

      - name: Publish to PyPI
        working-directory: fraiseql-python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/* --skip-existing

      - name: Validate PyPI package
        run: |
          echo "Waiting for PyPI to index..."
          sleep 10
          echo "Testing PyPI package installation..."
          python -m pip install --upgrade fraiseql==$(python -c "import toml; print(toml.load('fraiseql-python/pyproject.toml')['project']['version'])")
          python -c "import fraiseql; print(f'✅ fraiseql {fraiseql.__version__} successfully published to PyPI')"
        continue-on-error: true
