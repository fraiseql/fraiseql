name: Dagger — security

# Security & compliance gates (Track 0). Ports the portable subset of
# security-compliance.yml onto one Dagger umbrella (`dagger call security`):
#   - cargo-deny  — `cargo deny check` (licenses + advisories + bans + sources),
#                   covering the legacy license-scan + dependency-audit jobs.
#   - compliance  — required-file + secret-pattern shell gates (compliance-check).
# The standalone cargo-deny binary parses Cargo.lock directly: no compile, no
# backing services, so this gate is light — it only pulls the ubuntu base (from the
# private ghcr.io/fraiseql mirror, see mirror-base-images.yml) plus a persistent
# advisory-db cache volume. See parity-notes.md.
#
# NOT ported (stay GitHub-native / dispatch-only, same precedent as CodeQL):
# secrets-scan (TruffleHog PR-diff), container-security (Trivy + SARIF upload to GH
# Code Scanning), dependency-review (GH Dependency-Graph API). security.yml and
# security-compliance.yml remain workflow_dispatch as the porting spec / GH-native home.
#
# push-only by design: push events are inherently same-repo (forks cannot push
# here), so the self-hosted runner never sees fork code — `pull_request` is
# deliberately absent because those runs execute the PR merge-ref's workflow
# definition. Push runs on every in-repo working branch, so this leg's check lands
# on the PR head SHA and gates the merge via the `dev` ruleset. Fork PRs get no
# check by design — unblock by pushing the reviewed head commit to an in-repo branch
# (identical SHA → the check lands). See docs/contributing/branching-model.md.
on:
  push:
    branches-ignore: ['dependabot/**', 'gh-readonly-queue/**']
  workflow_dispatch:

# packages: read lets the runner pull the private ghcr.io/fraiseql/* base-image
# mirror (.github/workflows/mirror-base-images.yml); contents: read for checkout.
permissions:
  contents: read
  packages: read

concurrency:
  group: dagger-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: security
    runs-on: [self-hosted, fraiseql-8core]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      # The Dagger engine pulls the private ghcr.io/fraiseql/* base images via the
      # host's docker credentials; authenticate with the job's GITHUB_TOKEN first.
      - name: Log in to ghcr.io (private base-image mirror)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: dagger call security
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          dagger version
          dagger call security --source=.
