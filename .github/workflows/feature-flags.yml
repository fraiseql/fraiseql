name: Feature Flag Matrix

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  feature-matrix:
    name: "check (${{ matrix.features || 'no-default-features' }})"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""                                                                        # no features (--no-default-features)
          - "auth,secrets"
          - "observers,redis-rate-limiting"
          - "observers-enterprise,redis-rate-limiting,tracing-opentelemetry"
          - "arrow,wire-backend"
          - "mcp,auth,cors"
          - "observers-enterprise,redis-apq,redis-pkce"
          - "observers-enterprise,observers-nats,redis-rate-limiting"
          - "wire-backend"                                                            # wire-backend alone
          - "auth,secrets,observers-enterprise"                                       # full enterprise stack
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test feature combination
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo check -p fraiseql-server --no-default-features
          else
            cargo test -p fraiseql-server --lib --no-default-features --features "${{ matrix.features }}"
          fi

  all-features:
    name: "test --all-features"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --all-features (lib only)
        run: cargo test -p fraiseql-server --all-features --lib
