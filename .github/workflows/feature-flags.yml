name: Feature Flag Matrix

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

env:
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  feature-matrix:
    name: "check (${{ matrix.features || 'no-default-features' }})"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""                                                                        # no features (--no-default-features)
          - "auth,secrets"
          - "observers,redis-rate-limiting"
          - "observers-enterprise,redis-rate-limiting,tracing-opentelemetry"
          - "arrow,wire-backend"
          - "mcp,auth"
          - "observers-enterprise,redis-apq,redis-pkce"
          - "federation"                                                               # federation standalone
          - "secrets"                                                                   # secrets standalone
          - "wire-backend"                                                              # wire protocol standalone
          - "azure-blob"                                                               # Azure Blob storage standalone
          - "gcs"                                                                    # Google Cloud Storage standalone
          - "metrics,observers"                                                          # metrics + observers combo
          - "webhooks,auth"                                                                # webhooks triggered from auth events
          - "tracing-opentelemetry"                                                        # OpenTelemetry standalone
          - "functions,rest,testing"                                                        # empty features compile-only sanity check
          - "auth,observers,secrets,federation"                                         # kitchen sink
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a  # v0.0.9
      - name: cargo check
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo check -p fraiseql-server --no-default-features
          else
            cargo check -p fraiseql-server --features "${{ matrix.features }}"
          fi

  feature-integration-tests:
    name: "test (${{ matrix.name }})"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mcp
            features: "mcp,auth"
            test: mcp_integration_test
          - name: metrics
            features: "auth"
            test: metrics_integration_test
          - name: apq-memory
            features: "auth"
            test: redis_apq_integration_test
          - name: tracing
            features: "auth"
            test: tracing_integration_test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a  # v0.0.9
      - name: Run feature-gated integration tests
        run: cargo test --test "${{ matrix.test }}" -p fraiseql-server --features "${{ matrix.features }}"

  database-matrix:
    name: "check core (${{ matrix.features }})"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        features:
          - "postgres"                              # minimal single-backend
          - "mysql"                                 # secondary backend
          - "sqlite,sqlserver"                      # lightweight + enterprise, no postgres
          - "postgres,mysql,sqlite,sqlserver"        # all backends, no extras
          - "postgres,audit-syslog"                  # syslog audit backend
          - "postgres,audit-webhook"                 # webhook audit backend
          - "postgres,jwt-replay"                    # JWT replay detection (requires redis)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a  # v0.0.9
      - name: cargo check
        run: cargo check -p fraiseql-core --no-default-features --features "${{ matrix.features }}"

  storage-matrix:
    name: "check storage (${{ matrix.features }})"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        features:
          - "transforms"                              # image transforms
          - "gcs"                                     # Google Cloud Storage
          - "azure-blob"                              # Azure Blob Storage
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a  # v0.0.9
      - name: cargo check
        run: cargo check -p fraiseql-storage --no-default-features --features "${{ matrix.features }}"
