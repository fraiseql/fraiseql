# Ruff configuration for FraiseQL

[lint]
# Enable specific rule sets
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "DTZ",  # flake8-datetimez
    "T10",  # flake8-debugger
    "EXE",  # flake8-executable
    "ISC",  # flake8-implicit-str-concat
    "G",    # flake8-logging-format
    "PIE",  # flake8-pie
    "PT",   # flake8-pytest-style
    "RET",  # flake8-return
    "SIM",  # flake8-simplify
    "ARG",  # flake8-unused-arguments
    "PL",   # pylint
    "RUF",  # ruff-specific rules
]

# Ignore specific rules
ignore = [
    "E501",    # line too long (handled by formatter)
    "E402",    # module import not at top of file (sometimes needed)
    "B008",    # do not perform function calls in argument defaults
    "B904",    # raise ... from err or raise ... from None
    "PLR0913", # too many arguments
    "PLR2004", # magic value comparison
    "ARG001",  # unused function argument (common in callbacks)
    "ARG002",  # unused method argument
    "ARG003",  # unused class method argument
    "ARG004",  # unused static method argument
    "ARG005",  # unused lambda argument
    "G004",    # logging statement uses f-string
    "RET504",  # unnecessary variable assignment before return
    "RET505",  # unnecessary else after return
    "SIM108",  # use ternary operator
    "SIM117",  # use with X() as x, Y() as y: (often clearer as nested)
    "PLR0911", # too many return statements
    "PLR0912", # too many branches
    "PLR0915", # too many statements
    "C901",    # too complex
    "B905",    # zip without explicit strict parameter
    "PLC0415", # import outside top level
    "UP007",   # use X | Y for type annotations (we support older Python)
    "PT011",   # pytest.raises without match parameter
    "PIE790",  # unnecessary pass statement
    "SIM102",  # use a single if statement instead of nested if statements
    "SIM114",  # combine if branches using logical or operator
    "SIM105",  # use contextlib.suppress (sometimes try/except is clearer)
    "RUF012",  # mutable class attributes (common in test fixtures)
]

# Allow certain "confusables"
allowed-confusables = ["'", "'", "–", "—"]

[lint.per-file-ignores]
# Test files can have more relaxed rules
"tests/**/*.py" = [
    "D100", # missing module docstring
    "D101", # missing class docstring
    "D102", # missing method docstring
    "D103", # missing function docstring
    "D104", # missing package docstring
    "ANN001", # missing type annotation for function argument
    "ANN002", # missing type annotation for *args
    "ANN003", # missing type annotation for **kwargs
    "ANN201", # missing return type annotation for public function
    "ANN202", # missing return type annotation for private function
    "ANN401", # dynamically typed expressions (Any)
    "S101",   # use of assert detected
    "PLR2004", # magic value used in comparison
    "E721",    # type comparison
    "F821",    # undefined name (often due to test fixtures)
    "INP001",  # implicit namespace package
]

# Schema builder can use Any for GraphQL resolver functions
"src/fraiseql/gql/schema_builder.py" = ["ANN401"]
"src/fraiseql/core/graphql_type.py" = ["ANN401"]

[lint.isort]
known-first-party = ["fraiseql"]

[lint.pylint]
max-args = 8
max-branches = 15

[format]
# Use double quotes
quote-style = "double"

# Unix line endings
line-ending = "lf"
