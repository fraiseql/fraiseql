# Pre-commit hooks for FraiseQL v2
# Install: pip install pre-commit && pre-commit install

# pre-commit.ci configuration — skip hooks that require system toolchains
# (Rust, cargo) since pre-commit.ci doesn't provide them.
ci:
  skip: [fmt, clippy, cargo-audit, python-build-check, cargo-package-check, check-snapshot-pairing]

repos:
  # Rust formatting
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        name: cargo fmt
        description: Format Rust code with rustfmt
        entry: cargo fmt --all --
        language: system
        types: [rust]
        pass_filenames: false

      - id: clippy
        name: cargo clippy
        description: Lint Rust code with Clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--allow-multiple-documents', '--unsafe']
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  # TOML formatting
  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.16.0
    hooks:
      - id: pretty-format-toml
        args: [--autofix]
        # Cargo.toml files have strict semantic ordering requirements (e.g. [package]
        # must precede [[bin]], and workspace-inherited fields must stay in [package]
        # not [package.metadata.*] subsections). The generic TOML formatter breaks
        # these invariants by sorting table headers alphabetically.
        exclude: '(^|/)Cargo\.toml$'

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.47.0
    hooks:
      - id: markdownlint
        args: [--fix]

  # Snapshot pairing policy
  - repo: local
    hooks:
      - id: check-snapshot-pairing
        name: check snapshot pairing
        description: Every .snap file must be registered in tests/snapshot-pairs.md
        entry: ./tools/check-snapshot-pairing.sh
        language: script
        pass_filenames: false
        files: ^(crates/fraiseql-core/tests/snapshots/|tests/snapshot-pairs\.md)

  # Security check
  - repo: local
    hooks:
      - id: cargo-audit
        name: cargo audit
        description: Check for security vulnerabilities
        entry: cargo audit
        language: system
        pass_filenames: false
        stages: [push]

  # GitHub Actions workflow validation
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint
        name: actionlint
        description: Lint GitHub Actions workflow files
        entry: actionlint
        language: golang
        types: [yaml]
        files: ^\.github/workflows/
        pass_filenames: true

  # Python package validation
  - repo: local
    hooks:
      - id: python-build-check
        name: python build check
        description: Validate Python package builds
        entry: bash -c 'cd fraiseql-python && python -m build --sdist --wheel -q'
        language: system
        files: ^fraiseql-python/
        pass_filenames: false
        stages: [push]

      - id: cargo-package-check
        name: cargo package check
        description: Verify crates can be packaged for publish
        entry: bash -c 'for crate in fraiseql fraiseql-core fraiseql-error fraiseql-server fraiseql-cli fraiseql-observers fraiseql-arrow fraiseql-wire fraiseql-observers-macros; do echo "Checking $crate..."; cargo package -p $crate --allow-dirty -q || exit 1; done'
        language: system
        files: ^(Cargo.toml|crates/.*/Cargo.toml)
        pass_filenames: false
        stages: [push]
