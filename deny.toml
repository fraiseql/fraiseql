# FraiseQL dependency policy — single source of truth for all dependency checks.
# Run: cargo deny check
# CI workflows use this file exclusively (no separate cargo-audit ignore flags).

[advisories]
db-path = "~/.cargo/advisory-db"
ignore = [
  # rsa: Marvin Attack — no upstream fix, transitive via sqlx-mysql (optional feature only)
  # Last reviewed: 2026-03-21
  {id = "RUSTSEC-2023-0071", reason = "No upstream fix; only affects optional mysql feature path"},
  # Unmaintained crates — blocked on upstream updates, no action available
  # Last reviewed: 2026-03-21
  {id = "RUSTSEC-2025-0134", reason = "rustls-pemfile: blocked on upstream bollard migration to rustls-pem"},
  # rustls-webpki CRL DP matching — transitive via tokio-rustls 0.24/0.25 (rustls 0.21/0.22).
  # Requires compromised CA + CRL checking enabled. Low impact for FraiseQL.
  # Last reviewed: 2026-03-21
  {id = "RUSTSEC-2026-0049", reason = "rustls-webpki CRL DP matching: transitive via tokio-rustls; low impact, tracked for upstream bump"},
  # astral-tokio-tar — no fix available yet
  # Last reviewed: 2026-03-23
  {id = "RUSTSEC-2026-0066", reason = "astral-tokio-tar: no upstream fix available"}
]
unmaintained = "workspace"

[bans]
multiple-versions = "warn"
wildcards = "allow"

[graph]
all-features = true
targets = []

[licenses]
allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "LGPL-2.1-or-later",
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "OpenSSL",
  "Unicode-3.0",
  "Unlicense",
  "Zlib"
]
confidence-threshold = 0.8

[[licenses.clarify]]
expression = "MIT AND ISC AND OpenSSL"
license-files = [{path = "LICENSE", hash = 0xbd0eed23}]
name = "ring"

[sources]
allow-git = []
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
unknown-git = "deny"
unknown-registry = "deny"
