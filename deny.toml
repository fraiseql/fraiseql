# FraiseQL dependency policy
# Run: cargo deny check
# Skip entries last reviewed: 2026-03-30
# Pending resolution:
#   rustls 0.22  — async-nats 0.40 transitively requires (tracked: async-nats upgrade)

[advisories]
db-path = "~/.cargo/advisory-db"
ignore = [
  # rsa: Marvin Attack — no upstream fix, transitive via sqlx-mysql (optional feature only)
  {id = "RUSTSEC-2023-0071", reason = "No upstream fix; only affects optional mysql feature path"},
  {id = "RUSTSEC-2025-0134", reason = "rustls-pemfile: blocked on upstream bollard migration to rustls-pem"},
  {id = "RUSTSEC-2026-0066", reason = "astral-tokio-tar: dev-only dep via testcontainers 0.26; awaiting testcontainers 0.27 upgrade. Revisit by 2026-04-15."},
  {id = "RUSTSEC-2026-0049", reason = "rustls-webpki 0.102: transitive via async-nats 0.40 (rustls 0.22); awaiting async-nats upgrade. Revisit by 2026-04-15."},
]
unmaintained = "workspace"

[bans]
multiple-versions = "deny"
wildcards = "allow"

# --- Transitive duplicate skip-trees ---
# These subtrees pull in older versions of many crates (crypto, http, TLS).
# Skipping the tree root avoids dozens of individual skip entries.

[[bans.skip-tree]]
name = "hyper"
version = "=0.14.32"
reason = "hyper 0.14 required by aws-sdk via aws-smithy-runtime; pulls in h2 0.3, http 0.2, http-body 0.4"

[[bans.skip-tree]]
name = "rustls"
version = "=0.21.12"
reason = "rustls 0.21 required by aws-sdk-s3 via hyper-rustls 0.24; EOL but no upstream fix"


[[bans.skip-tree]]
name = "p256"
version = "=0.11.1"
reason = "p256 0.11 required by aws-sigv4; pulls in older elliptic-curve, ecdsa, ff, group, etc."

