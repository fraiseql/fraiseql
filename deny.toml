# FraiseQL dependency policy
# Run: cargo deny check

[graph]
all-features = true
targets = []

[advisories]
db-path = "~/.cargo/advisory-db"
unmaintained = "workspace"
ignore = [
    # rsa: Marvin Attack — no upstream fix, transitive via sqlx-mysql (optional feature only)
    { id = "RUSTSEC-2023-0071", reason = "No upstream fix; only affects optional mysql feature path" },
    # Unmaintained crates — all blocked on upstream updates, no action available
    { id = "RUSTSEC-2024-0384", reason = "instant: blocked on notify 7.x (latest stable)" },
    { id = "RUSTSEC-2024-0436", reason = "paste: blocked on upstream parquet/arrow-flight" },
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile: blocked on upstream tiberius/bollard migration to rustls-pem" },
    { id = "RUSTSEC-2026-0002", reason = "Tracked upstream; no fix available yet" },
]

[licenses]
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "LGPL-2.1-or-later",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
