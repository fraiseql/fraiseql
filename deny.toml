# FraiseQL dependency policy
# Run: cargo deny check
# Skip entries last reviewed: 2026-05-19
#
# Pending resolution (tracked with deadlines in the [advisories] section):
# - rustls 0.21  — aws-sdk-s3 (optional feature) transitively requires; EOL dependency.
# Blocked on aws-sdk-s3 migrating to hyper-rustls 0.27 (rustls 0.23).
# Re-evaluate by: 2026-10-01
# - sqlx 0.8     — sqlx 0.9.0 is alpha as of 2026-04-25; upgrade when stable.
# Will resolve RUSTSEC-2023-0071 (rsa Marvin Attack via mysql_async).
# Re-evaluate by: 2026-10-01
# - thiserror 1.x — graphql-parser 0.4 pins thiserror 1.x; blocked on upstream update.
# Re-evaluate by: 2026-12-01 — migrate off graphql-parser if still blocked.
#
# See docs/dependency-risk-policy.md for the full acceptance policy.

[advisories]
db-path = "~/.cargo/advisory-db"
ignore = [
  # rsa: Marvin Attack — no upstream fix, transitive via sqlx-mysql (optional feature only).
  # Resolution path: upgrade sqlx to 0.9+ when released (sqlx tracks rsa fix upstream).
  # Mitigation: mysql feature is non-default; TLS termination at load balancer layer.
  # deadline: 2026-10-01 — re-evaluate sqlx 0.9 release status; escalate if still blocked.
  {id = "RUSTSEC-2023-0071", reason = "No upstream fix; only affects optional mysql feature path; deadline 2026-10-01"},
  # rustls-pemfile: blocked on upstream bollard migration from pem 0.x to rustls-pem.
  # Re-evaluated 2026-07-02: rustls-pemfile 2.2.0 is a DEV-dependency only (fraiseql-wire
  # test deps / bollard test infra) — no production runtime exposure; low-severity
  # deprecated/unmaintained-crate advisory. bollard 0.20 still pins pem 0.x upstream.
  # deadline: 2026-10-01 — re-check bollard release cadence at the next dep sweep; drop
  # bollard or migrate off rustls-pemfile if still blocked.
  {id = "RUSTSEC-2025-0134", reason = "rustls-pemfile deprecated-crate advisory; DEV-dependency only (fraiseql-wire test deps / bollard), no production exposure; deadline 2026-10-01"},
  # rustls-webpki name-constraint bugs; transitive via aws-smithy-http-client (rustls 0.21).
  # Affects optional aws-s3 feature only; no exploit path in default configuration.
  # 2026-06-11 spike: aws-config's HTTP-client features (default-https-client / client-hyper /
  # rustls) ALL route to aws-smithy-runtime's legacy rustls-0.21 connector (legacy-rustls-ring);
  # no clean feature selects rustls 0.23 — the modern client needs a code-level HttpClient swap
  # or an aws-* version bump. 2026-06-14: the Phase 12 deps-hygiene pass DEFERRED this fix —
  # it is real engineering (custom hyper-rustls 0.27 HttpClient), out of scope for a hygiene
  # phase and non-urgent (opt-in feature, no default-build exposure). Tracked as a standalone
  # aws-stack rustls-0.23 migration.
  # deadline: 2026-09-01 — re-evaluate when the standalone aws-* bump lands.
  {id = "RUSTSEC-2026-0098", reason = "rustls-webpki name-constraint URI bug; transitive via aws-smithy-http-client (rustls 0.21); optional aws-s3 feature only. Deadline 2026-09-01."},
  {id = "RUSTSEC-2026-0099", reason = "rustls-webpki wildcard name-constraint bug; same cause as RUSTSEC-2026-0098. Deadline 2026-09-01."},
  # rustls-webpki 0.101.7: CRL parsing panic; transitive via aws-smithy-http-client (rustls 0.21).
  # Affects optional aws-s3 feature only; same root cause as RUSTSEC-2026-0098/0099.
  # deadline: 2026-09-01 — resolved when aws-sdk migrates to rustls 0.23.
  {id = "RUSTSEC-2026-0104", reason = "rustls-webpki 0.101.7 CRL panic; transitive via aws-smithy-http-client (rustls 0.21); optional aws-s3 feature only. Deadline 2026-09-01."},
  # wasmtime-wasi: WASI hard-link/rename bypasses FilePerms on the destination path.
  # Transitive via fraiseql-functions' opt-in `runtime-wasm` feature only (wasmtime/wasmtime-wasi
  # are pinned to major "44"); NOT in the default build, no exposure for a standard FraiseQL server.
  # Patched in 45.0.3 / 46.0.1 — there is no fix within the 44.x line, so resolution requires a
  # wasmtime 44 -> 45+ MAJOR bump that also moves the `wasmtime::component::bindgen!` glue, tracked
  # as standalone work (out of scope for an advisory-hygiene pass; the env can't build/verify the
  # wasmtime stack safely here).
  # deadline: 2026-10-01 — re-evaluate when the standalone wasmtime 45+ bump lands.
  {id = "RUSTSEC-2026-0188", reason = "wasmtime-wasi FilePerms bypass; transitive via opt-in runtime-wasm feature only (wasmtime pinned to 44); patched in 45.0.3/46.0.1 needs a major bump tracked separately. Deadline 2026-10-01."},
  # quick-xml DoS pair (published 2026-07-02): RUSTSEC-2026-0194 (quadratic run time when checking
  # a start tag for duplicate attribute names) + RUSTSEC-2026-0195 (unbounded namespace-declaration
  # allocation in NsReader → memory-exhaustion DoS). Transitive ONLY via samael 0.0.21 (SAML SP,
  # #381), which is behind the opt-in `auth-saml` feature — NOT in the default build. samael pins
  # quick-xml 0.37.5 and `cargo update` cannot move it (the fix is in a later quick-xml outside
  # samael's range); a clean bump would need a samael update (0.0.21 is latest) or a risky [patch]
  # override. DoS is reachable only via malicious SAML XML at a SAML-enabled ACS endpoint.
  # deadline: 2026-10-01 — re-check samael release cadence; consider a [patch] to a patched
  # quick-xml (validating SAML parsing) or dropping samael.
  {id = "RUSTSEC-2026-0194", reason = "quick-xml quadratic duplicate-attribute-name check (DoS); transitive via samael (auth-saml opt-in only); samael pins quick-xml 0.37.5, no fix in range. Deadline 2026-10-01."},
  {id = "RUSTSEC-2026-0195", reason = "quick-xml unbounded namespace-declaration allocation in NsReader (memory-exhaustion DoS); same cause/path as RUSTSEC-2026-0194 (samael, auth-saml opt-in). Deadline 2026-10-01."}
]
unmaintained = "workspace"

[bans]
multiple-versions = "deny"
wildcards = "allow"

# samael (SAML SP, #381) is an opt-in `auth-saml`-only dependency; its build/derive stack
# (derive_builder 0.20 → darling 0.20; bindgen → nom 7) and openssl-probe 0.1 pull older
# duplicate versions than the rest of the workspace. Pinned to the samael-side versions so
# only those exact duplicates are exempt; bump these if samael's tree moves.
[[bans.skip]]
name = "darling"
reason = "samael (#381 auth-saml) → derive_builder 0.20 → darling 0.20; workspace on 0.23"
version = "=0.20.11"

[[bans.skip]]
name = "darling_core"
reason = "samael (#381 auth-saml) → derive_builder 0.20 → darling_core 0.20; workspace on 0.23"
version = "=0.20.11"

