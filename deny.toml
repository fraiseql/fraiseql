# FraiseQL dependency policy
# Run: cargo deny check
# Skip entries last reviewed: 2026-05-02
# Pending resolution:
# rustls 0.21  — aws-sdk-s3 (optional feature) transitively requires; EOL dependency
# wasmtime 18.x — many CVEs accumulated; upgrade blocked on deno_core 0.290 compat; optional feature

[advisories]
db-path = "~/.cargo/advisory-db"
ignore = [
  # rsa: Marvin Attack — no upstream fix, transitive via sqlx-mysql (optional feature only)
  {id = "RUSTSEC-2023-0071", reason = "No upstream fix; only affects optional mysql feature path"},
  {id = "RUSTSEC-2025-0134", reason = "rustls-pemfile: blocked on upstream bollard migration to rustls-pem"},
  {id = "RUSTSEC-2026-0098", reason = "rustls-webpki name-constraint URI bug; transitive via aws-smithy-http-client (rustls 0.21); optional aws-s3 feature only. Revisit by 2026-08-01."},
  {id = "RUSTSEC-2026-0099", reason = "rustls-webpki wildcard name-constraint bug; same cause as RUSTSEC-2026-0098. Revisit by 2026-08-01."},
  {id = "RUSTSEC-2026-0104", reason = "rustls-webpki additional name-constraint bug; same transitive chain as 0098/0099. Revisit by 2026-08-01."},
  # wasmtime 18.x CVEs — optional runtime-wasm feature only; upgrade blocked on deno_core compat. Revisit by 2026-08-01.
  {id = "RUSTSEC-2024-0438", reason = "wasmtime 18.x; optional runtime-wasm feature only. Revisit by 2026-08-01."},
  {id = "RUSTSEC-2025-0046", reason = "wasmtime 18.x; optional runtime-wasm feature only. Revisit by 2026-08-01."},
  {id = "RUSTSEC-2025-0118", reason = "wasmtime 18.x; optional runtime-wasm feature only. Revisit by 2026-08-01."},
  {id = "RUSTSEC-2026-0020", reason = "wasmtime 18.x; optional runtime-wasm feature only. Revisit by 2026-08-01."},
  {id = "RUSTSEC-2026-0021", reason = "wasmtime 18.x; optional runtime-wasm feature only. Revisit by 2026-08-01."},
  {id = "RUSTSEC-2026-0085", reason = "wasmtime 18.x; optional runtime-wasm feature only. Revisit by 2026-08-01."},
  {id = "RUSTSEC-2026-0086", reason = "wasmtime 18.x; optional runtime-wasm feature only. Revisit by 2026-08-01."},
  {id = "RUSTSEC-2026-0087", reason = "wasmtime 18.x; optional runtime-wasm feature only. Revisit by 2026-08-01."},
  {id = "RUSTSEC-2026-0088", reason = "wasmtime 18.x; optional runtime-wasm feature only. Revisit by 2026-08-01."},
  {id = "RUSTSEC-2026-0089", reason = "wasmtime 18.x; optional runtime-wasm feature only. Revisit by 2026-08-01."},
  {id = "RUSTSEC-2026-0091", reason = "wasmtime 18.x; optional runtime-wasm feature only. Revisit by 2026-08-01."},
  {id = "RUSTSEC-2026-0092", reason = "wasmtime 18.x; optional runtime-wasm feature only. Revisit by 2026-08-01."},
  {id = "RUSTSEC-2026-0093", reason = "wasmtime 18.x; optional runtime-wasm feature only. Revisit by 2026-08-01."},
  {id = "RUSTSEC-2026-0094", reason = "wasmtime 18.x; optional runtime-wasm feature only. Revisit by 2026-08-01."},
  {id = "RUSTSEC-2026-0095", reason = "wasmtime 18.x; optional runtime-wasm feature only. Revisit by 2026-08-01."},
  {id = "RUSTSEC-2026-0096", reason = "wasmtime 18.x; optional runtime-wasm feature only. Revisit by 2026-08-01."},
  # astral-tokio-tar CVEs — transitive via deno_core (optional runtime-deno feature). Revisit by 2026-08-01.
  {id = "RUSTSEC-2026-0112", reason = "astral-tokio-tar; transitive via deno_core optional feature only. Revisit by 2026-08-01."},
  {id = "RUSTSEC-2026-0113", reason = "astral-tokio-tar; transitive via deno_core optional feature only. Revisit by 2026-08-01."}
]
unmaintained = "workspace"

[bans]
multiple-versions = "deny"
wildcards = "allow"

