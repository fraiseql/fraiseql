# FraiseQL v2 SaaS Platform Example
# Multi-tenant organization with domain-driven architecture

[database]
pool_size = 10
ssl_mode = "prefer"
timeout_seconds = 30
url = "postgresql://localhost/saas"

# Auto-discover domains
[domain_discovery]
enabled = true
root_dir = "schema"

[schema]
database_target = "postgresql"
description = "SaaS platform with account management, billing, teams, and integrations"
name = "saas"
version = "1.0.0"

[tracing]
enabled = true
level = "info"
format = "json"
service_name = "fraiseql"
# Uncomment to enable OpenTelemetry OTLP export:
# otlp_endpoint = "http://otel-collector:4317"
# otlp_export_timeout_secs = 10

[validation]
max_query_depth = 10          # Default: 10. Maximum nesting depth for GraphQL queries.
max_query_complexity = 100    # Default: 100. Maximum computed complexity score.

[security]
default_policy = "authenticated"

[[security.rules]]
cacheable = false
description = "Only account owners can modify account settings"
name = "allow_account_owners"
rule = "mutation * Account"

[[security.rules]]
cacheable = false
description = "Only billing admins can manage subscriptions"
name = "allow_billing_admin"
rule = "mutation * Subscription"
