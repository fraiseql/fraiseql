services:
  # Users Subgraph (localhost:4001)
  users-service:
    build:
      context: ./users-service
      dockerfile: Dockerfile
    ports:
      - "4001:4000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Orders Subgraph (localhost:4002)
  orders-service:
    build:
      context: ./orders-service
      dockerfile: Dockerfile
    ports:
      - "4002:4000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Products Subgraph (localhost:4003)
  products-service:
    build:
      context: ./products-service
      dockerfile: Dockerfile
    ports:
      - "4003:4000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Apollo Router gateway (localhost:4000); health check on localhost:8088
  apollo-router:
    image: ghcr.io/apollographql/router:v1.45.0
    ports:
      - "4000:4000"
      - "8088:8088"
    # Use explicit DNS to avoid hickory-dns failing on resolv.conf options
    # that some host configurations inject (e.g. "name server" with space).
    dns:
      - 127.0.0.11
    dns_search: []
    dns_opt: []
    volumes:
      - ./supergraph.graphql:/etc/router/supergraph.graphql:ro
      - ./router.yaml:/etc/router/router.yaml:ro
      # Override resolv.conf: some hosts write "name server" (with space) for
      # IPv6 entries which hickory-dns rejects.
      - ./resolv.conf:/etc/resolv.conf:ro
    depends_on:
      users-service:
        condition: service_healthy
      orders-service:
        condition: service_healthy
      products-service:
        condition: service_healthy
    command: --supergraph /etc/router/supergraph.graphql --config /etc/router/router.yaml

networks:
  default:
    name: fraiseql-federation-ci
