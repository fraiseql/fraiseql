# Integration test infrastructure for fraiseql
#
# Usage:
#   docker compose -f docker/docker-compose.test.yml up -d
#   cargo test --features test-postgres -p fraiseql-core -- db::postgres
#   cargo test --features test-mysql    -p fraiseql-core -- db::mysql
#   cargo test --features test-sqlserver -p fraiseql-core -- db::sqlserver
#   cargo test --features "postgres,dedup,caching,testing" -p fraiseql-observers --test integration_test
#   docker compose -f docker/docker-compose.test.yml down -v

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: test_fraiseql
      POSTGRES_USER: fraiseql_test
      POSTGRES_PASSWORD: fraiseql_test_password
    ports:
      - "5433:5432"
    volumes:
      - ./init/postgres-test.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraiseql_test -d test_fraiseql"]
      interval: 5s
      timeout: 3s
      retries: 5

  mysql-test:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: test_fraiseql
      MYSQL_USER: fraiseql_test
      MYSQL_PASSWORD: fraiseql_test_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - ./init/mysql-test.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "fraiseql_test", "-pfraiseql_test_password"]
      interval: 5s
      timeout: 3s
      retries: 10

  sqlserver-test:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "FraiseQL_Test1234"
      MSSQL_PID: Developer
    ports:
      - "1434:1433"
    healthcheck:
      test: [
        "CMD-SHELL",
        "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'FraiseQL_Test1234' -C -Q 'SELECT 1' -b"
      ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # One-shot container that waits for SQL Server to be healthy, then seeds data
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      sqlserver-test:
        condition: service_healthy
    volumes:
      - ./init/sqlserver-test.sql:/init.sql:ro
    entrypoint: [
      "/opt/mssql-tools18/bin/sqlcmd",
      "-S", "sqlserver-test",
      "-U", "sa",
      "-P", "FraiseQL_Test1234",
      "-C",
      "-i", "/init.sql"
    ]

  redis-test:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # NATS with JetStream enabled — required for fraiseql-observers NATS transport tests
  nats-test:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"   # NATS client port
      - "8222:8222"   # NATS monitoring HTTP port
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # HashiCorp Vault (dev mode) — required for fraiseql-server secrets manager tests
  vault-test:
    image: hashicorp/vault:1.17
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: fraiseql-test-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_LOG_LEVEL: warn
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://localhost:8200 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
